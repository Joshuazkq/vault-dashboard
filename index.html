.ticker-card-mini {

.tcm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.tcm-sym { font-size: 15px; font-weight: 700; cursor: pointer; color: var(--accent-blue); }
.tcm-sym:hover { text-decoration: underline; }
.tcm-price { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }
.tcm-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tcm-range { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 2px; }
.tcm-catalyst { font-size: 11px; color: var(--text-secondary); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tcm-variant { font-size: 10px; color: var(--accent-blue); font-style: italic; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── SIGNAL FILTER BAR ── */
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filter-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
  background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border);
  transition: all 0.15s; user-select: none;
}
.filter-chip:hover { border-color: var(--accent-blue); color: var(--text-primary); }
.filter-chip.active { background: rgba(74,158,255,0.15); color: var(--accent-blue); border-color: var(--accent-blue); font-weight: 600; }
.filter-chip-clear { font-size: 10px; color: var(--accent-negative); cursor: pointer; margin-left: 4px; }
.filter-chip-clear:hover { text-decoration: underline; }
.filter-group-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }

/* ── THEME CARDS V2 ── */
.theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; margin-bottom: 16px; }
.theme-card-v2 {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; transition: border-color 0.2s;
}
.theme-card-v2:hover { border-color: var(--accent-blue); }
.theme-card-v2-dormant { opacity: 0.5; }
.theme-card-v2-escalating { border-left: 3px solid var(--accent-red); }
.theme-card-v2-weakening { border-left: 3px solid var(--accent-amber); }
.tc2-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.tc2-name { font-weight: 700; font-size: 15px; }
.tc2-scores { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.tc2-scores strong { color: var(--text-primary); font-size: 14px; }
.ticker-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.ticker-chip {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600;
  font-family: 'SF Mono','Fira Code',monospace; border: 1px solid;
}
.ticker-chip-active { border-color: var(--accent-positive); color: var(--accent-positive); background: rgba(52,210,122,0.08); cursor: pointer; }
.ticker-chip-active:hover { background: rgba(52,210,122,0.18); }
.ticker-chip-monitoring { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(74,158,255,0.08); cursor: pointer; }
.ticker-chip-monitoring:hover { background: rgba(74,158,255,0.18); }
.ticker-chip-other { border-color: var(--border); color: var(--text-secondary); background: transparent; }
.tc2-counts { font-size: 11px; color: var(--text-secondary); display: flex; gap: 10px; }
.tc2-count-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }

/* ── INDICATOR DOTS ── */
.ind-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
}
.ind-ok { background: var(--accent-positive); }
.ind-approaching { background: var(--accent-amber); }
.ind-breach { background: var(--accent-red); }

/* ── FAIR VALUE BOX ── */
.fv-box {
  background: rgba(74,158,255,0.05); border: 1px solid rgba(74,158,255,0.15);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.fv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
/* Dimension score grid (D1-D8) */
.dim-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; margin-bottom: 12px; text-align: center; }
.dim-cell { display: flex; flex-direction: column; align-items: center; padding: 4px 0; }
.dim-badge { height: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
.dim-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.3px; }
.dim-score { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
.fv-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.fv-value { font-family: 'SF Mono','Fira Code',monospace; font-size: 14px; font-weight: 700; }

/* ── VARIANT VIEW ── */
.variant-view {
  font-size: 12px; padding: 8px; background: rgba(168,192,216,0.06);
  border-left: 2px solid var(--text-inference); border-radius: 4px;
}

/* ── CHART BOX ── */
.chart-box { height: 220px; position: relative; }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

/* ── RADAR CANVAS ── */

/* ── UPDATE BANNER ── */

.update-banner button {

}
.update-banner button:hover { background: rgba(255,255,255,0.14); color: var(--text-primary); }
.top-controls {
  position: fixed; top: 10px; right: 12px; z-index: 9001;
  display: flex; gap: 6px; align-items: center;
}
.reload-btn, .theme-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-surface);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.4; transition: opacity 0.15s, background 0.15s;
}
.reload-btn:hover, .theme-btn:hover { opacity: 1; background: var(--bg-elevated); }
.reload-btn:active, .theme-btn:active { opacity: 1; }
.reload-btn svg, .theme-btn svg { width: 14px; height: 14px; }

.scroll-top {

.scroll-top.visible { opacity: 1; }

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav {

.bnav-btn.active { color: var(--accent-blue); }

.more-menu {

.more-item:hover { background: var(--bg-surface); }

button:focus:not(:focus-visible) { outline: none; }

/* ── REDUCED MOTION ── */

  *, *::before, *::after { transition: none !important; animation: none !important; }
  .ctx-panel { transition: none !important; }
  .alert-drawer { transition: none !important; }
  .section-body { transition: none !important; }
}

/* ── PRINT ── */
@media print {
  body { background: #fff; color: #000; }
  .sidebar, .mobile-nav, .scroll-top, .ctx-panel, .search-overlay { display: none !important; }
  .main-content { margin-left: 0 !important; margin-right: 0 !important; }
  .section { display: block !important; page-break-inside: avoid; }
  .card { border-color: #ccc; }
  .pill { border: 1px solid #ccc; }
}

/* ── MOBILE (<768px) ── */
@media (max-width: 767px) {

// Helper: get dimension score (handles both old numeric and new object format)

function dimBadge(dim) {
  var t = dimType(dim);
  if (t === 'fact') return '<span class="badge-fact">FACT</span>';

}

var _currentSection = 'home';
var _renderedSections = {};

function switchSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-item, .bnav-btn').forEach(function(b) {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  var sb = document.getElementById('sb-' + id);
  var bn = document.getElementById('bn-' + id);
  if (sb) { sb.classList.add('active'); sb.setAttribute('aria-current', 'page'); }
  if (bn) { bn.classList.add('active'); }
  _currentSection = id;
  localStorage.setItem('activeSection', id);
  window.scrollTo({ top: 0 });
  renderSection(id);
}

function renderSection(id) {
  if (_renderedSections[id]) return;
  switch (id) {
    case 'home': renderHome(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'themes': renderThemes(); break;
    case 'signals': renderSignals(); break;
    case 'calendar': renderCalendar(); break;
    case 'research': renderResearch(); break;
    case 'settings': renderSettings(); break;
  }
  _renderedSections[id] = true;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function openSearch() {
  document.getElementById('searchOverlay').classList.add('active');
  var inp = document.getElementById('searchInput');
  inp.value = '';
  inp.focus();
  document.getElementById('searchResults').innerHTML = '';
}

function closeSearch(e) {
  if (e && e.target !== document.getElementById('searchOverlay')) return;
  document.getElementById('searchOverlay').classList.remove('active');
}

function handleSearch(q) {
  var el = document.getElementById('searchResults');
  if (!q || q.length < 1) { el.innerHTML = ''; return; }
  q = q.toUpperCase();
  var results = [];
  Object.keys(D.tickers).forEach(function(sym) {
    if (sym.indexOf(q) >= 0 || D.tickers[sym].company.toUpperCase().indexOf(q) >= 0)
      results.push({ sym: sym, co: D.tickers[sym].company });
  });
  if (!results.length) { el.innerHTML = ''; return; }
  el.innerHTML = results.map(function(r) {
    return '<li role="option" class="search-result" tabindex="0" onclick="selectSearchResult(\'' + r.sym + '\')"><span class="sr-ticker">' + r.sym + '</span><span class="sr-company">' + r.co + '</span></li>';
  }).join('');
}

function selectSearchResult(sym) {
  document.getElementById('searchOverlay').classList.remove('active');
  openContextPanel(sym);
}

var _prevFocus = null;
var _ctxSym = null;
var _ctxTab = 'summary';

function openContextPanel(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  _prevFocus = document.activeElement;
  _ctxSym = sym;
  _ctxTab = 'summary';
  var chgC = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
  var chgS = t.change >= 0 ? '+' : '';
  document.getElementById('ctx-title').innerHTML = '<span>' + sym + '</span><span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:6px">' + t.company + '</span><span class="mono" style="font-size:14px;margin-left:auto;margin-right:8px">' + t.price + '</span><span class="mono" style="font-size:12px;color:' + chgC + '">' + chgS + t.change.toFixed(2) + '%</span>';

  var tabs = ['summary'];
  var tabLabels = ['Summary'];
  if (t.pm) { tabs.push('patternmatch'); tabLabels.push('Pattern Match'); }
  tabs.push('valuation', 'catalysts', 'research');
  tabLabels.push('Valuation', 'Catalysts', 'Research');
  if (t.indicators) { tabs.push('indicators'); tabLabels.push('Indicators'); }
  tabs.push('financials'); tabLabels.push('Financials');
  var tabHtml = '';
  tabs.forEach(function(tab, i) {
    tabHtml += '<button class="ctx-tab' + (i === 0 ? ' active' : '') + '" data-ctx-tab="' + tab + '" onclick="switchCtxTab(\'' + tab + '\')">' + tabLabels[i] + '</button>';
  });
  document.getElementById('ctxTabs').innerHTML = tabHtml;

  renderCtxTab('summary');
  document.getElementById('ctx-panel').classList.add('open');
  document.querySelector('.main-content').classList.add('panel-open');
}

function closeContextPanel() {
  document.getElementById('ctx-panel').classList.remove('open');
  document.querySelector('.main-content').classList.remove('panel-open');
  if (_prevFocus) _prevFocus.focus();
  _ctxSym = null;
}

function switchCtxTab(tab) {
  _ctxTab = tab;
  document.querySelectorAll('.ctx-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.ctx-tab[data-ctx-tab="' + tab + '"]').classList.add('active');
  renderCtxTab(tab);
}

function renderCtxTab(tab) {
  var sym = _ctxSym;
  var t = D.tickers[sym];
  if (!t) return;
  var h = '';

  if (tab === 'summary') {
    if (t.businessBackground) {
      h += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">' + t.businessBackground + '</div>';
    }
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
    h += '<span class="pill pill-green">' + t.portfolioType + '</span>';
    h += '<span class="pill ' + (t.instrument.includes('C ') || t.instrument.includes('Call') ? 'pill-orange' : 'pill-blue') + '">' + t.instrument + '</span>';
    h += '<span class="pill pill-grey">' + t.allocation + '% alloc</span>';
    h += '</div>';
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:600">Conviction ' + t.conviction + '/10</span><span style="font-size:12px;color:var(--text-secondary)">RC ' + t.rc + '/5</span></div>';
    h += '<div style="display:flex;gap:16px;margin-bottom:12px">';
    if (t.clusterA) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster A</span><div style="font-size:16px;font-weight:700;color:var(--accent-positive)">' + t.clusterA + '%</div></div>';
    if (t.clusterB) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster B</span><div style="font-size:16px;font-weight:700">' + t.clusterB + '%</div></div>';
    h += '</div>';
    if (t.dimensions) {
      h += '<div class="radar-wrap"><canvas id="ctxRadar" role="img" aria-label="Conviction dimensions radar chart for ' + sym + '"></canvas></div>';
      h += '<div class="dim-grid">';
      DIM_KEYS.forEach(function(d) {
        var dim = t.dimensions[d];
        var v = dimScore(dim);
        var c = v >= 5 ? 'var(--accent-positive)' : v <= 2 ? 'var(--accent-negative)' : v === 3 ? 'var(--accent-amber)' : 'var(--text-primary)';
        var badge = dimBadge(dim) || '<span class="badge-fact" style="opacity:0">_</span>';
        h += '<div class="dim-cell"><div class="dim-badge">' + badge + '</div><div class="dim-label">' + DIM_SHORT[d] + '</div><div class="dim-score" style="color:' + c + '">' + v + '</div></div>';
      });
      h += '</div>';
    } else {
      h += '<div style="text-align:center;padding:16px;color:var(--text-secondary);font-size:12px">No conviction dimensions scored yet</div>';
    }
    h += '</div>';
    if (t.premortem && t.premortem.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--accent-red)">\u26A0 Pre-Mortem</div>';
      t.premortem.forEach(function(p) {
        h += '<div style="font-size:12px;padding:3px 0;color:var(--accent-negative)">\u2022 ' + p + '</div>';
      });
      h += '</div>';
    }
    h += '<div style="border-top:1px solid var(--border);padding-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Recent Notes</div>';
    (t.recentNotes || []).forEach(function(n) {
      h += '<div style="font-size:12px;padding:3px 0;color:var(--text-secondary)">\u2022 ' + n + '</div>';
    });
    h += '</div>';

  } else if (tab === 'valuation') {
    // Price + Market Cap header
    var chgColor = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
    var chgSign = t.change >= 0 ? '+' : '';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
    h += '<div><span class="mono" style="font-size:22px;font-weight:700">' + t.price + '</span>';
    h += '<span style="margin-left:8px;font-size:14px;color:' + chgColor + '">' + chgSign + t.change + '%</span></div>';
    if (t.marketCap) {
      h += '<div style="text-align:right"><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Mkt Cap</div>';
      h += '<span class="mono" style="font-size:14px">' + t.marketCap + '</span></div>';
    }
    h += '</div>';
    // Methodology header
    if (t.valuation) {
      h += '<div style="font-size:12px;color:var(--accent-blue);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px">' + t.valuation.methodology + '</div>';
      if (t.fairValue) {
        h += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">' + t.fairValue.thesisType + ' \u2022 Updated ' + t.valuation.lastUpdated + '</div>';
      }
      // Rationale
      if (t.valuation.rationale) {
        h += '<div style="font-size:12px;line-height:1.5;color:var(--text-secondary);padding:10px 12px;background:rgba(74,158,255,.06);border-left:2px solid var(--accent-blue);border-radius:0 8px 8px 0;margin-bottom:16px">' + t.valuation.rationale + '</div>';
      }

function renderRadarChart(sym) {
  var canvas = document.getElementById('ctxRadar');
  if (!canvas) return;
  var t = D.tickers[sym];
  if (!t || !t.dimensions) return;
  var dims = t.dimensions;
  var data = DIM_KEYS.map(function(d) { return dimScore(dims[d]); });
  new Chart(canvas, {
    type: 'radar',
    data: {
      labels: DIM_KEYS.map(function(d) { return d + ' ' + DIM_SHORT[d]; }),
      datasets: [{
        data: data,
        backgroundColor: 'rgba(74,158,255,0.15)',
        borderColor: 'rgba(74,158,255,0.8)',
        pointBackgroundColor: '#4A9EFF',
        pointRadius: 3, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 6, ticks: { stepSize: 1, display: false },

          angleLines: { color: 'rgba(46,46,58,0.5)' },
          pointLabels: { color: '#8E8E99', font: { size: 9 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderCtxSparkline(sym) {
  var canvas = document.getElementById('ctxSparkline');

  var ph = D.priceHistory[sym];
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: ph.map(function(p) { return p.ts.slice(5); }),
      datasets: [{
        data: ph.map(function(p) { return p.price; }),
        borderColor: '#4A9EFF', backgroundColor: 'rgba(74,158,255,0.1)',

    },

      scales: {

        y: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', font: { size: 10 } } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// SECTION TOGGLE
// ═══════════════════════════════════════════
function toggleSection(btn) {
  btn.classList.toggle('collapsed');
  var expanded = !btn.classList.contains('collapsed');
  btn.setAttribute('aria-expanded', String(expanded));
  var body = btn.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function changeColor(val) {
  return val > 0 ? 'var(--accent-positive)' : val < 0 ? 'var(--accent-negative)' : 'var(--text-secondary)';
}

function changePrefix(val) {
  return val > 0 ? '+' : '';
}

function dteClass(dte) {
  return dte >= 45 ? 'dte-green' : dte >= 30 ? 'dte-amber' : 'dte-red';
}

function computeUpside(sym) {
  var t = D.tickers[sym];
  if (!t || !t.fairValue || !t.fairValue.probWeightedFV || !t.price) return null;
  var fvStr = t.fairValue.probWeightedFV.replace(/[^0-9.\-]/g, '');
  var priceStr = t.price.replace(/[^0-9.\-]/g, '');
  var fv = parseFloat(fvStr), price = parseFloat(priceStr);
  if (isNaN(fv) || isNaN(price) || price === 0) return null;
  return Math.round((fv / price - 1) * 100);
}

function todayStr() { return D.generated || '2026-03-27'; }

function formatDate(ds) {
  if (!ds) return '';
  var d = new Date(ds);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

  h += '<div class="card portfolio-section">';

  h += '</tbody></table></div>';

    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    if (!themeExposure[t.theme]) themeExposure[t.theme] = { pct: 0, tickers: [] };
    themeExposure[t.theme].pct += t.allocation;
    themeExposure[t.theme].tickers.push(sym + ' ' + t.allocation + '%');
  });
  Object.keys(themeExposure).forEach(function(theme) {
    var te = themeExposure[theme];
    var color = theme.includes('Hormuz') ? 'var(--accent-orange)' : 'var(--accent-positive)';

  var sharesPct = 0, optionsPct = 0;
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];

    if (t.instrument === 'Shares') sharesPct += t.allocation;

  });

  h += '<div class="exposure-seg" style="width:' + sharesPct + '%;background:rgba(74,158,255,.3);color:var(--accent-blue)">Shares ' + sharesPct + '%</div>';

  h += '</div>';
  h += '<div style="font-size:12px;color:var(--text-secondary);margin-top:8px">';
  var currExp = {};
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    if (!currExp[t.currency]) currExp[t.currency] = 0;
    currExp[t.currency] += t.allocation;
  });
  var currParts = [];
  Object.keys(currExp).forEach(function(c) { currParts.push('<span class="mono">' + c + ' ' + currExp[c].toFixed(1) + '%</span>'); });
  h += 'Currency: ' + currParts.join(' \u00B7 ');
  h += '</div></div>';

  // Allocation Chart
  h += '<div class="card">';
  h += '<h3>Allocation</h3>';
  h += '<div class="chart-box"><canvas id="allocChart" role="img" aria-label="Portfolio allocation doughnut chart"></canvas></div>';
  h += '</div>';

  el.innerHTML = h;

  setTimeout(function() {
    var ctx = document.getElementById('allocChart');
    if (!ctx) return;
    var labels = [], data = [], colors = [];
    var colorMap = { VOW: '#34D27A', GTT: '#FF9500', CF: '#FF9500', TRI: '#4A9EFF' };
    Object.keys(D.tickers).forEach(function(sym) {
      var t = D.tickers[sym];
      if (t.allocation <= 0) return;
      labels.push(sym + ' (' + t.allocation + '%)');
      data.push(t.allocation);
      colors.push(colorMap[sym] || '#4A9EFF');
    });
    labels.push('Cash (' + D.portfolio.cashPct + '%)');
    data.push(D.portfolio.cashPct);
    colors.push('#2E2E3A');
    new Chart(ctx, {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#F0F0F5', font: { size: 12 }, padding: 12 } } } }
    });
  }, 50);
}

function getTickerChipClass(sym, theme) {
  var t = D.tickers[sym];
  if (t && t.status === 'ACTIVE') return 'ticker-chip-active';
  if (t && t.status === 'MONITORING') return 'ticker-chip-monitoring';
  // Check if parked
  if (D.parked) {
    for (var i = 0; i < D.parked.length; i++) {
      if (D.parked[i].ticker === sym) return 'ticker-chip-other';
    }
  }
  return 'ticker-chip-monitoring';
}

        h += '<span class="ticker-chip ticker-chip-other">' + tk + '</span>';

    Object.keys(impacts).sort(function(a,b){return b-a}).forEach(function(imp) {

    });

    Object.keys(themes).sort().forEach(function(th) {
      h += '<span class="filter-chip" data-filter-type="theme" data-filter-val="' + esc(th) + '" onclick="toggleSignalFilter(this)">' + esc(th) + '</span>';

      var iClass = s.impact >= 5 ? 'impact-5' : s.impact >= 4 ? 'impact-4' : 'impact-3';

      h += '<div class="signal-row" data-impact="' + s.impact + '" data-theme="' + esc(s.theme) + '">';

      h += esc(s.text);
      h += ' <span class="pill ' + tPill + '" style="font-size:10px">' + s.theme + '</span>';
      h += '</div>';
    });
    h += '</div></div>';

  el.innerHTML = h;
}

var _signalFilters = {impact: [], theme: []};
function toggleSignalFilter(chip) {
  var type = chip.getAttribute('data-filter-type');
  var val = chip.getAttribute('data-filter-val');
  var idx = _signalFilters[type].indexOf(val);
  if (idx >= 0) { _signalFilters[type].splice(idx, 1); chip.classList.remove('active'); }
  else { _signalFilters[type].push(val); chip.classList.add('active'); }
  applySignalFilters();
}
function clearSignalFilters() {
  _signalFilters = {impact: [], theme: []};
  var chips = document.querySelectorAll('#signal-filters .filter-chip');
  chips.forEach(function(c) { c.classList.remove('active'); });
  applySignalFilters();
}
function applySignalFilters() {
  var rows = document.querySelectorAll('#signal-rows-container .signal-row');
  rows.forEach(function(row) {
    var imp = row.getAttribute('data-impact');
    var th = row.getAttribute('data-theme');
    var showImpact = _signalFilters.impact.length === 0 || _signalFilters.impact.indexOf(imp) >= 0;
    var showTheme = _signalFilters.theme.length === 0 || _signalFilters.theme.indexOf(th) >= 0;
    row.style.display = (showImpact && showTheme) ? '' : 'none';
  });
}

function parsePrice(s) {
  if (!s) return NaN;
  return parseFloat(String(s).replace(/[^0-9.\-]/g, ''));
}
function dimColor(score) {
  if (score >= 5) return 'var(--accent-positive)';
  if (score >= 4) return 'var(--accent-blue)';
  if (score >= 3) return 'var(--accent-amber)';
  return 'var(--accent-negative)';
}
function renderRangeBar(t) {
  var bear = parsePrice(t.fairValue.bearCaseFV);
  var bull = parsePrice(t.fairValue.bullCaseFV);
  var pw = parsePrice(t.fairValue.probWeightedFV);
  var cur = parsePrice(t.price);
  if (isNaN(bear) || isNaN(bull) || bear >= bull) return '';
  var range = bull - bear;
  var curPct = Math.max(0, Math.min(100, ((cur - bear) / range) * 100));
  var pwPct = Math.max(0, Math.min(100, ((pw - bear) / range) * 100));
  var downPct = bear > 0 && cur > 0 ? (((cur - bear) / cur) * -100).toFixed(0) : '';
  var upPct = pw > 0 && cur > 0 ? (((pw - cur) / cur) * 100).toFixed(0) : '';
  var h = '<div class="range-bar-wrap">';
  h += '<div class="range-labels"><span>' + esc(t.fairValue.bearCaseFV) + '</span><span>' + esc(t.fairValue.bullCaseFV) + '</span></div>';
  h += '<div class="range-bar">';
  h += '<div class="range-marker range-marker-price" style="left:' + curPct + '%" title="Current: ' + esc(t.price) + '"></div>';
  h += '<div class="range-marker range-marker-pw" style="left:' + pwPct + '%" title="PW FV: ' + esc(t.fairValue.probWeightedFV) + '"></div>';
  h += '</div>';
  h += '<div class="range-pct"><span class="range-pct-down">' + downPct + '% to bear</span><span class="range-pct-up">+' + upPct + '% to PW FV</span></div>';
  h += '</div>';
  return h;
}
function renderScenarioStrip(t) {
  if (!t.scenarios || !t.scenarios.length) return '';
  var h = '<div class="scenario-strip">';
  t.scenarios.forEach(function(s) {
    var isBase = s.name.toLowerCase().indexOf('base') >= 0 || (s.prob && s.prob >= 40);
    h += '<span class="scenario-chip' + (isBase ? ' scenario-chip-base' : '') + '">' + esc(s.name) + ' ' + s.prob + '%</span>';
  });
  h += '</div>';
  return h;
}
function renderDimMini(t) {
  if (!t.dimensions) return '';
  var dims = ['D1','D2','D3','D4','D5','D6','D7','D8'];
  var h = '<div class="dim-mini">';
  dims.forEach(function(d) {
    var score = t.dimensions[d] ? t.dimensions[d].score : 0;
    h += '<div class="dim-mini-seg" style="background:' + dimColor(score) + ';opacity:' + (0.4 + score * 0.12) + '" title="' + d + ': ' + score + '/6"></div>';
  });
  h += '</div>';
  return h;
}
function renderTickerCard(sym, t) {
  var hasPosition = t.allocation > 0;
  var h = '<div class="ticker-card' + (hasPosition ? (t.inceptionReturn >= 0 ? ' ticker-card-positive' : ' ticker-card-negative') : '') + '" onclick="openContextPanel(\'' + sym + '\')" style="cursor:pointer">';
  // Header
  h += '<div class="tc-header">';
  h += '<span class="tc-sym">' + sym + '</span>';
  h += '<div style="text-align:right"><span class="tc-price">' + esc(t.price) + '</span>';
  if (hasPosition && t.inceptionReturn) {
    var ret = t.inceptionReturn;
    h += ' <span class="' + (ret >= 0 ? 'tc-return-pos' : 'tc-return-neg') + '">' + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%</span>';
  } else if (t.change && t.change !== 0) {
    h += ' <span class="' + (t.change >= 0 ? 'tc-return-pos' : 'tc-return-neg') + '">' + (t.change >= 0 ? '+' : '') + t.change.toFixed(1) + '%</span>';
  }
  h += '</div></div>';
  // Meta: theme, conviction, RC, instrument, pattern-match
  h += '<div class="tc-meta">';
  h += '<span>' + esc(t.theme) + '</span>';
  if (t.conviction) h += '<span class="pill pill-amber" style="font-size:10px">Conv ' + t.conviction + '/10</span>';
  var rcDots = '';
  for (var i = 0; i < 5; i++) rcDots += (t.rcChecklist && t.rcChecklist[i] && t.rcChecklist[i].met) ? '<span style="color:var(--accent-positive)">&#9679;</span>' : '<span style="color:var(--text-secondary)">&#9675;</span>';
  h += '<span style="font-size:11px;letter-spacing:1px" title="RC ' + (t.rc||0) + '/5">' + rcDots + '</span>';
  h += '<span class="tc-instrument">' + esc(t.instrument || 'Shares') + '</span>';
  if (t.patternMatch) {
    var pmScore = t.patternMatch;
    var pmColor = pmScore >= 28 ? 'var(--accent-positive)' : pmScore >= 22 ? 'var(--accent-blue)' : 'var(--accent-amber)';
    h += '<span style="font-size:10px;color:' + pmColor + ';font-weight:600" title="Pattern-Match Score">PM ' + pmScore + '/35</span>';
  }
  h += '</div>';
  // Range bar
  if (t.fairValue) h += renderRangeBar(t);
  // Scenario strip
  h += renderScenarioStrip(t);
  // Action items
  h += '<div class="tc-actions">';
  if (t.catalysts && t.catalysts.length) {
    h += '<div class="tc-action-item"><span class="tc-action-icon">&#128197;</span><span class="tc-action-text">Next: ' + esc(t.catalysts[0]) + '</span></div>';
  }
  if (t.premortem && t.premortem.length) {
    h += '<div class="tc-action-item"><span class="tc-action-icon">&#9888;&#65039;</span><span class="tc-action-text">' + esc(t.premortem[0]) + '</span></div>';
  }
  if (t.variantViews && t.variantViews.length) {
    h += '<div class="tc-action-item"><span class="tc-action-icon">&#128161;</span><span class="tc-action-text" style="color:var(--accent-blue);font-style:italic">' + esc(t.variantViews[0].substring(0, 100)) + (t.variantViews[0].length > 100 ? '...' : '') + '</span></div>';
  }
  h += '</div>';
  // D1-D8 mini bar
  h += renderDimMini(t);
  h += '</div>';
  return h;
}
function renderMiniCard(sym, t) {
  var upPct = '';
  if (t.fairValue) {
    var pw = parsePrice(t.fairValue.probWeightedFV);
    var cur = parsePrice(t.price);
    if (pw > 0 && cur > 0) upPct = ((pw - cur) / cur * 100).toFixed(0);
  }
  var h = '<div class="ticker-card-mini">';
  // Header: sym + price + upside
  h += '<div class="tcm-header">';
  h += '<span class="tcm-sym" onclick="openContextPanel(\'' + sym + '\')">' + sym + '</span>';
  h += '<div><span class="tcm-price">' + esc(t.price || '\u2014') + '</span>';
  if (upPct) h += ' <span class="tc-return-pos" style="font-size:11px">+' + upPct + '%</span>';
  h += '</div></div>';
  // Meta: theme, conviction, RC
  h += '<div class="tcm-meta">';
  h += '<span>' + esc(t.theme || '') + '</span>';
  if (t.conviction) h += '<span class="pill pill-amber" style="font-size:9px">Conv ' + t.conviction + '</span>';
  if (t.rc !== undefined) {
    var rcDots = '';
    for (var i = 0; i < 5; i++) rcDots += (t.rcChecklist && t.rcChecklist[i] && t.rcChecklist[i].met) ? '<span style="color:var(--accent-positive)">&#9679;</span>' : '<span style="color:var(--text-secondary)">&#9675;</span>';
    h += '<span style="font-size:10px;letter-spacing:1px" title="RC ' + (t.rc||0) + '/5">' + rcDots + '</span>';
  }
  h += '</div>';
  // Range: bear → bull (compact single line)
  if (t.fairValue && t.fairValue.bearCaseFV && t.fairValue.bullCaseFV) {
    h += '<div class="tcm-range">';
    h += '<span class="range-pct-down">' + esc(t.fairValue.bearCaseFV) + '</span>';
    h += '<span style="color:var(--text-secondary)">\u2192</span>';
    h += '<span style="font-weight:600;color:var(--accent-blue)">' + esc(t.fairValue.probWeightedFV || t.fairValue.baseCaseFV) + '</span>';
    h += '<span style="color:var(--text-secondary)">\u2192</span>';
    h += '<span class="range-pct-up">' + esc(t.fairValue.bullCaseFV) + '</span>';
    h += '</div>';
  }
  // Catalyst
  if (t.catalysts && t.catalysts.length) {
    h += '<div class="tcm-catalyst">&#128197; ' + esc(t.catalysts[0]) + '</div>';
  }
  // Variant view (1 line)
  if (t.variantViews && t.variantViews.length) {
    h += '<div class="tcm-variant">' + esc(t.variantViews[0].substring(0, 120)) + (t.variantViews[0].length > 120 ? '...' : '') + '</div>';
  }
  h += '</div>';
  return h;
}
function renderResearch() {
  var el = document.getElementById('sec-research');
  var h = '<h2 class="section-title">Research Pipeline</h2>';

  // Build complete watchlist from D.tickers + D.themes
  var active = [], monitoring = [], parkedList = [], passedList = [];
  var seen = {};

  // First: tickers with full data
  Object.keys(D.tickers).forEach(function(sym) {
    seen[sym] = true;
    var t = D.tickers[sym];
    if (t.status === 'ACTIVE') active.push({sym:sym, t:t, hasData:true});
    else if (t.status === 'MONITORING') monitoring.push({sym:sym, t:t, hasData:true});
    else passedList.push({sym:sym, t:t, hasData:true});
  });

  // Second: tickers only in themes (no full data in D.tickers)
  var parkedMap = {};
  (D.parked || []).forEach(function(p) { parkedMap[p.ticker] = p; });
  D.themes.forEach(function(theme) {
    theme.tickers.forEach(function(tk) {
      if (seen[tk]) return;
      seen[tk] = true;
      if (parkedMap[tk]) {
        parkedList.push({sym:tk, theme:theme.name, reason:parkedMap[tk].reason, triggerCheck:parkedMap[tk].triggerCheck, hasData:false});
      } else if (theme.status === 'DORMANT') {
        passedList.push({sym:tk, theme:theme.name, hasData:false});
      } else {
        monitoring.push({sym:tk, theme:theme.name, hasData:false});
      }
    });
  });

  active.sort(function(a, b) { return ((b.t||{}).conviction || 0) - ((a.t||{}).conviction || 0); });
  monitoring.sort(function(a, b) {
    var ca = (a.t||{}).conviction || 0, cb = (b.t||{}).conviction || 0;
    return cb - ca;
  });

  // Active positions — full cards
  if (active.length) {
    h += '<h3 style="font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Active Positions (' + active.length + ')</h3>';
    h += '<div class="pipeline-grid">';
    active.forEach(function(item) { h += renderTickerCard(item.sym, item.t); });
    h += '</div>';
  }

  // Monitoring — full cards (same as active)
  if (monitoring.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Monitoring (' + monitoring.length + ')</button>';
    h += '<div class="section-body">';
    h += '<div class="pipeline-grid">';
    monitoring.forEach(function(item) {
      if (item.hasData) {
        h += renderTickerCard(item.sym, item.t);
      } else {
        // Minimal card for tickers only in themes
        h += '<div class="ticker-card" style="opacity:.6">';
        h += '<div class="tc-header"><span class="tc-sym">' + item.sym + '</span></div>';
        h += '<div class="tc-meta"><span>' + esc(item.theme) + '</span></div>';
        h += '</div>';
      }
    });
    h += '</div></div>';
  }

  // Parked tickers
  if (parkedList.length) {
    h += '<button class="section-toggle" aria-expanded="false" onclick="toggleSection(this)">Parked (' + parkedList.length + ')</button>';
    h += '<div class="section-body" style="max-height:0;overflow:hidden">';
    h += '<div class="card"><table class="monitoring-table">';
    h += '<thead><tr><th>Ticker</th><th>Theme</th><th>Reason</th><th>Trigger Check</th></tr></thead>';
    h += '<tbody>';
    parkedList.forEach(function(item) {
      h += '<tr style="opacity:.6">';
      h += '<td class="mono">' + item.sym + '</td>';
      h += '<td style="font-size:12px">' + esc(item.theme || (item.t ? item.t.theme : '')) + '</td>';
      h += '<td style="font-size:12px">' + esc(item.reason || '') + '</td>';
      h += '<td style="font-size:12px">' + esc(item.triggerCheck || '\u2014') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // Priority queue (kept, but moved below pipeline)
  if (D.priorityQueue && D.priorityQueue.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Priority Queue (' + D.priorityQueue.length + ')</button>';
    h += '<div class="section-body">';
    h += '<div class="card">';
    D.priorityQueue.forEach(function(p) {
      h += '<div class="priority-item">';
      h += '<div class="priority-score">' + p.score.toFixed(1) + '</div>';
      h += '<div class="priority-body"><div class="p-title">' + (p.score >= 20 ? '\uD83D\uDEA8 ' : '') + esc(p.title) + '</div><div class="p-action">' + esc(p.action) + '</div></div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  el.innerHTML = h;
}

// ═══════════════════════════════════════════
// RENDER: SETTINGS
// ═══════════════════════════════════════════
function renderSettings() {
  var el = document.getElementById('sec-settings');
  var bootMode = localStorage.getItem('bootMode') || 'light';
  var h = '<h2 class="section-title">Settings</h2>';

  h += '<div class="card">';
  h += '<h3>Boot Mode</h3>';
  h += '<div style="display:flex;gap:8px;margin-top:8px">';
  h += '<button class="pill ' + (bootMode === 'light' ? 'pill-blue' : 'pill-grey') + '" style="cursor:pointer;border:none" onclick="setBootMode(\'light\')">Light</button>';
  h += '<button class="pill ' + (bootMode === 'full' ? 'pill-blue' : 'pill-grey') + '" style="cursor:pointer;border:none" onclick="setBootMode(\'full\')">Full</button>';
  h += '</div></div>';

  h += '<div class="card">';
  h += '<h3>Currency Display</h3>';
  h += '<div style="font-size:13px;color:var(--text-secondary)">Multi-currency: USD, EUR, NOK, GBP displayed as-is per position.</div>';
  h += '</div>';

  h += '<div class="card">';
  h += '<h3>Dashboard Info</h3>';
  h += '<div style="font-size:13px;color:var(--text-secondary)">';
  h += 'Generated: ' + (D.lastUpdated || D.generated) + '<br>';
  h += 'Data sources: 5 WATCHLIST.md, 5 THESIS.md, 5 CHANGELOG.md, 4 INDICATORS.md, catalyst-calendar.md, signal-ledger.md, intelligence-digest.md, price-history.csv, theme-watchlist.md<br>';
  h += 'Positions: ' + D.portfolio.slotsUsed + ' INVESTMENT (' + Object.keys(D.tickers).join(', ') + ') + Cash<br>';
  h += 'Themes: ' + D.themes.length + ' (' + D.themes.filter(function(t){return t.priority>=20}).length + ' high-priority, ' + D.themes.filter(function(t){return t.status==="DORMANT"}).length + ' dormant)';
  h += '</div></div>';

  el.innerHTML = h;
}

function setBootMode(mode) {
  localStorage.setItem('bootMode', mode);
  _renderedSections['settings'] = false;
  renderSection('settings');
}

// ═══════════════════════════════════════════
// SCROLL BUTTON
// ═══════════════════════════════════════════
window.addEventListener('scroll', function() {
  var btn = document.getElementById('scrollTop');
  if (window.scrollY > 300) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('searchOverlay').classList.contains('active')) {
      document.getElementById('searchOverlay').classList.remove('active');
    } else if (document.getElementById('ctx-panel').classList.contains('open')) {
      closeContextPanel();
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
  var saved = localStorage.getItem('activeSection');
  if (saved && document.getElementById('sec-' + saved)) {
    switchSection(saved);
  } else {
    renderSection('home');
  }
});

// ═══════════════════════════════════════════
// PWA: Service Worker
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) { reg.update(); })
    .catch(function(err) { console.log('SW registration failed:', err); });
  navigator.serviceWorker.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'UPDATE_AVAILABLE') showUpdateBanner();
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  var b = document.createElement('div');
  b.id = 'updateBanner';
  b.className = 'update-banner';
  b.innerHTML = 'New data available <button onclick="location.reload()">Refresh</button>';
  document.body.appendChild(b);
  setTimeout(function() { b.style.transition = 'opacity 0.3s'; b.style.opacity = '0'; setTimeout(function() { b.remove(); }, 400); }, 4000);
}

// ── Theme toggle ──
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('vault-theme', next);
  updateThemeIcon(next);
  // Update meta theme-color
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', next === 'light' ? '#F5F5F7' : '#0D0D0F');
}

function updateThemeIcon(theme) {
  var btn = document.querySelector('.theme-btn');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  } else {
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  }
}

// Apply saved theme on load
(function() {
  var saved = localStorage.getItem('vault-theme') || 'dark';
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', '#F5F5F7');
  }
  updateThemeIcon(saved);
})();
</script>
