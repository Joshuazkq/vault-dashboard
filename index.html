// ── Computed fields ──
function computePriorityQueue() {
  var items = [];
  for (var sym in D.tickers) {
    var t = D.tickers[sym];
    var posW = t.allocation > 0 ? t.allocation / 10 : 1;
    if (t.catalysts) {
      t.catalysts.forEach(function(c) {
        var urgMul = c.urgency==='overdue'?10:c.urgency==='week2'?8:c.urgency==='week3'?6:c.urgency==='month2'?4:c.urgency==='month3'?3:2;
        var catW = t.allocation > 0 ? 1.5 : 1.0;
        var score = Math.round(posW * urgMul * catW * 10) / 10;
        items.push({ticker:sym,event:c.event,date:c.date,score:score,type:'Catalyst',action:'Monitor and assess impact'});
      });
    }
    if (t.conviction > 7 && t.rc < 4) {
      var score = Math.round(posW * 6 * 1.0 * 10) / 10;
      items.push({ticker:sym,event:'RC gap: conviction '+t.conviction+' but RC '+t.rc+'/5',date:'Now',score:score,type:'Research Gap',action:'Run filing-review or transcript-review'});
    }
  }
  items.sort(function(a,b){return b.score - a.score});
  D.priorityQueue = items.slice(0, 15);
}
computePriorityQueue();

function daysSince(dateStr) {
  var d = new Date(dateStr);
  var now = new Date('2026-03-25');
  return Math.floor((now - d) / 86400000);
}

function getStaleness(sym) {
  var t = D.tickers[sym];
  if (!t.recentNotes || t.recentNotes.length === 0) return 999;
  return daysSince(t.recentNotes[0].date);
}

function parseFVNumber(fvStr) {
  if (!fvStr) return null;
  var m = fvStr.match(/([\d,.]+)/);
  return m ? parseFloat(m[1].replace(',','')) : null;
}

function computeUpside(sym) {
  var t = D.tickers[sym];
  if (!t.fairValue || !t.currentPrice) return null;
  var fv = parseFVNumber(t.fairValue.probWeightedFV);
  if (!fv) return null;
  return ((fv - t.currentPrice.price) / t.currentPrice.price * 100).toFixed(0);
}

function renderAlertDrawer() {
  var groups = getAlertGroups();
  var drawer = document.getElementById('alertDrawer');
  if (!drawer) return;
  var html = '';
  for (var g in groups) {
    if (!alertGroupState[g]) continue;
    html += '<div class="alert-group"><div class="alert-group-header">'+g.toUpperCase()+' ('+groups[g].length+')</div>';
    groups[g].forEach(function(a) {
      html += '<div class="alert alert-'+a.type+'">'+a.text+'</div>';
    });
    html += '</div>';
  }
  drawer.innerHTML = html;
  drawer.classList.toggle('open', html.length > 0);
}

// ── Sortable Tables ──
var sortState = {};
function sortTable(tableId, col) {
  var table = document.getElementById(tableId);
  if (!table) return;
  var rows = Array.from(table.querySelectorAll('tbody tr'));
  var key = tableId+'-'+col;
  sortState[key] = sortState[key] === 'asc' ? 'desc' : 'asc';
  var dir = sortState[key] === 'asc' ? 1 : -1;
  rows.sort(function(a,b) {
    var va = a.cells[col].textContent.replace(/[^0-9.\-]/g,'');
    var vb = b.cells[col].textContent.replace(/[^0-9.\-]/g,'');
    var na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return a.cells[col].textContent.localeCompare(b.cells[col].textContent) * dir;
  });
  var tbody = table.querySelector('tbody');
  rows.forEach(function(r){tbody.appendChild(r)});
  table.querySelectorAll('th').forEach(function(th,i){
    th.classList.toggle('sorted',i===col);
    var arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = i===col?(sortState[key]==='asc'?'\u25B2':'\u25BC'):'\u25BC';
  });
}

  var dimRows = scored.map(function(e){var s=e[0],t=e[1];var cells='';for(var d=1;d<=8;d++){var v=t.dimensions['D'+d];var c=v>=5?'#4ade80':v>=4?'#60a5fa':v>=3?'#fbbf24':'#f87171';cells+='<td style="color:'+c+';font-weight:600">'+(v>=6?v+'/5':v+'/5')+'</td>'}var ac=t.clusterA>=80?'#4ade80':'#fbbf24';var bc=t.clusterB>=80?'#4ade80':'#fbbf24';return '<tr><td><span class="ticker-link" onclick="openOverlay(\''+s+'\')">'+s+'</span></td>'+cells+'<td style="color:'+ac+'">'+t.clusterA+'%</td><td style="color:'+bc+'">'+t.clusterB+'%</td></tr>'}).join('');

  el.innerHTML = themeFilterHtml()+
    sectionHtml('prio','Priority Queue')+sectionContentStart('prio')+'<div class="grid-2">'+prioHtml+'</div>'+sectionContentEnd()+
    sectionHtml('rc','Research Confidence')+sectionContentStart('rc')+'<div class="grid">'+rcHtml+'</div>'+sectionContentEnd()+
    sectionHtml('questions','Questions Tracker')+sectionContentStart('questions')+'<div class="grid">'+qHtml+'</div>'+sectionContentEnd()+
    sectionHtml('debates','Debates Tracker')+sectionContentStart('debates')+'<div class="grid">'+dHtml+'</div>'+sectionContentEnd()+

      var s=e[0],t=e[1];var canvas=document.getElementById('qChart_'+s);if(!canvas)return;
      var crit=t.questions.critical.filter(function(q){return!q.resolved}).length;var open=t.questions.open.filter(function(q){return!q.resolved}).length;
      new Chart(canvas,{type:'bar',data:{labels:['Critical','Open','Resolved'],datasets:[{data:[crit,open,t.questions.resolved],backgroundColor:['#ef4444','#f59e0b','#22c55e'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94a3b8'}},y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#94a3b8'}}}}});

      var op=t.debates.filter(function(d){return d.resolution==='OPEN'}).length;var re=t.debates.filter(function(d){return d.resolution==='RESOLVED'}).length;var pa=t.debates.filter(function(d){return d.resolution==='PARTIALLY COUNTERED'}).length;

  el.innerHTML = themeFilterHtml()+
    sectionHtml('promo','Promotion Readiness — Active (No Position)')+sectionContentStart('promo')+
    (activeNoPos.length===0?'<div class="card"><p style="color:#94a3b8">No active tickers without positions.</p></div>':'')+
    '<div class="grid">'+activeCards+'</div>'+sectionContentEnd()+
    sectionHtml('palerts','Price Alert Proximity')+sectionContentStart('palerts')+
    '<div class="grid">'+alertProxHtml+'</div>'+sectionContentEnd()+
    sectionHtml('mon','Monitoring Tickers')+sectionContentStart('mon')+'<div class="grid">'+monCards+'</div>'+sectionContentEnd();
}

// ═══════════════════════════════════════════
// TICKER OVERLAY with Sub-Tabs
// ═══════════════════════════════════════════
function openOverlay(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  var overlay = document.getElementById('tickerOverlay');
  var content = document.getElementById('overlayContent');

  var badge = t.portfolioType?'<span class="badge badge-'+t.portfolioType.toLowerCase()+'">'+t.portfolioType+'</span>':'';
  var statusBadge = '<span class="badge badge-'+t.status.toLowerCase()+'">'+t.status+'</span>';
  var allocSpan = t.allocation>0?'<span style="font-size:13px;color:#4ade80;margin-left:8px;font-weight:600">'+t.allocation+'% allocation</span>':'';
  var convColor = t.conviction>=9?'#4ade80':t.conviction>=7?'#60a5fa':'#fbbf24';

  // FV box
  var fvHtml = '';
  if (t.fairValue) {
    fvHtml = '<div class="fv-box"><div class="fv-method">'+t.fairValue.methodology+' &middot; '+t.fairValue.thesisType+' &middot; Updated '+t.fairValue.lastUpdated+'</div><div class="fv-grid"><div class="fv-item"><div class="fv-label">Bear</div><div class="fv-value fv-bear">'+t.fairValue.bearCaseFV+'</div></div><div class="fv-item"><div class="fv-label">Base</div><div class="fv-value fv-base">'+t.fairValue.baseCaseFV+'</div></div><div class="fv-item"><div class="fv-label">Prob-Wtd</div><div class="fv-value fv-prob">'+t.fairValue.probWeightedFV+'</div></div><div class="fv-item"><div class="fv-label">Bull</div><div class="fv-value fv-bull">'+t.fairValue.bullCaseFV+'</div></div></div></div>';
  } else {
    fvHtml = '<div class="fv-box" style="border-color:rgba(255,255,255,.1)"><div style="color:#94a3b8;font-size:13px">No fair value estimate. Run fair-value-estimation skill.</div></div>';
  }

  // Scenarios
  var scenarioHtml = '';
  if (t.scenarios && t.scenarios.length > 0) {
    scenarioHtml = '<table><tr><th>Scenario</th><th>Target</th><th>Prob</th></tr>'+t.scenarios.map(function(s){return '<tr><td>'+s.name+'</td><td style="font-weight:600">'+s.target+'</td><td>'+s.prob+'%</td></tr>'}).join('')+'</table>';
  }

  // Price info
  var priceHtml = '';
  if (t.currentPrice) {
    var upside = computeUpside(sym);
    priceHtml = '<div class="metric"><span class="label">Current Price</span><span class="value">'+t.currentPrice.price+' '+t.currentPrice.currency+' <span style="color:'+(t.currentPrice.change>=0?'#4ade80':'#f87171')+';font-size:12px">'+(t.currentPrice.change>=0?'+':'')+t.currentPrice.change.toFixed(1)+'%</span></span></div>';
    if (upside !== null) priceHtml += '<div class="metric"><span class="label">Upside (Prob-Wtd)</span><span class="value" style="color:'+(upside>=50?'#4ade80':upside>=20?'#60a5fa':'#fbbf24')+'">'+(upside>0?'+':'')+upside+'%</span></div>';
  }

  // Summary panel
  // Business background & thesis
  var bgHtml = '';
  if (t.businessBackground) {
    bgHtml += '<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Business</div><div style="font-size:13px;color:#c4b5fd;line-height:1.5;padding:12px 16px;border-radius:12px;background:rgba(139,92,246,.06);border-left:2px solid #8b5cf6">'+t.businessBackground+'</div></div>';
  }
  if (t.thesisOverview) {
    bgHtml += '<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Thesis</div><div style="font-size:13px;color:#a5d6a7;line-height:1.5;padding:12px 16px;border-radius:12px;background:rgba(22,163,74,.06);border-left:2px solid #22c55e">'+t.thesisOverview+'</div></div>';
  }

  var summaryPanel = '<div class="overlay-panel active" id="ovPanel_summary">'+bgHtml+
    '<div class="grid-2" style="margin-bottom:16px"><div>'+priceHtml+
    '<div class="metric"><span class="label">Conviction</span><span class="value" style="color:'+convColor+';font-size:20px">'+t.conviction+'/10</span></div>'+
    '<div class="metric"><span class="label">Cluster A</span><span class="value">'+(t.clusterA>0?t.clusterA+'%':'--')+'</span></div>'+
    '<div class="metric"><span class="label">Cluster B</span><span class="value">'+(t.clusterB>0?t.clusterB+'%':'--')+'</span></div>'+
    '<div class="metric"><span class="label">RC</span><span class="value">'+t.rc+'/5</span></div></div>'+
    '<div><div class="radar-container"><canvas id="radarChart"></canvas></div></div></div>'+fvHtml+scenarioHtml+'</div>';

  // Catalysts panel
  var catalystHtml = '<div class="overlay-panel" id="ovPanel_catalysts">';
  if (t.catalysts && t.catalysts.length > 0) {
    catalystHtml += '<table><tr><th>Date</th><th>Event</th><th>Type</th><th>Dim</th></tr>'+t.catalysts.map(function(c){return '<tr><td>'+c.date+'</td><td>'+c.event+'</td><td><span class="pill pill-'+(c.type==='Hard'?'blue':'amber')+'">'+c.type+'</span></td><td>'+c.dim+'</td></tr>'}).join('')+'</table>';
  } else { catalystHtml += '<p style="color:#94a3b8">No catalysts defined.</p>'; }
  catalystHtml += '</div>';

  // Research panel (questions, debates, variant views, notes)
  var researchHtml = '<div class="overlay-panel" id="ovPanel_research">';
  // Dim table
  var dimNames = ['D1. Fundamentals','D2. Valuation','D3. Mispricing','D4. Downside','D5. Simplicity','D6. Optionality','D7. Evidence','D8. Catalyst'];
  var dimClusters = ['A','A','A','B','B','B','B','B'];
  researchHtml += '<h4>Conviction Scorecard</h4><table><tr><th>Dimension</th><th>Score</th><th>Cluster</th></tr>';
  for (var i=0;i<8;i++){
    var score = t.dimensions['D'+(i+1)];
    var c = score>=5?'#4ade80':score>=4?'#60a5fa':score>=3?'#fbbf24':score>0?'#f87171':'#64748b';
    researchHtml += '<tr><td>'+dimNames[i]+'</td><td style="color:'+c+';font-weight:700">'+(score>0?score+'/5':'--')+'</td><td>'+dimClusters[i]+'</td></tr>';
  }
  researchHtml += '</table>';
  // Questions
  if (t.questions && (t.questions.critical.length > 0 || t.questions.open.length > 0)) {
    researchHtml += '<h4>Open Questions</h4>';
    if (t.questions.critical.length > 0) researchHtml += '<div class="question-cat"><h5 style="color:#f87171">Critical Path</h5>'+t.questions.critical.map(function(q){return '<div class="question-item">'+q.q+'</div>'}).join('')+'</div>';
    if (t.questions.open.length > 0) researchHtml += '<div class="question-cat"><h5>Open Items</h5>'+t.questions.open.map(function(q){return '<div class="question-item">'+q.q+'</div>'}).join('')+'</div>';
    researchHtml += '<div style="font-size:12px;color:#64748b;margin-top:4px">'+t.questions.resolved+' resolved</div>';
  }
  // Debates
  if (t.debates && t.debates.length > 0) {
    researchHtml += '<h4>Debates</h4>'+t.debates.map(function(d){var pc=d.resolution==='RESOLVED'?'green':d.resolution==='OPEN'?'amber':'blue';return '<div class="debate-vector"><div class="dv-title">'+d.vector+' <span class="pill pill-'+pc+'" style="margin-left:8px">'+d.resolution+'</span></div><div class="dv-status">'+d.side+' challenged &middot; '+d.impact+'</div></div>'}).join('');
  }
  // Variant Views
  if (t.variantViews && t.variantViews.length > 0) {
    researchHtml += '<h4>Variant Views</h4>'+t.variantViews.map(function(v){return '<div class="variant-view">'+v+'</div>'}).join('');
  }
  // Notes
  if (t.recentNotes && t.recentNotes.length > 0) {
    researchHtml += '<h4>Recent Notes</h4>'+t.recentNotes.map(function(n){return '<div style="font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><strong>'+n.date+'</strong> &mdash; '+n.title+'</div>'}).join('');
  }
  researchHtml += '</div>';

  // Valuation panel
  var valuationHtml = '<div class="overlay-panel" id="ovPanel_valuation">';
  if (t.valuation) {
    var v = t.valuation;
    // Methodology & Rationale
    valuationHtml += '<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:#60a5fa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Methodology: '+v.methodology+'</div><div style="font-size:13px;color:#94a3b8;line-height:1.5;padding:12px 16px;border-radius:12px;background:rgba(59,130,246,.06);border-left:2px solid #3b82f6">'+v.rationale+'</div></div>';
    // Key Assumptions
    if (v.assumptions && v.assumptions.length > 0) {
      valuationHtml += '<h4>Key Assumptions</h4><table><tr><th>Parameter</th><th>Value</th></tr>'+v.assumptions.map(function(a){return '<tr><td style="color:#94a3b8">'+a.label+'</td><td style="font-weight:600">'+a.value+'</td></tr>'}).join('')+'</table>';
    }
    // Fair Value Snapshot (reuse existing FV data)
    if (t.fairValue) {
      valuationHtml += '<h4>Fair Value Snapshot</h4>'+fvHtml;
    }
    // Scenarios (reuse)
    if (t.scenarios && t.scenarios.length > 0) {
      valuationHtml += '<h4>Scenario Outcomes</h4><table><tr><th>Scenario</th><th>Target</th><th>Probability</th></tr>'+t.scenarios.map(function(s){return '<tr><td>'+s.name+'</td><td style="font-weight:600">'+s.target+'</td><td>'+s.prob+'%</td></tr>'}).join('')+'</table>';
    }
    // Sensitivity Table
    if (v.sensitivity) {
      var s = v.sensitivity;
      valuationHtml += '<h4>'+s.title+'</h4><table><tr><th></th>'+s.cols.map(function(c){return '<th>'+c+'</th>'}).join('')+'</tr>'+s.rows.map(function(r){return '<tr><td style="color:#94a3b8;font-weight:600">'+r.label+'</td>'+r.vals.map(function(val){return '<td style="font-weight:600">'+val+'</td>'}).join('')+'</tr>'}).join('')+'</table>';
    }
    // Peer Comparables
    if (v.peers && v.peers.length > 0) {
      valuationHtml += '<h4>Peer Comparables</h4><table><tr><th>Company</th><th>Multiple</th></tr>'+v.peers.map(function(p){return '<tr><td>'+p.name+'</td><td style="font-weight:600">'+p.multiple+'</td></tr>'}).join('')+'</table>';
    }
    valuationHtml += '<div style="font-size:11px;color:#64748b;margin-top:12px">Last updated: '+v.lastUpdated+'</div>';
  } else {
    valuationHtml += '<p style="color:#94a3b8">No valuation model available. Run fair-value-estimation skill to generate.</p>';
  }
  valuationHtml += '</div>';

  // Financials panel
  var financialsHtml = '<div class="overlay-panel" id="ovPanel_financials">';
  if (t.financials) {
    for (var k in t.financials) {
      if (t.financials[k]) financialsHtml += '<div class="metric"><span class="label">'+k.replace(/([A-Z])/g,' $1').trim()+'</span><span class="value">'+t.financials[k]+'</span></div>';
    }
  }
  financialsHtml += '</div>';

  content.innerHTML = '<button class="overlay-close" onclick="closeOverlay()">&times;</button>'+
    '<h2 style="font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px">'+sym+' &mdash; '+t.company+'</h2>'+
    '<div style="margin-bottom:8px">'+badge+' '+statusBadge+' <span style="font-size:13px;color:#94a3b8;margin-left:8px">'+t.theme+'</span>'+allocSpan+'</div>'+
    '<div class="overlay-tabs">'+
    '<div class="overlay-tab active" onclick="switchOverlayTab(\'summary\')">Summary</div>'+
    '<div class="overlay-tab" onclick="switchOverlayTab(\'valuation\')">Valuation</div>'+
    '<div class="overlay-tab" onclick="switchOverlayTab(\'catalysts\')">Catalysts</div>'+
    '<div class="overlay-tab" onclick="switchOverlayTab(\'research\')">Research</div>'+
    '<div class="overlay-tab" onclick="switchOverlayTab(\'financials\')">Financials</div>'+
    '</div>'+summaryPanel+valuationHtml+catalystHtml+researchHtml+financialsHtml;

  overlay.classList.add('active');

  setTimeout(function(){
    var dims = t.dimensions;
    if (dims.D1 > 0) {
      new Chart(document.getElementById('radarChart'),{
        type:'radar',
        data:{labels:['D1','D2','D3','D4','D5','D6','D7','D8'],datasets:[{label:sym,data:[dims.D1,dims.D2,dims.D3,dims.D4,dims.D5,dims.D6,dims.D7,dims.D8],backgroundColor:'rgba(59,130,246,.15)',borderColor:'#3b82f6',borderWidth:2,pointBackgroundColor:'#3b82f6'}]},
        options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:6,ticks:{stepSize:1,color:'#64748b',backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.08)'},pointLabels:{color:'#94a3b8',font:{size:12}}}},plugins:{legend:{display:false}}}
      });
    }
  },50);
}

function switchOverlayTab(tab) {
  document.querySelectorAll('.overlay-tab').forEach(function(e){e.classList.remove('active')});
  document.querySelectorAll('.overlay-panel').forEach(function(e){e.classList.remove('active')});
  event.target.classList.add('active');
  var panel = document.getElementById('ovPanel_'+tab);
  if (panel) panel.classList.add('active');
}

function closeOverlay() {
  document.getElementById('tickerOverlay').classList.remove('active');
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', function(e) {
  var help = document.getElementById('helpOverlay');
  if (help.classList.contains('active')) { help.classList.remove('active'); return; }
  if (e.target.tagName === 'INPUT') return;
  var overlay = document.getElementById('tickerOverlay');
  if (e.key === 'Escape' && overlay.classList.contains('active')) { closeOverlay(); return; }
  if (e.key === '?') { help.classList.add('active'); return; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchBox').focus(); return; }
  var tabs = ['portfolio','research','themes','pipeline'];
  var num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    document.querySelectorAll('.content').forEach(function(el){el.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
    document.getElementById(tabs[num-1]).classList.add('active');
    document.querySelectorAll('.tab')[num-1].classList.add('active');
    renderTab(tabs[num-1]);
  }
});

// ── Init ──
renderKPI();
renderPortfolio();
</script>
