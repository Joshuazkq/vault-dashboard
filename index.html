button:focus:not(:focus-visible) { outline: none; }

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
  .ctx-panel { transition: none !important; }
  .alert-drawer { transition: none !important; }
  .section-body { transition: none !important; }
}

/* ── PRINT ── */
@media print {
  body { background: #fff; color: #000; }
  .sidebar, .mobile-nav, .scroll-top, .ctx-panel, .search-overlay { display: none !important; }
  .main-content { margin-left: 0 !important; margin-right: 0 !important; }
  .section { display: block !important; page-break-inside: avoid; }
  .card { border-color: #ccc; }
  .pill { border: 1px solid #ccc; }
}

/* ── MOBILE (<768px) ── */
@media (max-width: 767px) {
  .sidebar { display: none; }
  .mobile-nav { display: block; }
  .main-content { margin-left: 0; padding: 16px; padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))); padding-bottom: 72px; }
  .main-content.panel-open { margin-right: 0; }
  .grid-2 { grid-template-columns: 1fr; }
  .section-title { margin-top: 0; }
  .ctx-panel {
    width: 100%; height: 80vh; top: auto; bottom: 0;
    transform: translateY(100%); border-left: none;
    border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
  }
  .ctx-panel.open { transform: translateY(0); }
  .scroll-top { bottom: 72px; right: 16px; }
  .update-banner { top: max(48px, calc(4px + env(safe-area-inset-top, 48px))); right: 8px; }
}
/* PWA standalone mode: ensure extra top padding for status bar */
@media (display-mode: standalone) {
  .main-content { padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))) !important; }
}
/* iOS standalone detection fallback */
body.pwa-standalone .main-content { padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))) !important; }

// NAVIGATION

var _currentSection = 'home';
var _renderedSections = {};

function switchSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-item, .bnav-btn').forEach(function(b) {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  var sb = document.getElementById('sb-' + id);
  var bn = document.getElementById('bn-' + id);
  if (sb) { sb.classList.add('active'); sb.setAttribute('aria-current', 'page'); }
  if (bn) { bn.classList.add('active'); }
  _currentSection = id;
  localStorage.setItem('activeSection', id);
  window.scrollTo({ top: 0 });
  renderSection(id);
}

function renderSection(id) {
  if (_renderedSections[id]) return;
  switch (id) {
    case 'home': renderHome(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'themes': renderThemes(); break;
    case 'signals': renderSignals(); break;
    case 'calendar': renderCalendar(); break;
    case 'research': renderResearch(); break;
    case 'settings': renderSettings(); break;
  }
  _renderedSections[id] = true;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// SEARCH

function openSearch() {
  document.getElementById('searchOverlay').classList.add('active');
  var inp = document.getElementById('searchInput');
  inp.value = '';
  inp.focus();
  document.getElementById('searchResults').innerHTML = '';
}

function closeSearch(e) {
  if (e && e.target !== document.getElementById('searchOverlay')) return;
  document.getElementById('searchOverlay').classList.remove('active');
}

function handleSearch(q) {
  var el = document.getElementById('searchResults');
  if (!q || q.length < 1) { el.innerHTML = ''; return; }
  q = q.toUpperCase();
  var results = [];
  Object.keys(D.tickers).forEach(function(sym) {
    if (sym.indexOf(q) >= 0 || D.tickers[sym].company.toUpperCase().indexOf(q) >= 0)
      results.push({ sym: sym, co: D.tickers[sym].company });
  });
  if (!results.length) { el.innerHTML = ''; return; }
  el.innerHTML = results.map(function(r) {
    return '<li role="option" class="search-result" tabindex="0" onclick="selectSearchResult(\'' + r.sym + '\')"><span class="sr-ticker">' + r.sym + '</span><span class="sr-company">' + r.co + '</span></li>';
  }).join('');
}

function selectSearchResult(sym) {
  document.getElementById('searchOverlay').classList.remove('active');
  openContextPanel(sym);
}

var _prevFocus = null;
var _ctxSym = null;
var _ctxTab = 'summary';

function openContextPanel(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  _prevFocus = document.activeElement;
  _ctxSym = sym;
  _ctxTab = 'summary';
  document.getElementById('ctx-title').textContent = sym + ' \u2014 ' + t.company;

  var tabs = ['summary', 'valuation', 'catalysts', 'research', 'financials'];
  var tabLabels = ['Summary', 'Valuation', 'Catalysts', 'Research', 'Financials'];
  var tabHtml = '';
  tabs.forEach(function(tab, i) {
    tabHtml += '<button class="ctx-tab' + (i === 0 ? ' active' : '') + '" data-ctx-tab="' + tab + '" onclick="switchCtxTab(\'' + tab + '\')">' + tabLabels[i] + '</button>';
  });
  document.getElementById('ctxTabs').innerHTML = tabHtml;

  renderCtxTab('summary');
  document.getElementById('ctx-panel').classList.add('open');
  document.querySelector('.main-content').classList.add('panel-open');
}

function closeContextPanel() {
  document.getElementById('ctx-panel').classList.remove('open');
  document.querySelector('.main-content').classList.remove('panel-open');
  if (_prevFocus) _prevFocus.focus();
  _ctxSym = null;
}

function switchCtxTab(tab) {
  _ctxTab = tab;
  document.querySelectorAll('.ctx-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.ctx-tab[data-ctx-tab="' + tab + '"]').classList.add('active');
  renderCtxTab(tab);
}

function toggleSection(btn) {
  btn.classList.toggle('collapsed');
  var expanded = !btn.classList.contains('collapsed');
  btn.setAttribute('aria-expanded', String(expanded));
  var body = btn.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function changeColor(val) {
  return val > 0 ? 'var(--accent-positive)' : val < 0 ? 'var(--accent-negative)' : 'var(--text-secondary)';
}

function changePrefix(val) {
  return val > 0 ? '+' : '';
}

function dteClass(dte) {
  return dte >= 45 ? 'dte-green' : dte >= 30 ? 'dte-amber' : 'dte-red';
}

function computeUpside(sym) {
  var t = D.tickers[sym];
  if (!t || !t.fairValue || !t.fairValue.probWeightedFV || !t.price) return null;
  var fvStr = t.fairValue.probWeightedFV.replace(/[^0-9.\-]/g, '');
  var priceStr = t.price.replace(/[^0-9.\-]/g, '');
  var fv = parseFloat(fvStr), price = parseFloat(priceStr);
  if (isNaN(fv) || isNaN(price) || price === 0) return null;
  return Math.round((fv / price - 1) * 100);
}

function todayStr() { return D.generated || '2026-03-25'; }

function formatDate(ds) {
  if (!ds) return '';
  var d = new Date(ds);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

    h += '<h3><i data-lucide="clock" style="width:16px;height:16px;vertical-align:middle" aria-hidden="true"></i> Options Monitor</h3>';
    h += '<table>';
    h += '<caption style="text-align:left;font-size:12px;color:var(--text-secondary);margin-bottom:8px">Options positions with DTE tracking</caption>';
    h += '<thead><tr><th>Ticker</th><th>Strike/Expiry</th><th>DTE</th><th>Status</th><th>Next Catalyst</th><th>Alignment</th></tr></thead>';
    h += '<tbody>';
    D.options.forEach(function(o) {
      var dc = dteClass(o.dte);
      var statusPill = o.dte >= 45 ? 'pill-green' : o.dte >= 30 ? 'pill-amber' : 'pill-orange';
      var statusText = o.dte >= 45 ? 'GREEN' : o.dte >= 30 ? 'AMBER' : 'RED';
      var nextCat = o.catalystAlignment && o.catalystAlignment.length ? o.catalystAlignment[0] : null;
      h += '<tr>';
      h += '<td><button class="ticker-btn" onclick="openContextPanel(\'' + o.ticker + '\')">' + o.ticker + '</button></td>';
      h += '<td class="mono">' + o.strike + (o.instrument === 'Call' ? 'C' : 'P') + ' ' + o.expiry + '</td>';
      h += '<td><span class="dte-badge ' + dc + '">' + o.dte + '</span></td>';
      h += '<td><span class="pill ' + statusPill + '" style="font-size:10px">' + statusText + '</span></td>';
      h += '<td style="font-size:12px">' + (nextCat ? nextCat.catalyst + ' ' + nextCat.date : '\u2014') + '</td>';
      h += '<td style="color:var(--accent-positive)">' + (nextCat ? '\u2705 Ample' : '\u2014') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
    h += '<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;padding:8px;background:rgba(255,149,0,.06);border-radius:8px;border-left:2px solid var(--accent-orange)">';
    h += '<strong>Next decision point:</strong> CF $90C on May 19 (30 DTE). Action: roll/exercise/close. Q1 earnings May 6 is the last major catalyst before theta accelerates.';
    h += '</div>';
    h += '</div>';
  }

  // Exposure Analysis
  h += '<div class="grid-2">';
  h += '<div class="card">';
  h += '<h3>Exposure by Theme</h3>';
  var themeExposure = {};
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    if (!themeExposure[t.theme]) themeExposure[t.theme] = { pct: 0, tickers: [] };
    themeExposure[t.theme].pct += t.allocation;
    themeExposure[t.theme].tickers.push(sym + ' ' + t.allocation + '%');
  });
  Object.keys(themeExposure).forEach(function(theme) {
    var te = themeExposure[theme];
    var color = theme.includes('Hormuz') ? 'var(--accent-orange)' : 'var(--accent-positive)';
    h += '<div style="margin-bottom:8px">';
    h += '<span style="font-size:12px;color:var(--text-secondary)">' + theme + '</span>';
    h += '<div class="gauge"><div class="gauge-fill" style="width:' + (te.pct / D.portfolio.deployedPct * 100) + '%;background:' + color + '"></div></div>';
    h += '<span class="mono tabnum" style="font-size:12px">' + te.pct.toFixed(1) + '% (' + te.tickers.join(' + ') + ')</span>';
    h += '</div>';
  });
  h += '<div><span style="font-size:12px;color:var(--text-secondary)">Cash</span><div class="gauge"><div class="gauge-fill" style="width:' + (D.portfolio.cashPct) + '%;background:var(--text-secondary)"></div></div><span class="mono tabnum" style="font-size:12px">' + D.portfolio.cashPct + '%</span></div>';
  h += '</div>';

  var sharesPct = 0, optionsPct = 0;
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    if (t.instrument === 'Shares') sharesPct += t.allocation;
    else optionsPct += t.allocation;
  });
  h += '<div class="card">';
  h += '<h3>Exposure by Instrument</h3>';
  h += '<div class="exposure-bar">';
  h += '<div class="exposure-seg" style="width:' + sharesPct + '%;background:rgba(74,158,255,.3);color:var(--accent-blue)">Shares ' + sharesPct + '%</div>';
  h += '<div class="exposure-seg" style="width:' + optionsPct.toFixed(2) + '%;background:rgba(255,149,0,.3);color:var(--accent-orange)">Options ' + optionsPct.toFixed(2) + '%</div>';
  h += '<div class="exposure-seg" style="width:' + D.portfolio.cashPct + '%;background:rgba(142,142,153,.2);color:var(--text-secondary)">Cash ' + D.portfolio.cashPct + '%</div>';
  h += '</div>';
  h += '<div style="font-size:12px;color:var(--text-secondary);margin-top:8px">';
  var currExp = {};
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    if (!currExp[t.currency]) currExp[t.currency] = 0;
    currExp[t.currency] += t.allocation;
  });
  var currParts = [];
  Object.keys(currExp).forEach(function(c) { currParts.push('<span class="mono">' + c + ' ' + currExp[c].toFixed(1) + '%</span>'); });
  h += 'Currency: ' + currParts.join(' \u00B7 ');
  h += '</div></div>';
  h += '</div>';

  // Allocation Chart
  h += '<div class="card">';
  h += '<h3>Allocation</h3>';
  h += '<div class="chart-box"><canvas id="allocChart" role="img" aria-label="Portfolio allocation doughnut chart"></canvas></div>';
  h += '</div>';

  el.innerHTML = h;

  setTimeout(function() {
    var ctx = document.getElementById('allocChart');
    if (!ctx) return;
    var labels = [], data = [], colors = [];
    var colorMap = { VOW: '#34D27A', GTT: '#FF9500', CF: '#FF9500', TRI: '#4A9EFF' };
    Object.keys(D.tickers).forEach(function(sym) {
      var t = D.tickers[sym];
      if (t.allocation <= 0) return;
      labels.push(sym + ' (' + t.allocation + '%)');
      data.push(t.allocation);
      colors.push(colorMap[sym] || '#4A9EFF');
    });
    labels.push('Cash (' + D.portfolio.cashPct + '%)');
    data.push(D.portfolio.cashPct);
    colors.push('#2E2E3A');
    new Chart(ctx, {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#F0F0F5', font: { size: 12 }, padding: 12 } } } }
    });
  }, 50);
}

// RENDER: THEMES
// ═══════════════════════════════════════════
function renderThemes() {
  var el = document.getElementById('sec-themes');
  var h = '<h2 class="section-title">Themes</h2>';

  h += '<div class="card">';
  h += '<table>';
  h += '<caption style="text-align:left;font-size:12px;color:var(--text-secondary);margin-bottom:8px">Theme priority matrix (Impact \u00D7 Discovery = Priority)</caption>';
  h += '<thead><tr><th>#</th><th>Theme</th><th>Status</th><th>Impact</th><th>Discovery</th><th>Priority</th><th>Tickers</th></tr></thead>';
  h += '<tbody>';
  D.themes.forEach(function(t, i) {
    var statusPill, statusIcon;
    if (t.status === 'STABLE') { statusPill = 'pill-green'; statusIcon = '\uD83D\uDFE2'; }
    else if (t.status === 'DORMANT') { statusPill = 'pill-grey'; statusIcon = '\u26AB'; }
    else if (t.status === 'ESCALATING') { statusPill = 'pill-red'; statusIcon = '\uD83D\uDD34'; }
    else { statusPill = 'pill-grey'; statusIcon = ''; }
    var isDormant = t.status === 'DORMANT';
    h += '<tr' + (isDormant ? ' style="opacity:.5"' : '') + '>';
    h += '<td>' + (i + 1) + '</td>';
    h += '<td><strong>' + esc(t.name) + '</strong></td>';
    h += '<td><span class="pill ' + statusPill + '">' + statusIcon + ' ' + t.status + '</span></td>';
    h += '<td class="mono">' + (t.impact !== null ? t.impact : '\u2014') + '</td>';
    h += '<td class="mono">' + (t.discovery !== null ? t.discovery : '\u2014') + '</td>';
    h += '<td class="mono" style="font-weight:700;' + (t.priority >= 20 ? 'color:var(--accent-positive)' : '') + '">' + (t.priority !== null ? t.priority : '\u2014') + '</td>';
    h += '<td style="font-size:11px">';
    t.tickers.forEach(function(tk) {
      if (D.tickers[tk]) {
        h += '<button class="ticker-btn" onclick="openContextPanel(\'' + tk + '\')" style="margin:1px 2px">' + tk + '</button>';
      } else {
        h += '<span style="color:var(--text-secondary);margin-right:4px;font-size:11px">' + tk + '</span>';
      }
    });
    h += '</td></tr>';
  });
  h += '</tbody></table></div>';

  if (D.candidates && D.candidates.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">New Theme Candidates (' + D.candidates.length + ')</button>';
    h += '<div class="section-body">';
    D.candidates.forEach(function(c) {
      var borderStyle = c.escalating ? 'border-color:rgba(255,59,48,.3)' : '';
      h += '<div class="theme-card" style="' + borderStyle + '">';
      h += '<div class="theme-name">' + esc(c.name) + '</div>';
      h += '<div class="theme-meta">Priority ' + c.priority + ' (' + (c.priority >= 10 ? 'HIGH' : 'MOD') + ') \u00B7 ';
      h += (c.persistence > 1 ? 'PERSISTENCE CONFIRMED (' + c.persistence + ' briefings)' : 'First appearance');
      h += ' \u00B7 ' + esc(c.note);
      if (c.escalating) h += ' <strong style="color:var(--accent-red)">ESCALATING</strong>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  if (D.parked && D.parked.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Parked Tickers (' + D.parked.length + ')</button>';
    h += '<div class="section-body">';
    D.parked.forEach(function(p) {
      h += '<div class="theme-card" style="opacity:.6">';
      h += '<div class="theme-name">' + p.ticker + ' <span class="pill pill-grey">PARKED</span></div>';
      h += '<div class="theme-meta">' + p.theme + ' \u00B7 ' + esc(p.reason) + (p.triggerCheck ? ' \u00B7 Check: ' + p.triggerCheck : '') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  el.innerHTML = h;
}

// ═══════════════════════════════════════════
function renderSignals() {
  var el = document.getElementById('sec-signals');
  var h = '<h2 class="section-title">Signals & Intelligence</h2>';

  if (!D.intelligence) {
    h += '<div class="card" style="text-align:center;padding:40px"><div style="color:var(--text-secondary)">Run intelligence-synthesis to populate this screen.</div></div>';
    el.innerHTML = h;
    return;
  }

  var intel = D.intelligence;

  h += '<div class="kpi-strip">';
  h += '<div class="kpi-item"><div class="kpi-label">Total</div><div class="kpi-value">~' + intel.signalStats.total + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Active</div><div class="kpi-value" style="color:var(--accent-positive)">' + intel.signalStats.active + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Absorbed</div><div class="kpi-value">~' + intel.signalStats.absorbed + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Expired</div><div class="kpi-value">' + intel.signalStats.expired + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Unmatched</div><div class="kpi-value" style="color:var(--accent-amber)">' + intel.signalStats.unmatched + '</div></div>';
  h += '</div>';

  h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Accumulation Patterns (' + intel.patterns.length + ')</button>';
  h += '<div class="section-body">';
  intel.patterns.forEach(function(p) {
    var pClass = p.status === 'ESCALATING' ? 'pattern-escalating' : p.status === 'STABLE' ? 'pattern-stable' : 'pattern-fading';
    var sPill = p.status === 'ESCALATING' ? 'pill-red' : p.status === 'STABLE' ? 'pill-blue' : 'pill-grey';
    h += '<div class="pattern-card ' + pClass + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center"><strong>' + esc(p.name) + '</strong><span class="pill ' + sPill + '">' + p.status + '</span></div>';
    h += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">' + p.signals + ' signals \u00B7 ' + esc(p.implication) + '</div>';
    h += '<div style="font-size:12px;margin-top:4px">Action: <span class="pill pill-green" style="font-size:10px">' + p.action.toUpperCase() + '</span></div>';
    h += '</div>';
  });
  h += '</div>';

  if (intel.crossConnections && intel.crossConnections.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Cross-Theme Connections (' + intel.crossConnections.length + ')</button>';
    h += '<div class="section-body">';
    intel.crossConnections.forEach(function(c) {
      h += '<div class="connection-card"><strong style="color:var(--accent-orange)">' + esc(c.from) + '</strong> \u2194 <strong style="color:#a78bfa">' + esc(c.to) + '</strong> \u2014 ' + esc(c.via) + '</div>';
    });
    h += '</div>';
  }

  if (intel.leads && intel.leads.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Opportunity Leads (' + intel.leads.length + ')</button>';
    h += '<div class="section-body">';
    intel.leads.forEach(function(l) {
      h += '<div class="pattern-card">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<strong class="mono">' + l.ticker + '</strong>';
      h += '<span class="pill pill-blue" style="font-size:10px">' + l.action.toUpperCase() + '</span>';
      h += '</div>';
      h += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Theme: ' + l.theme + (l.score ? ' \u00B7 Score: ' + l.score : '') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  if (intel.recentSignals && intel.recentSignals.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Recent Signals (' + intel.recentSignals.length + ')</button>';
    h += '<div class="section-body"><div class="card">';
    intel.recentSignals.forEach(function(s) {
      var iClass = s.impact >= 5 ? 'impact-5' : s.impact >= 4 ? 'impact-4' : 'impact-3';
      var tPill = s.theme === 'UNMATCHED' ? 'pill-grey' : s.theme === 'AI Disruption' ? 'pill-blue' : 'pill-amber';
      h += '<div class="signal-row">';
      h += '<span class="s-impact ' + iClass + '">' + s.impact + '</span>';
      h += '<span style="color:var(--text-secondary)">' + s.date + '</span> \u00B7 ';
      h += esc(s.text);
      h += ' <span class="pill ' + tPill + '" style="font-size:10px">' + s.theme + '</span>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  el.innerHTML = h;
}

// RENDER: CALENDAR
// ═══════════════════════════════════════════
function renderCalendar() {
  var el = document.getElementById('sec-calendar');
  var h = '<h2 class="section-title">Catalyst Calendar</h2>';

  if (D.options && D.options.length) {
    h += '<div class="card">';
    h += '<h3>\u23F0 Options Expiry</h3>';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Expiry</th><th>DTE</th><th>30-DTE Mark</th><th>Next Catalyst</th></tr></thead>';
    h += '<tbody>';
    D.options.forEach(function(o) {
      var dc = dteClass(o.dte);
      var nextCat = o.catalystAlignment && o.catalystAlignment.length ? o.catalystAlignment[0] : null;
      h += '<tr>';
      h += '<td class="mono">' + o.ticker + ' ' + o.strike + (o.instrument === 'Call' ? 'C' : 'P') + '</td>';
      h += '<td class="mono">' + o.expiry + '</td>';
      h += '<td><span class="dte-badge ' + dc + '">' + o.dte + '</span></td>';
      h += '<td class="mono">' + o.thirtyDteMark + '</td>';
      h += '<td style="font-size:12px">' + (nextCat ? nextCat.catalyst + ' (' + nextCat.dteAtCatalyst + ' DTE)' : '\u2014') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  var overdue = (D.catalystTimeline || []).filter(function(c) { return c.overdue; });
  if (overdue.length) {
    h += '<div class="card" style="border-color:rgba(255,59,48,.2)">';
    h += '<h3 style="color:var(--accent-red)">\uD83D\uDEA8 Overdue</h3>';
    overdue.forEach(function(c) {
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date" style="color:var(--accent-red)">' + formatDate(c.date) + '</div>';
      h += '<div class="timeline-dot" style="background:var(--accent-red)"></div>';
      h += '<div class="timeline-event"><strong>' + esc(c.event) + '</strong> \u2014 ' + c.ticker + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  var nonOverdue = (D.catalystTimeline || []).filter(function(c) { return !c.overdue; });
  var today = new Date(todayStr());
  var twoWeeks = new Date(today); twoWeeks.setDate(twoWeeks.getDate() + 14);
  var next2w = nonOverdue.filter(function(c) { return new Date(c.date) <= twoWeeks; });
  if (next2w.length) {
    h += '<div class="card">';
    h += '<h3>Next 2 Weeks</h3>';
    next2w.forEach(function(c) {
      var dotColor = c.type === 'Hard' ? 'var(--accent-amber)' : 'var(--accent-blue)';
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + formatDate(c.date) + '</div>';
      h += '<div class="timeline-dot" style="background:' + dotColor + '"></div>';
      h += '<div class="timeline-event">' + esc(c.event) + ' ';
      c.ticker.split('/').forEach(function(tk) {
        tk = tk.trim();
        if (D.tickers[tk]) {
          h += '<button class="ticker-btn" onclick="openContextPanel(\'' + tk + '\')">' + tk + '</button> ';
        } else {
          h += '<span class="mono" style="font-size:12px">' + tk + '</span> ';
        }
      });
      h += '</div></div>';
    });
    h += '</div>';
  }

  var fourWeeks = new Date(today); fourWeeks.setDate(fourWeeks.getDate() + 28);
  var w34 = nonOverdue.filter(function(c) { var d = new Date(c.date); return d > twoWeeks && d <= fourWeeks; });
  if (w34.length) {
    h += '<div class="card">';
    h += '<h3>Weeks 3\u20134</h3>';
    w34.forEach(function(c) {
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + formatDate(c.date) + '</div>';
      h += '<div class="timeline-dot" style="background:var(--accent-blue)"></div>';
      h += '<div class="timeline-event">' + esc(c.event) + ' <span class="mono" style="font-size:12px">' + c.ticker + '</span></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  var beyond = nonOverdue.filter(function(c) { return new Date(c.date) > fourWeeks; });
  if (beyond.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Beyond 4 Weeks (' + beyond.length + ')</button>';
    h += '<div class="section-body"><div class="card" style="margin-top:8px">';
    beyond.forEach(function(c) {
      var dotColor = 'var(--accent-blue)';
      if (c.event.includes('Expiry') || c.event.includes('expiry') || c.event.includes('DTE')) dotColor = 'var(--accent-orange)';
      if (c.event.includes('dividend')) dotColor = 'var(--accent-positive)';
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + formatDate(c.date) + '</div>';
      h += '<div class="timeline-dot" style="background:' + dotColor + '"></div>';
      h += '<div class="timeline-event">' + esc(c.event) + ' <span class="mono" style="font-size:12px">' + c.ticker + '</span></div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  if (D.thresholdMonitors && D.thresholdMonitors.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Threshold Monitors (' + D.thresholdMonitors.length + ')</button>';
    h += '<div class="section-body"><div class="card" style="margin-top:8px">';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Threshold</th><th>Current</th><th>Status</th></tr></thead>';
    h += '<tbody>';
    D.thresholdMonitors.forEach(function(t) {
      var dotClass = t.status === 'ok' ? 'ind-ok' : t.status === 'approaching' ? 'ind-approaching' : 'ind-breach';
      var label = t.status === 'ok' ? 'OK' : t.status === 'approaching' ? 'Approaching' : 'BREACH';
      h += '<tr>';
      h += '<td class="mono">' + t.ticker + '</td>';
      h += '<td>' + esc(t.threshold) + '</td>';
      h += '<td class="mono">' + esc(t.current) + '</td>';
      h += '<td><span class="ind-dot ' + dotClass + '"></span>' + label + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  el.innerHTML = h;
}

// RENDER: RESEARCH
// ═══════════════════════════════════════════
function renderResearch() {
  var el = document.getElementById('sec-research');
  var h = '<h2 class="section-title">Research Pipeline</h2>';

  if (D.priorityQueue && D.priorityQueue.length) {
    h += '<div class="card">';
    h += '<h3>Priority Queue</h3>';
    D.priorityQueue.forEach(function(p) {
      h += '<div class="priority-item">';
      h += '<div class="priority-score">' + p.score.toFixed(1) + '</div>';
      h += '<div class="priority-body"><div class="p-title">' + (p.score >= 20 ? '\uD83D\uDEA8 ' : '') + esc(p.title) + '</div><div class="p-action">' + esc(p.action) + '</div></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '<div class="card">';
  h += '<h3>Research Confidence (5-Gate)</h3>';
  h += '<table>';
  h += '<thead><tr><th>Ticker</th><th>RC</th><th>Gate 1</th><th>Gate 2</th><th>Gate 3</th><th>Gate 4</th><th>Gate 5</th></tr></thead>';
  h += '<tbody>';
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    h += '<tr><td class="mono">' + sym + '</td>';
    h += '<td><strong style="color:' + (t.rc >= 5 ? 'var(--accent-positive)' : 'var(--accent-amber)') + '">' + t.rc + '/5</strong></td>';
    (t.rcChecklist || []).forEach(function(g) {
      h += '<td class="' + (g.met ? 'rc-met' : 'rc-unmet') + '">' + (g.met ? '\u2705' : '\u274C') + '</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  h += '<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">Gates: (1) OVERVIEW from audited filing (2) \u22654 transcripts (3) Critical questions resolved (4) Catalysts ascertained (5) Mispricing understood</div>';
  h += '</div>';

  h += '<div class="card">';
  h += '<h3>Conviction Dimensions</h3>';
  h += '<table>';
  h += '<thead><tr><th>Ticker</th><th>Conv.</th><th>D1</th><th>D2</th><th>D3</th><th>D4</th><th>D5</th><th>D6</th><th>D7</th><th>D8</th><th>ClA</th><th>ClB</th></tr></thead>';
  h += '<tbody>';
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.allocation <= 0) return;
    var dims = t.dimensions;
    h += '<tr><td class="mono">' + sym + '</td><td><strong>' + t.conviction + '</strong></td>';
    ['D1','D2','D3','D4','D5','D6','D7','D8'].forEach(function(d) {
      var v = dims[d];
      var c = v >= 5 ? 'color:var(--accent-positive)' : v <= 3 ? 'color:var(--accent-amber)' : '';
      h += '<td style="' + c + '">' + v + '</td>';
    });
    h += '<td><strong>' + t.clusterA + '%</strong></td><td>' + t.clusterB + '%</td></tr>';
  });
  h += '</tbody></table></div>';

  el.innerHTML = h;
}

// ═══════════════════════════════════════════
// RENDER: SETTINGS
// ═══════════════════════════════════════════
function renderSettings() {
  var el = document.getElementById('sec-settings');
  var bootMode = localStorage.getItem('bootMode') || 'light';
  var h = '<h2 class="section-title">Settings</h2>';

  h += '<div class="card">';
  h += '<h3>Boot Mode</h3>';
  h += '<div style="display:flex;gap:8px;margin-top:8px">';
  h += '<button class="pill ' + (bootMode === 'light' ? 'pill-blue' : 'pill-grey') + '" style="cursor:pointer;border:none" onclick="setBootMode(\'light\')">Light</button>';
  h += '<button class="pill ' + (bootMode === 'full' ? 'pill-blue' : 'pill-grey') + '" style="cursor:pointer;border:none" onclick="setBootMode(\'full\')">Full</button>';
  h += '</div></div>';

  h += '<div class="card">';
  h += '<h3>Currency Display</h3>';
  h += '<div style="font-size:13px;color:var(--text-secondary)">Multi-currency: USD, EUR, NOK, GBP displayed as-is per position.</div>';
  h += '</div>';

  h += '<div class="card">';
  h += '<h3>Dashboard Info</h3>';
  h += '<div style="font-size:13px;color:var(--text-secondary)">';
  h += 'Generated: ' + (D.lastUpdated || D.generated) + '<br>';
  h += 'Data sources: 5 WATCHLIST.md, 5 THESIS.md, 5 CHANGELOG.md, 4 INDICATORS.md, catalyst-calendar.md, signal-ledger.md, intelligence-digest.md, price-history.csv, theme-watchlist.md<br>';
  h += 'Positions: ' + D.portfolio.slotsUsed + ' INVESTMENT (' + Object.keys(D.tickers).join(', ') + ') + Cash<br>';
  h += 'Themes: ' + D.themes.length + ' (' + D.themes.filter(function(t){return t.priority>=20}).length + ' high-priority, ' + D.themes.filter(function(t){return t.status==="DORMANT"}).length + ' dormant)';
  h += '</div></div>';

  el.innerHTML = h;
}

function setBootMode(mode) {
  localStorage.setItem('bootMode', mode);
  _renderedSections['settings'] = false;
  renderSection('settings');
}

// ═══════════════════════════════════════════
// SCROLL BUTTON
// ═══════════════════════════════════════════
window.addEventListener('scroll', function() {
  var btn = document.getElementById('scrollTop');
  if (window.scrollY > 300) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('searchOverlay').classList.contains('active')) {
      document.getElementById('searchOverlay').classList.remove('active');
    } else if (document.getElementById('ctx-panel').classList.contains('open')) {
      closeContextPanel();
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
  var saved = localStorage.getItem('activeSection');
  if (saved && document.getElementById('sec-' + saved)) {
    switchSection(saved);
  } else {
    renderSection('home');
  }
});

// ═══════════════════════════════════════════
// PWA: Service Worker
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) { reg.update(); })
    .catch(function(err) { console.log('SW registration failed:', err); });
  navigator.serviceWorker.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'UPDATE_AVAILABLE') showUpdateBanner();
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  var b = document.createElement('div');
  b.id = 'updateBanner';
  b.className = 'update-banner';
  b.innerHTML = 'New data available <button onclick="location.reload()">Refresh</button>';
  document.body.appendChild(b);
}
</script>
</body>
</html>
