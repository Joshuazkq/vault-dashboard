// Compute priority queue
function computePriorityQueue() {
  const items = [];
  for (const [sym, t] of Object.entries(D.tickers)) {
    const posW = t.allocation > 0 ? t.allocation / 10 : 1;
    if (t.catalysts) {
      t.catalysts.forEach(c => {
        let urgMul = 1;
        if (c.urgency === 'overdue') urgMul = 10;
        else if (c.urgency === 'week2') urgMul = 8;
        else if (c.urgency === 'week3') urgMul = 6;
        else if (c.urgency === 'month2') urgMul = 4;
        else if (c.urgency === 'month3') urgMul = 3;
        else urgMul = 2;
        const catW = t.allocation > 0 ? 1.5 : 1.0;
        const score = Math.round(posW * urgMul * catW * 10) / 10;
        items.push({ticker:sym,event:c.event,date:c.date,score:score,type:'Catalyst',action:'Monitor and assess impact on thesis dimensions'});
      });
    }
    if (t.conviction > 7 && t.rc < 4) {
      const score = Math.round(posW * 6 * 1.0 * 10) / 10;
      items.push({ticker:sym,event:'RC gap: conviction '+t.conviction+' but RC '+t.rc+'/5 — resolve critical questions before conviction upgrade',date:'Now',score:score,type:'Research Gap',action:'Run filing-review or transcript-review on outstanding sources'});
    }
  }
  items.sort((a,b) => b.score - a.score);
  D.priorityQueue = items.slice(0, 15);
}
computePriorityQueue();

    '<div class="section-title">Conviction Dimensions Comparison</div><div class="card" style="overflow-x:auto"><table><tr><th>Ticker</th><th>D1</th><th>D2</th><th>D3</th><th>D4</th><th>D5</th><th>D6</th><th>D7</th><th>D8</th><th>A%</th><th>B%</th></tr>'+dimRows+'</table></div>';

  setTimeout(function(){
    scored.filter(function(e){return e[1].questions&&(e[1].questions.critical.length>0||e[1].questions.open.length>0||e[1].questions.resolved>0)}).forEach(function(e){
      var s=e[0],t=e[1];var canvas=document.getElementById('qChart_'+s);if(!canvas)return;
      var crit=t.questions.critical.filter(function(q){return!q.resolved}).length;var open=t.questions.open.filter(function(q){return!q.resolved}).length;
      new Chart(canvas,{type:'bar',data:{labels:['Critical','Open','Resolved'],datasets:[{data:[crit,open,t.questions.resolved],backgroundColor:['#ef4444','#f59e0b','#22c55e'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94a3b8'}},y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#94a3b8'}}}}});
    });
    scored.filter(function(e){return e[1].debates&&e[1].debates.length>0}).forEach(function(e){
      var s=e[0],t=e[1];var canvas=document.getElementById('dChart_'+s);if(!canvas)return;
      var op=t.debates.filter(function(d){return d.resolution==='OPEN'}).length;var re=t.debates.filter(function(d){return d.resolution==='RESOLVED'}).length;var pa=t.debates.filter(function(d){return d.resolution==='PARTIALLY COUNTERED'}).length;
      new Chart(canvas,{type:'doughnut',data:{labels:['Open','Partial','Resolved'],datasets:[{data:[op,pa,re],backgroundColor:['#f59e0b','#60a5fa','#22c55e'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}});
    });
  },50);
}

function renderThemes() {
  var el = document.getElementById('themes');
  var themeRows = D.themes.map(function(th,i){
    var statusPill = th.status==='STRENGTHENING'?'green':th.status==='STABLE'?'blue':th.status==='WEAKENING'?'amber':'red';
    var prioColor = th.priority>=20?'#4ade80':th.priority>=12?'#60a5fa':'#94a3b8';
    var tickerLinks = th.tickers.length>0?th.tickers.map(function(t){return '<span class="ticker-link" onclick="openOverlay(\''+t+'\')">'+t+'</span>'}).join(', '):(th.note||'<span style="color:#64748b">None active</span>');
    return '<tr><td>'+(i+1)+'</td><td style="font-weight:600;color:'+th.color+'">'+th.name+'</td><td><span class="pill pill-'+statusPill+'">'+th.status+'</span></td><td>'+th.impact+'/5</td><td>'+th.discovery+'/5</td><td style="font-weight:700;color:'+prioColor+'">'+th.priority+'</td><td>'+tickerLinks+'</td></tr>';
  }).join('');

  var themeCards = D.themes.filter(function(th){return th.tickers.length>0}).map(function(th){
    var tickerMetrics = th.tickers.map(function(sym){
      var t = D.tickers[sym];if(!t)return '';
      var badge = t.portfolioType?'<span class="badge badge-'+t.portfolioType.toLowerCase()+'">'+t.portfolioType+'</span>':'<span class="badge badge-'+t.status.toLowerCase()+'">'+t.status+'</span>';
      return '<div class="metric"><span class="label"><span class="ticker-link" onclick="openOverlay(\''+sym+'\')">'+sym+'</span> '+badge+'</span><span class="value">'+t.conviction+'/10'+(t.allocation>0?' ('+t.allocation+'%)':'')+'</span></div>';
    }).join('');
    return '<div class="card"><h3 style="color:'+th.color+'">'+th.name+'</h3><div class="metric"><span class="label">Priority</span><span class="value" style="color:'+th.color+'">'+th.priority+'/25</span></div><div class="metric"><span class="label">Impact x Discovery</span><span class="value">'+th.impact+' x '+th.discovery+'</span></div><div class="metric"><span class="label">Status</span><span class="value"><span class="pill pill-blue">'+th.status+'</span></span></div><h4>Tickers</h4>'+tickerMetrics+'</div>';
  }).join('');

  var candidateCards = D.candidates.map(function(c){
    var prioColor = c.priority>=12?'#fbbf24':'#94a3b8';
    return '<div class="card"><h3>'+c.name+'</h3><div class="metric"><span class="label">Priority</span><span class="value" style="color:'+prioColor+'">'+c.priority+'</span></div><div class="metric"><span class="label">Persistence</span><span class="value">'+c.persistence+' briefings</span></div><div style="font-size:12px;color:#94a3b8;margin-top:8px">'+c.status+'</div></div>';
  }).join('');

  el.innerHTML = '<div class="section-title">Theme Priority Dashboard</div><div class="card" style="overflow-x:auto;margin-bottom:16px"><table><tr><th>#</th><th>Theme</th><th>Status</th><th>Impact</th><th>Discovery</th><th>Priority</th><th>Tickers</th></tr>'+themeRows+'</table></div>'+
    '<div class="section-title">Theme Cards</div><div class="grid-2">'+themeCards+'</div>'+
    '<div class="section-title">New Theme Candidates</div><div class="grid">'+candidateCards+'</div>';
}

function renderPipeline() {
  var el = document.getElementById('pipeline');
  var monitoring = Object.entries(D.tickers).filter(function(e){return e[1].status==='MONITORING'});
  var activeNoPos = Object.entries(D.tickers).filter(function(e){return e[1].status==='ACTIVE'&&!e[1].portfolioType});

  var activeCards = activeNoPos.map(function(e){
    var s=e[0],t=e[1];
    var nextAction = t.catalysts&&t.catalysts.length>0?t.catalysts[0].event:'No near-term catalyst';
    var blocker = t.conviction>=7&&t.clusterA>=70?'Meets INVESTMENT threshold — ready for portfolio entry':'Conviction '+t.conviction+'/10, Cluster A '+t.clusterA+'%'+(t.clusterA<70?' (needs >=70%)':'');
    return '<div class="card"><h3><span class="ticker-link" onclick="openOverlay(\''+s+'\')">'+s+'</span> — '+t.company+'</h3><div style="margin-bottom:8px"><span class="badge badge-active">ACTIVE</span> <span style="font-size:12px;color:#94a3b8">'+t.theme+'</span></div><div class="metric"><span class="label">Conviction</span><span class="value" style="color:#60a5fa">'+t.conviction+'/10</span></div><div class="metric"><span class="label">Cluster A / B</span><span class="value">'+t.clusterA+'% / '+t.clusterB+'%</span></div><div class="metric"><span class="label">RC</span><span class="value">'+t.rc+'/5</span></div><h4>RC Progress</h4><div class="gauge"><div class="gauge-fill gauge-green" style="width:'+t.rc*20+'%"></div></div><h4>Promotion Status</h4><div style="font-size:12px;color:'+(t.conviction>=7&&t.clusterA>=70?'#4ade80':'#f87171')+'">'+blocker+'</div><h4>Next Action</h4><div style="font-size:12px;color:#94a3b8">'+nextAction+'</div></div>';
  }).join('');

  var monCards = monitoring.map(function(e){
    var s=e[0],t=e[1];
    var nextAction = t.catalysts&&t.catalysts.length>0?t.catalysts[0].event:'Awaiting data';
    return '<div class="card"><h3><span class="ticker-link" onclick="openOverlay(\''+s+'\')">'+s+'</span> — '+t.company+'</h3><div style="margin-bottom:8px"><span class="badge badge-monitoring">MONITORING</span> <span style="font-size:12px;color:#94a3b8">'+t.theme+'</span></div><div class="metric"><span class="label">Conviction</span><span class="value">'+t.conviction+'/10</span></div><h4>Next Action</h4><div style="font-size:12px;color:#94a3b8">'+nextAction+'</div></div>';
  }).join('');

  el.innerHTML = '<div class="section-title">Promotion Readiness — Active (No Position)</div>'+(activeNoPos.length===0?'<div class="card"><p style="color:#94a3b8">No active tickers without positions meeting threshold.</p></div>':'')+
    '<div class="grid">'+activeCards+'</div>'+
    '<div class="section-title">Monitoring Tickers</div><div class="grid">'+monCards+'</div>';
}

function openOverlay(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  var overlay = document.getElementById('tickerOverlay');
  var content = document.getElementById('overlayContent');

  var fvHtml = '';
  if (t.fairValue) {
    fvHtml = '<div class="fv-box"><div class="fv-method">'+t.fairValue.methodology+' &middot; '+t.fairValue.thesisType+' &middot; Updated '+t.fairValue.lastUpdated+'</div><div class="fv-grid"><div class="fv-item"><div class="fv-label">Bear Case</div><div class="fv-value fv-bear">'+t.fairValue.bearCaseFV+'</div></div><div class="fv-item"><div class="fv-label">Base Case</div><div class="fv-value fv-base">'+t.fairValue.baseCaseFV+'</div></div><div class="fv-item"><div class="fv-label">Prob-Weighted</div><div class="fv-value fv-prob">'+t.fairValue.probWeightedFV+'</div></div><div class="fv-item"><div class="fv-label">Bull Case</div><div class="fv-value fv-bull">'+t.fairValue.bullCaseFV+'</div></div></div></div>';
  } else {
    fvHtml = '<div class="fv-box" style="border-color:rgba(255,255,255,.1)"><div style="color:#94a3b8;font-size:13px">No fair value estimate. Run fair-value-estimation skill to generate.</div></div>';
  }

  var scenarioHtml = '';
  if (t.scenarios && t.scenarios.length > 0) {
    scenarioHtml = '<h4>Scenarios</h4><table><tr><th>Scenario</th><th>Target</th><th>Probability</th></tr>'+t.scenarios.map(function(s){return '<tr><td>'+s.name+'</td><td style="font-weight:600">'+s.target+'</td><td>'+s.prob+'%</td></tr>'}).join('')+'</table>';
  }

  var catalystHtml = '';
  if (t.catalysts && t.catalysts.length > 0) {
    catalystHtml = '<h4>Catalysts</h4><table><tr><th>Date</th><th>Event</th><th>Type</th><th>Dim</th></tr>'+t.catalysts.map(function(c){return '<tr><td>'+c.date+'</td><td>'+c.event+'</td><td><span class="pill pill-'+(c.type==='Hard'?'blue':'amber')+'">'+c.type+'</span></td><td>'+c.dim+'</td></tr>'}).join('')+'</table>';
  }

  var questionsHtml = '';
  if (t.questions && (t.questions.critical.length > 0 || t.questions.open.length > 0)) {
    questionsHtml = '<h4>Open Questions</h4>';
    if (t.questions.critical.length > 0) {
      questionsHtml += '<div class="question-cat"><h5 style="color:#f87171">Critical Path</h5>'+t.questions.critical.map(function(q){return '<div class="question-item'+(q.resolved?' resolved':'')+'">'+q.q+'</div>'}).join('')+'</div>';
    }
    if (t.questions.open.length > 0) {
      questionsHtml += '<div class="question-cat"><h5>Open Items</h5>'+t.questions.open.map(function(q){return '<div class="question-item'+(q.resolved?' resolved':'')+'">'+q.q+'</div>'}).join('')+'</div>';
    }
    questionsHtml += '<div style="font-size:12px;color:#64748b;margin-top:4px">'+t.questions.resolved+' items resolved</div>';
  }

  var debatesHtml = '';
  if (t.debates && t.debates.length > 0) {
    debatesHtml = '<h4>Debates</h4>'+t.debates.map(function(d){var pc=d.resolution==='RESOLVED'?'green':d.resolution==='OPEN'?'amber':'blue';return '<div class="debate-vector"><div class="dv-title">'+d.vector+' <span class="pill pill-'+pc+'" style="margin-left:8px">'+d.resolution+'</span></div><div class="dv-status">'+d.side+' challenged &middot; '+d.impact+'</div></div>'}).join('');
  }

  var variantHtml = '';
  if (t.variantViews && t.variantViews.length > 0) {
    variantHtml = '<h4>Variant Views</h4>'+t.variantViews.map(function(v){return '<div class="variant-view">'+v+'</div>'}).join('');
  }

  var notesHtml = '';
  if (t.recentNotes && t.recentNotes.length > 0) {
    notesHtml = '<h4>Recent Notes</h4>'+t.recentNotes.map(function(n){return '<div style="font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><strong>'+n.date+'</strong> &mdash; '+n.title+'</div>'}).join('');
  }

  var financialsHtml = '';
  if (t.financials) {
    financialsHtml = '<h4>Key Financials</h4>';
    for (var k in t.financials) {
      if (t.financials[k]) financialsHtml += '<div class="metric"><span class="label">'+k.replace(/([A-Z])/g,' $1').trim()+'</span><span class="value">'+t.financials[k]+'</span></div>';
    }
  }

  var dimTable = '<h4>Conviction Scorecard</h4><table><tr><th>Dimension</th><th>Score</th><th>Cluster</th></tr>';
  var dimNames = ['D1. Fundamentals Trajectory','D2. Valuation Mismatch','D3. Mispricing Reason','D4. Downside Protection','D5. Thesis Simplicity','D6. Upside Optionality','D7. Evidence Quality','D8. Catalyst Clarity'];
  var dimClusters = ['A','A','A','B','B','B','B','B'];
  for (var i=0;i<8;i++){
    var score = t.dimensions['D'+(i+1)];
    var c = score>=5?'#4ade80':score>=4?'#60a5fa':score>=3?'#fbbf24':'#f87171';
    dimTable += '<tr><td>'+dimNames[i]+'</td><td style="color:'+c+';font-weight:700">'+score+'/5</td><td>'+dimClusters[i]+'</td></tr>';
  }
  dimTable += '</table>';

  var badge = t.portfolioType?'<span class="badge badge-'+t.portfolioType.toLowerCase()+'">'+t.portfolioType+'</span>':'';
  var statusBadge = '<span class="badge badge-'+t.status.toLowerCase()+'">'+t.status+'</span>';
  var allocSpan = t.allocation>0?'<span style="font-size:13px;color:#4ade80;margin-left:8px;font-weight:600">'+t.allocation+'% allocation</span>':'';
  var convColor = t.conviction>=9?'#4ade80':'#60a5fa';
  var aColor = t.clusterA>=80?'#4ade80':'#fbbf24';
  var bColor = t.clusterB>=80?'#4ade80':'#fbbf24';

  content.innerHTML = '<button class="overlay-close" onclick="closeOverlay()">&times;</button>'+
    '<h2 style="font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px">'+sym+' &mdash; '+t.company+'</h2>'+
    '<div style="margin-bottom:16px">'+badge+' '+statusBadge+' <span style="font-size:13px;color:#94a3b8;margin-left:8px">'+t.theme+'</span>'+allocSpan+'</div>'+
    '<div class="grid-2" style="margin-bottom:16px"><div>'+
    '<div class="metric"><span class="label">Conviction</span><span class="value" style="color:'+convColor+';font-size:20px">'+t.conviction+'/10</span></div>'+
    '<div class="metric"><span class="label">Cluster A</span><span class="value" style="color:'+aColor+'">'+t.clusterA+'%</span></div>'+
    '<div class="metric"><span class="label">Cluster B</span><span class="value" style="color:'+bColor+'">'+t.clusterB+'%</span></div>'+
    '<div class="metric"><span class="label">Research Confidence</span><span class="value">'+t.rc+'/5</span></div></div>'+
    '<div><div class="radar-container"><canvas id="radarChart"></canvas></div></div></div>'+
    fvHtml+scenarioHtml+dimTable+catalystHtml+questionsHtml+debatesHtml+financialsHtml+variantHtml+notesHtml;

  overlay.classList.add('active');

  setTimeout(function(){
    var dims = t.dimensions;
    if (dims.D1 > 0) {
      new Chart(document.getElementById('radarChart'),{
        type:'radar',
        data:{labels:['D1','D2','D3','D4','D5','D6','D7','D8'],datasets:[{label:sym,data:[dims.D1,dims.D2,dims.D3,dims.D4,dims.D5,dims.D6,dims.D7,dims.D8],backgroundColor:'rgba(59,130,246,.15)',borderColor:'#3b82f6',borderWidth:2,pointBackgroundColor:'#3b82f6'}]},
        options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:6,ticks:{stepSize:1,color:'#64748b',backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.08)'},pointLabels:{color:'#94a3b8',font:{size:12}}}},plugins:{legend:{display:false}}}
      });
    }
  },50);
}

function closeOverlay() {
  document.getElementById('tickerOverlay').classList.remove('active');
}

renderPortfolio();
</script>
</body>
</html>
