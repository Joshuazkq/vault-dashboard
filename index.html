.monitoring-table td { padding: 8px; font-size: 13px; border-top: 1px solid rgba(46,46,58,0.3); }
.monitoring-table .mono { font-family: 'SF Mono','Fira Code',monospace; }

/* Mini ticker cards (monitoring) */
.pipeline-grid-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; margin-bottom: 16px; }
.ticker-card-mini {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; transition: border-color 0.2s; cursor: default;
}
.ticker-card-mini:hover { border-color: var(--accent-blue); }
.tcm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.tcm-sym { font-size: 15px; font-weight: 700; cursor: pointer; color: var(--accent-blue); }
.tcm-sym:hover { text-decoration: underline; }
.tcm-price { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }
.tcm-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tcm-range { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 2px; }
.tcm-catalyst { font-size: 11px; color: var(--text-secondary); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tcm-variant { font-size: 10px; color: var(--accent-blue); font-style: italic; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── SIGNAL FILTER BAR ── */
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filter-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer;
  background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border);
  transition: all 0.15s; user-select: none;
}
.filter-chip:hover { border-color: var(--accent-blue); color: var(--text-primary); }
.filter-chip.active { background: rgba(74,158,255,0.15); color: var(--accent-blue); border-color: var(--accent-blue); font-weight: 600; }
.filter-chip-clear:hover { text-decoration: underline; }
.filter-group-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }

/* ── THEME CARDS V2 ── */
.theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; margin-bottom: 16px; }
.theme-card-v2 {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; transition: border-color 0.2s;
}
.theme-card-v2:hover { border-color: var(--accent-blue); }
.theme-card-v2-dormant { opacity: 0.5; }
.theme-card-v2-escalating { border-left: 3px solid var(--accent-red); }
.theme-card-v2-weakening { border-left: 3px solid var(--accent-amber); }
.tc2-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.tc2-name { font-weight: 700; font-size: 15px; }
.tc2-scores { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.tc2-scores strong { color: var(--text-primary); font-size: 14px; }
.ticker-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.ticker-chip {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600;
  font-family: 'SF Mono','Fira Code',monospace; border: 1px solid;
}
.ticker-chip-active { border-color: var(--accent-positive); color: var(--accent-positive); background: rgba(52,210,122,0.08); cursor: pointer; }
.ticker-chip-active:hover { background: rgba(52,210,122,0.18); }
.ticker-chip-monitoring { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(74,158,255,0.08); cursor: pointer; }
.ticker-chip-monitoring:hover { background: rgba(74,158,255,0.18); }
.ticker-chip-other { border-color: var(--border); color: var(--text-secondary); background: transparent; }
.tc2-counts { font-size: 11px; color: var(--text-secondary); display: flex; gap: 10px; }
.tc2-count-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }

/* ── INDICATOR DOTS ── */
.ind-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
}
.ind-ok { background: var(--accent-positive); }
.ind-approaching { background: var(--accent-amber); }
.ind-breach { background: var(--accent-red); }

/* ── FAIR VALUE BOX ── */
.fv-box {
  background: rgba(74,158,255,0.05); border: 1px solid rgba(74,158,255,0.15);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.fv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
/* Dimension score grid (V1-V8) */
.dim-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; margin-bottom: 12px; text-align: center; }
.dim-cell { display: flex; flex-direction: column; align-items: center; padding: 4px 0; }
.dim-badge { height: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
.dim-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.3px; }
.dim-score { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
.fv-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.fv-value { font-family: 'SF Mono','Fira Code',monospace; font-size: 14px; font-weight: 700; }

/* ── VARIANT VIEW ── */
.variant-view {
  font-size: 12px; padding: 8px; background: rgba(168,192,216,0.06);
  border-left: 2px solid var(--text-inference); border-radius: 4px;
}

/* ── CHART BOX ── */
.chart-box { height: 220px; position: relative; }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

/* ── RADAR CANVAS ── */
.radar-wrap { width: 100%; max-width: 260px; margin: 0 auto 12px; }

/* ── UPDATE BANNER ── */
.update-banner {
  position: fixed; top: 10px; right: 16px;
  background: var(--bg-surface); color: var(--text-secondary); padding: 5px 12px;
  border-radius: 6px; font-size: 11px; z-index: 9000;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); opacity: 0.85;
}
.update-banner:hover { opacity: 1; }
.update-banner button {
  border: none; background: rgba(255,255,255,0.08); color: var(--text-secondary);
  padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 11px;
  transition: background 0.15s, color 0.15s;
}
.update-banner button:hover { background: rgba(255,255,255,0.14); color: var(--text-primary); }
.top-controls {
  position: fixed; top: 10px; right: 12px; z-index: 9001;
  display: flex; gap: 6px; align-items: center;
}
.reload-btn, .theme-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-surface);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.4; transition: opacity 0.15s, background 0.15s;
}
.reload-btn:hover, .theme-btn:hover { opacity: 1; background: var(--bg-elevated); }
.reload-btn:active, .theme-btn:active { opacity: 1; }
.reload-btn svg, .theme-btn svg { width: 14px; height: 14px; }

/* ── SCROLL TOP ── */
.scroll-top {
  position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px;
  background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);
  border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 50;
  opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center;
}
.scroll-top.visible { opacity: 1; }

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
  background: var(--bg-surface); border-top: 1px solid var(--border);
  z-index: 100; padding-bottom: env(safe-area-inset-bottom);
}
.mobile-nav-inner {
  display: flex; height: 56px; align-items: center; justify-content: space-around;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; border: none; background: none; color: var(--text-secondary);
  cursor: pointer; font-size: 10px; padding: 4px 8px;
}
.bnav-btn.active { color: var(--accent-blue); }
.bnav-btn svg { width: 20px; height: 20px; }
.more-menu {
  display: none; position: absolute; bottom: 56px; right: 8px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; min-width: 140px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}
.more-menu.open { display: block; }
.more-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 12px; border: none; background: none;
  color: var(--text-primary); font-size: 14px; cursor: pointer;
  border-radius: 8px; font-family: inherit;
}
.more-item:hover { background: var(--bg-surface); }
.more-item svg { width: 18px; height: 18px; color: var(--text-secondary); }

/* ── FOCUS ── */
:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
button:focus:not(:focus-visible) { outline: none; }

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
  .ctx-panel { transition: none !important; }
  .alert-drawer { transition: none !important; }
  .section-body { transition: none !important; }
}

/* ── PRINT ── */
@media print {
  body { background: #fff; color: #000; }
  .sidebar, .mobile-nav, .scroll-top, .ctx-panel, .search-overlay { display: none !important; }
  .main-content { margin-left: 0 !important; margin-right: 0 !important; }
  .section { display: block !important; page-break-inside: avoid; }
  .card { border-color: #ccc; }
  .pill { border: 1px solid #ccc; }
}

/* ── MOBILE (<768px) ── */
@media (max-width: 767px) {
  .sidebar { display: none; }
  .mobile-nav { display: block; }
  .main-content { margin-left: 0; padding: 16px; padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))); padding-bottom: 72px; }
  .main-content.panel-open { margin-right: 0; }
  .grid-2 { grid-template-columns: 1fr; }
  .section-title { margin-top: 0; }
  .ctx-panel {
    width: 100%; height: 80vh; top: auto; bottom: 0;
    transform: translateY(100%); border-left: none;
    border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
  }
  .ctx-panel.open { transform: translateY(0); }
  .scroll-top { bottom: 72px; right: 16px; }
  .update-banner { top: max(48px, calc(4px + env(safe-area-inset-top, 48px))); right: 8px; }
  .top-controls { top: max(12px, calc(4px + env(safe-area-inset-top, 4px))); right: 8px; }
  /* Portfolio tables → stacked card layout */
  .portfolio-section table { border-collapse: separate; border-spacing: 0; }
  .portfolio-section table thead { display: none; }
  .portfolio-section table tbody tr {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2px 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .portfolio-section table tbody td {
    padding: 2px 0; border-bottom: none;
  }
  .portfolio-section table tbody td::before {
    content: attr(data-label);
    display: block; font-size: 10px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .portfolio-section table tbody td:first-child {
    grid-column: 1 / -1;
  }
  .portfolio-section .gauge { display: none !important; }
}
/* PWA standalone mode: ensure extra top padding for status bar */
@media (display-mode: standalone) {
  .main-content { padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))) !important; }
}
/* iOS standalone detection fallback */
body.pwa-standalone .main-content { padding-top: max(54px, calc(16px + env(safe-area-inset-top, 48px))) !important; }

/* ═══ Portfolio Tab Styles ═══ */
.pf-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
.pf-metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.pf-metric-card .pf-mv { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.pf-metric-card .pf-ml { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
.pf-table-wrap { overflow-x: auto; margin-bottom: 16px; }
.pf-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pf-table th { text-align: left; font-size: 11px; color: var(--text-secondary); font-weight: 500; padding: 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.pf-table td { padding: 8px; border-bottom: 1px solid rgba(46,46,58,0.2); white-space: nowrap; }
.pf-table .mono { font-family: 'SF Mono','Fira Code',monospace; font-weight: 600; }
.pf-table .pf-pos { color: var(--accent-green); }
.pf-table .pf-neg { color: var(--accent-red); }
.pf-table .pf-neut { color: var(--accent-amber); }
.pf-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
.pf-badge-prov { background: rgba(255,183,77,0.15); color: var(--accent-amber); border: 1px solid rgba(255,183,77,0.3); }
.pf-badge-band { background: rgba(239,83,80,0.15); color: var(--accent-red); border: 1px solid rgba(239,83,80,0.3); }
.pf-badge-dte { background: rgba(74,158,255,0.15); color: var(--accent-blue); border: 1px solid rgba(74,158,255,0.3); }
.pf-charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 16px; }
.pf-chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.pf-chart-card h4 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 12px 0; }
.pf-chart-card canvas { max-height: 260px; }
.pf-wide-chart { grid-column: 1 / -1; }
@media (max-width: 768px) {
  .pf-metrics { grid-template-columns: repeat(3, 1fr); }
  .pf-charts-row { grid-template-columns: 1fr; }
  .pf-table { font-size: 12px; }
  .pf-table th, .pf-table td { padding: 6px 4px; }
}

/* Calendar tab additions */
.dim-chip { display: inline-block; padding: 1px 5px; font-size: 10px; font-weight: 600; background: rgba(74,158,255,0.10); color: var(--accent-blue); border: 1px solid rgba(74,158,255,0.25); border-radius: 3px; margin-right: 2px; cursor: help; font-family: 'SF Mono','Fira Code',monospace; }
.wt-badge { display: inline-block; padding: 1px 6px; font-size: 10px; font-weight: 700; background: rgba(245,166,35,0.12); color: var(--accent-amber); border-radius: 3px; margin-right: 2px; }
.prep-icon { font-size: 12px; margin-left: 2px; cursor: help; }
.prep-ok { filter: hue-rotate(0deg); }
.prep-missing { filter: none; }
.cal-action-icon { font-size: 11px; margin-left: 2px; cursor: help; opacity: 0.6; }
.pill-purple { background: rgba(167,139,250,0.12); color: #a78bfa; }
.cal-section { margin-bottom: 14px; }
.cal-filter-bar { padding: 10px 12px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; position: sticky; top: 8px; z-index: 5; }
.timeline-item.held { background: rgba(74,158,255,0.04); padding-left: 8px; margin-left: -8px; border-left: 2px solid var(--accent-blue); }
.timeline-item.held .ticker-btn { font-weight: 700; }
.trigger-row.state-approaching { animation: trigger-pulse 1.5s ease-in-out infinite; }
@keyframes trigger-pulse { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(245,166,35,0.08); } }
@media (prefers-reduced-motion: reduce) { .trigger-row.state-approaching { animation: none; background-color: rgba(245,166,35,0.06); } }

/* Phase 3.2.a — RC progress dot strip (Portfolio table) + modal */
.rc-strip { display: inline-flex; gap: 2px; align-items: center; cursor: pointer; background: transparent; border: 0; padding: 0; }
.rc-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.rc-dot-met { background: var(--accent-positive); }
.rc-dot-waived { background: var(--accent-blue); }
.rc-dot-pending { background: var(--accent-amber); }
.rc-dot-empty { background: var(--text-secondary); opacity: 0.3; }
.rc-count { margin-left: 6px; font-size: 11px; color: var(--text-secondary); }
.rc-strip:hover .rc-dot { transform: scale(1.15); transition: transform 0.1s; }
.rc-dialog { max-width: 800px; padding: 16px; border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-primary); border-radius: 8px; }
.rc-dialog::backdrop { background: rgba(0,0,0,0.4); }
.rc-dialog-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.rc-dialog-hdr h3 { margin: 0; font-size: 16px; }
.rc-dialog-hdr button { background: transparent; border: 0; font-size: 18px; cursor: pointer; color: var(--text-secondary); padding: 0 4px; }
.rc-dialog-offline { font-size: 12px; color: var(--text-secondary); padding: 12px; background: var(--bg-surface); border-radius: 4px; }
.rc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rc-table th, .rc-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
.rc-state-met { color: var(--accent-positive); font-weight: 600; }
.rc-state-waived { color: var(--accent-blue); font-weight: 600; }
.rc-state-pending { color: var(--accent-amber); font-weight: 600; }
.rc-reason { font-size: 11px; color: var(--text-secondary); margin-top: 2px; font-style: italic; }

/* Phase 3.2.b — V1-V8 cross-ticker dimension matrix (Research view) */
.dim-matrix-wrap { overflow-x: auto; margin-bottom: 24px; }
.dim-matrix { width: 100%; font-size: 12px; border-collapse: collapse; }
.dim-matrix th, .dim-matrix td { padding: 6px 8px; text-align: center; border: 1px solid var(--border); }
.dim-matrix th:first-child, .dim-matrix td:first-child { text-align: left; position: sticky; left: 0; background: var(--bg-elevated); }
.dim-matrix-row-trigger { background: transparent; border: 0; color: var(--text-primary); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 3px; }
.dim-matrix-row-trigger:hover { color: var(--accent-blue); }
.dim-matrix-cell { font-feature-settings: tnum; font-weight: 500; }
.dim-matrix-cell-weak { background: rgba(255,90,95,0.22); }
.dim-matrix-cell-average { background: rgba(245,166,35,0.30); }
.dim-matrix-cell-strong { background: rgba(74,222,128,0.32); }
.dim-matrix-cell-extreme { background: rgba(74,222,128,0.50); font-weight: 700; }
.dim-matrix-cell-empty { opacity: 0.35; }

</style>

<div id="freshnessBanner" style="position:fixed;top:0;left:0;right:0;z-index:99;padding:6px 16px;font-size:11px;background:rgba(20,20,28,0.92);border-bottom:1px solid var(--border);color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(6px);font-feature-settings:'tnum' 1"></div>

</div>

<!-- SIDEBAR -->
<nav class="sidebar" role="tablist" aria-label="Main navigation">

    <span class="sidebar-label">Calendar</span>
  </button>
  <button class="sidebar-item" data-section="portfolio" id="sb-portfolio" onclick="switchSection('portfolio')">
    <i data-lucide="pie-chart" aria-hidden="true"></i>
    <span class="sidebar-label">Portfolio</span>
  </button>
  <button class="sidebar-item" data-section="research" id="sb-research" onclick="switchSection('research')">
    <i data-lucide="flask-conical" aria-hidden="true"></i>
    <span class="sidebar-label">Research</span>
  </button>

var _currentSection = 'themes';
var _renderedSections = {};

function switchSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-item, .bnav-btn').forEach(function(b) {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  var sb = document.getElementById('sb-' + id);
  var bn = document.getElementById('bn-' + id);
  if (sb) { sb.classList.add('active'); sb.setAttribute('aria-current', 'page'); }
  if (bn) { bn.classList.add('active'); }
  _currentSection = id;
  localStorage.setItem('activeSection', id);
  window.scrollTo({ top: 0 });
  renderSection(id);
}

function renderSection(id) {
  if (_renderedSections[id]) return;
  switch (id) {
    case 'themes': renderThemes(); break;
    case 'calendar': renderCalendar(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'research': renderResearch(); break;
    case 'settings': renderSettings(); break;
  }
  _renderedSections[id] = true;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// ═══════════════════════════════════════════
function openSearch() {
  document.getElementById('searchOverlay').classList.add('active');
  var inp = document.getElementById('searchInput');
  inp.value = '';
  inp.focus();
  document.getElementById('searchResults').innerHTML = '';
}

function closeSearch(e) {
  if (e && e.target !== document.getElementById('searchOverlay')) return;
  document.getElementById('searchOverlay').classList.remove('active');
}

function handleSearch(q) {
  var el = document.getElementById('searchResults');
  if (!q || q.length < 1) { el.innerHTML = ''; return; }
  q = q.toUpperCase();
  var results = [];
  Object.keys(D.tickers).forEach(function(sym) {
    if (sym.indexOf(q) >= 0 || D.tickers[sym].company.toUpperCase().indexOf(q) >= 0)
      results.push({ sym: sym, co: D.tickers[sym].company });
  });
  if (!results.length) { el.innerHTML = ''; return; }
  el.innerHTML = results.map(function(r) {
    return '<li role="option" class="search-result" tabindex="0" onclick="selectSearchResult(\'' + r.sym + '\')"><span class="sr-ticker">' + r.sym + '</span><span class="sr-company">' + r.co + '</span></li>';
  }).join('');
}

function selectSearchResult(sym) {
  document.getElementById('searchOverlay').classList.remove('active');
  openContextPanel(sym);
}

// ═══════════════════════════════════════════
// CONTEXT PANEL
// ═══════════════════════════════════════════
var _prevFocus = null;
var _ctxSym = null;
var _ctxTab = 'summary';

// Phase 3.5 lazy-load: fetch per-ticker JSON on first context-panel open, merge into D.tickers[sym].
// Cached by sym after first fetch; subsequent opens are instant.
window._tickerHydrated = window._tickerHydrated || {};

function _hydrateTicker(sym) {
  return new Promise(function(resolve) {
    if (window._tickerHydrated[sym]) return resolve(true);
    var t = D.tickers[sym];
    if (!t) return resolve(false);
    fetch('data/tickers/' + encodeURIComponent(sym) + '.json', {cache: 'force-cache'})
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(payload) {
        if (payload) {
          // Merge heavy fields onto the light summary already in D.tickers[sym].
          Object.keys(payload).forEach(function(k) {
            if (k === '_meta') return;
            if (t[k] === undefined) t[k] = payload[k];
          });
        }
        window._tickerHydrated[sym] = !!payload;
        resolve(!!payload);
      })
      .catch(function() {
        window._tickerHydrated[sym] = false;
        resolve(false);
      });
  });
}

function openContextPanel(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  _prevFocus = document.activeElement;
  _ctxSym = sym;
  _ctxTab = 'summary';
  var chgC = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
  var chgS = t.change >= 0 ? '+' : '';
  document.getElementById('ctx-title').innerHTML = '<span>' + sym + '</span><span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:6px">' + t.company + '</span><span class="mono" style="font-size:14px;margin-left:auto;margin-right:8px">' + t.price + '</span><span class="mono" style="font-size:12px;color:' + chgC + '">' + chgS + t.change.toFixed(2) + '%</span>';

  // Show panel immediately with summary tab; tabs that depend on heavy fields render after hydration.
  document.getElementById('ctxTabs').innerHTML = '<span style="padding:8px 12px;font-size:11px;color:var(--text-secondary)">Loading…</span>';
  document.getElementById('ctx-panel').classList.add('open');
  document.querySelector('.main-content').classList.add('panel-open');

  _hydrateTicker(sym).then(function(ok) {
    if (_ctxSym !== sym) return; // user closed/switched while loading
    var tabs = ['summary'];
    var tabLabels = ['Summary'];
    if (t.pm) { tabs.push('patternmatch'); tabLabels.push('Pattern Match'); }
    tabs.push('valuation', 'catalysts', 'research');
    tabLabels.push('Valuation', 'Catalysts', 'Research');
    if (t.indicators) { tabs.push('indicators'); tabLabels.push('Indicators'); }
    tabs.push('financials'); tabLabels.push('Financials');
    var tabHtml = '';
    tabs.forEach(function(tab, i) {
      tabHtml += '<button class="ctx-tab' + (i === 0 ? ' active' : '') + '" data-ctx-tab="' + tab + '" onclick="switchCtxTab(\'' + tab + '\')">' + tabLabels[i] + '</button>';
    });
    if (!ok && !window._tickerOfflineWarned) {
      tabHtml += '<span style="margin-left:auto;padding:4px 8px;font-size:10px;color:var(--accent-red);align-self:center" title="Per-ticker JSON not loaded — connect to network and reload, or run dashboard-refresh.sh locally">offline</span>';
      window._tickerOfflineWarned = true;
    }
    document.getElementById('ctxTabs').innerHTML = tabHtml;
    renderCtxTab('summary');
  });
}

function closeContextPanel() {
  document.getElementById('ctx-panel').classList.remove('open');
  document.querySelector('.main-content').classList.remove('panel-open');
  if (_prevFocus) _prevFocus.focus();
  _ctxSym = null;
}

function switchCtxTab(tab) {
  _ctxTab = tab;
  document.querySelectorAll('.ctx-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.ctx-tab[data-ctx-tab="' + tab + '"]').classList.add('active');
  renderCtxTab(tab);
}

function renderCtxTab(tab) {
  var sym = _ctxSym;
  var t = D.tickers[sym];
  if (!t) return;
  var h = '';

  if (tab === 'summary') {
    if (t.businessBackground) {
      h += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">' + t.businessBackground + '</div>';
    }
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
    h += '<span class="pill pill-green">' + t.portfolioType + '</span>';
    h += '<span class="pill ' + (t.instrument.includes('C ') || t.instrument.includes('Call') ? 'pill-orange' : 'pill-blue') + '">' + t.instrument + '</span>';
    h += '<span class="pill pill-grey">' + t.allocation + '% alloc</span>';
    h += '</div>';
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:600">Conviction ' + t.conviction + '/10</span><span style="font-size:12px;color:var(--text-secondary)">RC ' + t.rc + '/11</span></div>';
    h += '<div style="display:flex;gap:16px;margin-bottom:12px">';
    if (t.clusterA) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster A</span><div style="font-size:16px;font-weight:700;color:var(--accent-positive)">' + t.clusterA + '%</div></div>';
    if (t.clusterB) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster B</span><div style="font-size:16px;font-weight:700">' + t.clusterB + '%</div></div>';
    h += '</div>';
    if (t.dimensions) {
      h += '<div class="radar-wrap"><canvas id="ctxRadar" role="img" aria-label="Conviction dimensions radar chart for ' + sym + '"></canvas></div>';
      h += '<div class="dim-grid">';
      DIM_KEYS.forEach(function(d) {
        var dim = t.dimensions[d];
        var v = dimScore(dim);
        var c = v >= 5 ? 'var(--accent-positive)' : v <= 2 ? 'var(--accent-negative)' : v === 3 ? 'var(--accent-amber)' : 'var(--text-primary)';
        var badge = dimBadge(dim) || '<span class="badge-fact" style="opacity:0">_</span>';
        h += '<div class="dim-cell"><div class="dim-badge">' + badge + '</div><div class="dim-label">' + DIM_SHORT[d] + '</div><div class="dim-score" style="color:' + c + '">' + v + '</div></div>';
      });
      h += '</div>';
    } else {
      h += '<div style="text-align:center;padding:16px;color:var(--text-secondary);font-size:12px">No conviction dimensions scored yet</div>';
    }
    h += '</div>';
    if (t.premortem && t.premortem.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--accent-red)">\u26A0 Pre-Mortem</div>';
      t.premortem.forEach(function(p) {
        h += '<div style="font-size:12px;padding:3px 0;color:var(--accent-negative)">\u2022 ' + p + '</div>';
      });
      h += '</div>';
    }
    if (t.entryTiming) {
      var etColor = t.entryTiming.signal === 'GO' ? 'var(--accent-positive)' : t.entryTiming.signal === 'LEAN' ? 'var(--accent-amber)' : 'var(--accent-negative)';
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Entry Timing</div>';
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      h += '<span class="pill" style="font-size:11px;background:' + etColor + ';color:#000;font-weight:700;padding:3px 10px">' + t.entryTiming.signal + '</span>';
      h += '<span style="font-size:12px;color:var(--text-secondary)">Review: ' + t.entryTiming.reviewDate + '</span>';
      h += '</div>';
      h += '<div style="font-size:12px;color:var(--text-secondary);line-height:1.5">' + esc(t.entryTiming.rationale) + '</div>';
      h += '</div>';
    }
    h += '<div style="border-top:1px solid var(--border);padding-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Recent Notes</div>';
    (t.recentNotes || []).forEach(function(n) {
      h += '<div style="font-size:12px;padding:3px 0;color:var(--text-secondary)">\u2022 ' + n + '</div>';
    });
    h += '</div>';

  } else if (tab === 'valuation') {
    // Price + Market Cap header
    var chgColor = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
    var chgSign = t.change >= 0 ? '+' : '';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
    h += '<div><span class="mono" style="font-size:22px;font-weight:700">' + t.price + '</span>';
    h += '<span style="margin-left:8px;font-size:14px;color:' + chgColor + '">' + chgSign + t.change + '%</span></div>';
    if (t.marketCap) {
      h += '<div style="text-align:right"><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Mkt Cap</div>';
      h += '<span class="mono" style="font-size:14px">' + t.marketCap + '</span></div>';
    }
    h += '</div>';
    // Methodology header
    if (t.valuation) {
      h += '<div style="font-size:12px;color:var(--accent-blue);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px">' + t.valuation.methodology + '</div>';
      if (t.fairValue) {
        h += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">' + t.fairValue.thesisType + ' \u2022 Updated ' + t.valuation.lastUpdated + '</div>';
      }
      // Rationale
      if (t.valuation.rationale) {
        h += '<div style="font-size:12px;line-height:1.5;color:var(--text-secondary);padding:10px 12px;background:rgba(74,158,255,.06);border-left:2px solid var(--accent-blue);border-radius:0 8px 8px 0;margin-bottom:16px">' + t.valuation.rationale + '</div>';
      }
    } else if (t.fairValue) {
      h += '<div style="font-size:12px;color:var(--accent-blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">' + t.fairValue.methodology + '</div>';
      h += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">' + t.fairValue.thesisType + ' \u2022 Updated ' + t.fairValue.lastUpdated + '</div>';
    }
    // Fair Value snapshot
    if (t.fairValue) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Fair Value Snapshot</div>';
      h += '<div class="fv-grid" style="margin-bottom:16px">';
      h += '<div class="fv-item"><div class="fv-label">Bear</div><div class="fv-value" style="color:var(--accent-negative)">' + t.fairValue.bearCaseFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Base</div><div class="fv-value">' + t.fairValue.baseCaseFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Prob-Wtd</div><div class="fv-value" style="color:var(--accent-positive)">' + t.fairValue.probWeightedFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Bull</div><div class="fv-value" style="color:var(--accent-amber)">' + t.fairValue.bullCaseFV + '</div></div>';
      h += '</div>';
    }
    // Key Assumptions
    if (t.valuation && t.valuation.assumptions && t.valuation.assumptions.length) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Key Assumptions</div>';
      h += '<table style="font-size:12px;margin-bottom:16px">';
      t.valuation.assumptions.forEach(function(a) {
        h += '<tr><td style="color:var(--text-secondary);padding:3px 8px 3px 0;white-space:nowrap">' + a.label + '</td><td style="font-weight:600;padding:3px 0" class="mono">' + a.value + '</td></tr>';
      });
      h += '</table>';
    }
    // Scenario Distribution
    h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Scenarios</div>';
    if (t.scenarios) {
      t.scenarios.forEach(function(s) {
        h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
        h += '<span style="font-size:12px;min-width:80px">' + s.name + '</span>';
        h += '<div class="gauge" style="flex:1"><div class="gauge-fill" style="width:' + (s.prob * 2) + '%;background:var(--accent-blue)"></div></div>';
        h += '<span class="mono" style="font-size:12px;min-width:70px;text-align:right">' + s.price + ' (' + s.prob + '%)</span>';
        h += '</div>';
      });
    }
    // Sensitivity Table
    if (t.valuation && t.valuation.sensitivity) {
      var sens = t.valuation.sensitivity;
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">' + sens.title + '</div>';
      h += '<table style="font-size:11px;width:100%"><thead><tr><th style="text-align:left;padding:4px;font-size:10px"></th>';
      sens.cols.forEach(function(c) { h += '<th style="text-align:center;padding:4px;font-size:10px;color:var(--accent-blue)">' + c + '</th>'; });
      h += '</tr></thead><tbody>';
      sens.rows.forEach(function(r) {
        h += '<tr><td style="padding:4px;font-weight:600;color:var(--text-secondary);white-space:nowrap">' + r.label + '</td>';
        r.vals.forEach(function(v) { h += '<td style="text-align:center;padding:4px" class="mono">' + v + '</td>'; });
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }
    // Peer Comparables
    if (t.valuation && t.valuation.peers && t.valuation.peers.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Peer Comparables</div>';
      h += '<table style="font-size:12px">';
      t.valuation.peers.forEach(function(p) {
        h += '<tr><td style="color:var(--text-secondary);padding:3px 8px 3px 0">' + p.name + '</td><td class="mono" style="font-weight:600;padding:3px 0">' + p.multiple + '</td></tr>';
      });
      h += '</table></div>';
    }
    // Current Price + Upside
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline">';
    h += '<div><div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Current</div><span class="mono" style="font-size:18px;font-weight:700;color:var(--text-primary)">' + t.price + '</span></div>';
    if (t.fairValue) {
      var upside = computeUpside(sym);
      if (upside !== null) {
        h += '<div style="text-align:right"><div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Upside (Prob-Wtd)</div><span class="mono" style="font-size:18px;font-weight:700;color:' + (upside >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)') + '">' + (upside >= 0 ? '+' : '') + upside + '%</span></div>';
      }
    }
    h += '</div></div>';

  } else if (tab === 'catalysts') {
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Key Catalysts</div>';
    (t.catalysts || []).forEach(function(c) {
      h += '<div class="timeline-item" style="padding:6px 0">';
      h += '<div class="timeline-dot" style="background:var(--accent-blue);margin-top:4px"></div>';
      h += '<div style="font-size:12px">' + c + '</div>';
      h += '</div>';
    });
    var opts = (D.options || []).filter(function(o) { return o.ticker === sym; });
    if (opts.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Options Timeline</div>';
      opts.forEach(function(o) {
        var dc = o.dte >= 45 ? 'dte-green' : o.dte >= 30 ? 'dte-amber' : 'dte-red';
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0">';
        h += '<span class="mono">' + o.strike + ' ' + o.instrument + ' ' + o.expiry + '</span>';
        h += '<span class="dte-badge ' + dc + '">' + o.dte + ' DTE</span>';
        h += '</div>';
        if (o.catalystAlignment) {
          o.catalystAlignment.forEach(function(ca) {
            h += '<div style="font-size:11px;color:var(--text-secondary);padding-left:8px">\u2514 ' + ca.catalyst + ' ' + ca.date + ' (' + ca.dteAtCatalyst + ' DTE) <span style="color:var(--accent-positive)">\u2705</span></div>';
          });
        }
      });
      h += '</div>';
    }

  } else if (tab === 'research') {
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
    h += '<span style="font-size:13px;font-weight:600">RC ' + t.rc + '/11</span>';
    h += '<span style="display:flex;gap:3px" title="' + (t.rcChecklist || []).map(function(g,i){return 'G'+(i+1)+': '+g.gate+(g.met?' \u2713':' \u2717')}).join(', ') + '">';
    (t.rcChecklist || []).forEach(function(g) {
      h += '<span style="width:10px;height:10px;border-radius:50%;display:inline-block;background:' + (g.met ? 'var(--accent-positive)' : 'var(--accent-negative)') + '"></span>';
    });
    h += '</span></div>';
    if (t.variantViews && t.variantViews.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Variant View</div>';
      t.variantViews.forEach(function(v) { h += '<div class="variant-view">' + v + '</div>'; });
      h += '</div>';
    }
    // Dimensions detail
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Conviction Dimensions</div>';
    if (t.dimensions) {
      DIM_KEYS.forEach(function(d) {
        var dim = t.dimensions[d];
        var v = dimScore(dim);
        var c = v >= 5 ? 'var(--accent-positive)' : v <= 3 ? 'var(--accent-amber)' : 'var(--text-primary)';
        h += '<div style="margin-bottom:8px">';
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">';
        h += '<span>' + dimBadge(dim) + d + ' ' + DIM_LABELS[d] + '</span>';
        h += '<span class="mono" style="font-weight:700;color:' + c + '">' + v + '/5</span>';
        h += '</div>';
        if (dim && dim.rationale) {
          h += '<div style="font-size:11px;color:var(--text-secondary);line-height:1.4;padding-left:16px">' + esc(dim.rationale) + '</div>';
        }
        h += '</div>';
      });
    } else {
      h += '<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:12px">Not yet scored</div>';
    }
    h += '</div>';

  } else if (tab === 'patternmatch') {
    var pm = t.pm;
    // Header: total score, archetype, result
    var pmTotal = pm.total;
    var pmMax = pm.max || 35;
    var pmPct = Math.round(pmTotal / pmMax * 100);
    var pmResultColor = pmTotal >= 28 ? 'var(--accent-positive)' : pmTotal >= 22 ? 'var(--accent-blue)' : 'var(--accent-amber)';
    var pmResult = pmTotal >= 28 ? 'STRONG' : pmTotal >= 25 ? 'INTERESTING-HIGH' : pmTotal >= 22 ? 'INTERESTING-LOW' : 'PASS';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h += '<div><span style="font-size:24px;font-weight:700;color:' + pmResultColor + '">' + pmTotal + '/' + pmMax + '</span>';
    h += ' <span class="pill" style="font-size:10px;background:' + pmResultColor + ';color:#fff">' + pmResult + '</span></div>';
    h += '<div style="text-align:right;font-size:11px;color:var(--text-secondary)">Archetype: <strong style="color:var(--text-primary)">' + esc(pm.archetype || 'N/A') + '</strong></div>';
    h += '</div>';
    // Score bar
    h += '<div style="height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden;margin-bottom:16px">';
    h += '<div style="height:100%;width:' + pmPct + '%;background:' + pmResultColor + ';border-radius:4px"></div></div>';

    // Universal dimensions
    h += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:8px">Universal Dimensions</div>';
    (pm.universal || []).forEach(function(d) {
      var dMax = d.max || 5;
      var dPct = Math.round(d.score / dMax * 100);
      var dColor = dPct >= 80 ? 'var(--accent-positive)' : dPct >= 60 ? 'var(--accent-blue)' : dPct >= 40 ? 'var(--accent-amber)' : 'var(--accent-negative)';
      h += '<div style="margin-bottom:10px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">';
      h += '<span style="font-size:12px;font-weight:600">' + esc(d.id) + ': ' + esc(d.name) + '</span>';

// Chart instance registry — keyed by canvas id. Destroy-on-rerender prevents
// the radar/sparkline collapse-to-single-point regression when a context panel
// is re-opened, and lets the new theme-concentration chart re-render cleanly.
window._charts = window._charts || {};
function _makeChart(canvasOrId, config) {
  var canvas = (typeof canvasOrId === 'string') ? document.getElementById(canvasOrId) : canvasOrId;
  if (!canvas) return null;
  var key = canvas.id || ('_anon_' + (canvas._chartKey = canvas._chartKey || (Date.now() + Math.random())));
  if (window._charts[key]) {
    try { window._charts[key].destroy(); } catch (e) {}
  }
  var c = new Chart(canvas, config);
  window._charts[key] = c;
  return c;
}

function renderThemeConcentrationChart() {
  var canvas = document.getElementById('themeConcentrationChart');
  if (!canvas || !D.themeConcentration) return;
  var sorted = D.themeConcentration.slice().sort(function(a, b) { return b.totalPct - a.totalPct; });
  var labels = sorted.map(function(r) { return r.theme; });
  // Collect all instrument keys across themes for stable stacking.
  var instrSet = {};
  sorted.forEach(function(r) {
    Object.keys(r.instruments || {}).forEach(function(k) { instrSet[k] = true; });
  });
  var instrKeys = Object.keys(instrSet);
  var palette = { 'Shares': '#4A9EFF', 'Cash': '#8E8E99', 'Options': '#F5A623', 'Long Calls': '#F5A623' };
  var datasets = instrKeys.map(function(k) {
    return {
      label: k,
      data: sorted.map(function(r) { return (r.instruments && r.instruments[k]) || 0; }),
      backgroundColor: palette[k] || '#7B61FF',
      borderColor: sorted.map(function(r) {
        if (r.flag === 'OVER_HARD') return 'var(--accent-red)';
        if (r.flag === 'OVER_ADVISORY') return '#F5A623';
        return 'transparent';
      }),
      borderWidth: sorted.map(function(r) { return r.flag === 'OK' ? 0 : 2; })
    };
  });
  _makeChart(canvas, {
    type: 'bar',
    data: { labels: labels, datasets: datasets },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true, max: 100, grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', callback: function(v) { return v + '%'; } } },
        y: { stacked: true, grid: { display: false }, ticks: { color: '#C9C9D4', font: { size: 11 } } }
      },
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8E8E99', font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            footer: function(items) {
              var idx = items[0].dataIndex;
              var r = sorted[idx];
              return r.flag === 'OK' ? '' : 'Flag: ' + r.flag.replace('_', ' ');
            }
          }
        }
      }
    }
  });
}

function renderRadarChart(sym) {
  var canvas = document.getElementById('ctxRadar');
  if (!canvas) return;
  var t = D.tickers[sym];
  if (!t || !t.dimensions) return;
  var dims = t.dimensions;
  var data = DIM_KEYS.map(function(d) { return dimScore(dims[d]); });
  _makeChart(canvas, {
    type: 'radar',
    data: {
      labels: DIM_KEYS.map(function(d) { return d + ' ' + DIM_SHORT[d]; }),
      datasets: [{
        data: data,
        backgroundColor: 'rgba(74,158,255,0.15)',
        borderColor: 'rgba(74,158,255,0.8)',
        pointBackgroundColor: '#4A9EFF',
        pointRadius: 3, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 6, ticks: { stepSize: 1, display: false },
          grid: { color: 'rgba(46,46,58,0.5)' },
          angleLines: { color: 'rgba(46,46,58,0.5)' },
          pointLabels: { color: '#8E8E99', font: { size: 9 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderCtxSparkline(sym) {
  var canvas = document.getElementById('ctxSparkline');
  if (!canvas || !D.priceHistory[sym]) return;
  var ph = D.priceHistory[sym];
  _makeChart(canvas, {
    type: 'line',
    data: {
      labels: ph.map(function(p) { return p.ts.slice(5); }),
      datasets: [{
        data: ph.map(function(p) { return p.price; }),
        borderColor: '#4A9EFF', backgroundColor: 'rgba(74,158,255,0.1)',

    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', font: { size: 10 } } },
        y: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', font: { size: 10 } } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function changeColor(val) {
  return val > 0 ? 'var(--accent-positive)' : val < 0 ? 'var(--accent-negative)' : 'var(--text-secondary)';
}

function changePrefix(val) {
  return val > 0 ? '+' : '';
}

function dteClass(dte) {
  return dte >= 45 ? 'dte-green' : dte >= 30 ? 'dte-amber' : 'dte-red';
}

function computeUpside(sym) {
  var t = D.tickers[sym];
  if (!t || !t.fairValue || !t.fairValue.probWeightedFV || !t.price) return null;
  var fvStr = t.fairValue.probWeightedFV.replace(/[^0-9.\-]/g, '');
  var priceStr = t.price.replace(/[^0-9.\-]/g, '');
  var fv = parseFloat(fvStr), price = parseFloat(priceStr);
  if (isNaN(fv) || isNaN(price) || price === 0) return null;
  return Math.round((fv / price - 1) * 100);
}

function todayStr() { return D.generated || '2026-03-27'; }

function formatDate(ds) {
  if (!ds) return '';
  var d = new Date(ds);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function getTickerChipClass(sym, theme) {
  var t = D.tickers[sym];
  if (t && t.status === 'ACTIVE') return 'ticker-chip-active';
  if (t && t.status === 'MONITORING') return 'ticker-chip-monitoring';
  // Check if parked
  if (D.parked) {
    for (var i = 0; i < D.parked.length; i++) {
      if (D.parked[i].ticker === sym) return 'ticker-chip-other';
    }
  }
  return 'ticker-chip-monitoring';
}
function _freshnessBadge(section) {
  if (!D.freshness || !D.freshness.sections || !D.freshness.sections[section]) return '';
  var s = D.freshness.sections[section];
  var newest = s.newestSourceTs;
  if (!newest) return '';
  var d = new Date(newest);
  var diffDays = Math.round((Date.now() - d.getTime()) / 86400000);
  var label = diffDays === 0 ? 'today' : diffDays === 1 ? '1d ago' : diffDays + 'd ago';
  var stale = diffDays > 14;
  return '<span style="font-size:10px;font-weight:500;color:' + (stale ? 'var(--accent-red)' : 'var(--text-secondary)') +
    ';margin-left:10px;letter-spacing:.04em" title="' + s.fileCount + ' files; newest ' + d.toISOString().slice(0,10) + '">data ' + label + '</span>';
}

    h += '<div class="theme-concentration" style="margin-bottom:24px;padding:16px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border)">';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">';
    h += '<h3 style="margin:0;font-size:14px;color:var(--text-secondary);font-weight:600;letter-spacing:.04em;text-transform:uppercase">Theme Concentration</h3>';
    h += '<span style="font-size:11px;color:var(--text-secondary)">25% advisory · 55% hard cap</span>';
    h += '</div>';
    h += '<div style="height:' + Math.max(140, D.themeConcentration.length * 32) + 'px"><canvas id="themeConcentrationChart"></canvas></div>';
    h += '</div>';
    setTimeout(function() { renderThemeConcentrationChart(); }, 30);
  }


  // Active themes as cards
  var activeThemes = D.themes.filter(function(t) { return t.status !== 'DORMANT'; });
  var dormantThemes = D.themes.filter(function(t) { return t.status === 'DORMANT'; });

  h += '<div class="theme-grid">';
  activeThemes.forEach(function(t) {
    var statusPill, cardClass = 'theme-card-v2';
    if (t.status === 'STABLE') statusPill = 'pill-green';
    else if (t.status === 'ESCALATING') { statusPill = 'pill-red'; cardClass += ' theme-card-v2-escalating'; }
    else if (t.status === 'WEAKENING') { statusPill = 'pill-amber'; cardClass += ' theme-card-v2-weakening'; }
    else statusPill = 'pill-grey';

    h += '<div class="' + cardClass + '">';

    h += '<div class="tc2-header">';

    h += '<span class="pill ' + statusPill + '">' + t.status + '</span>';
    h += '</div>';
    // Scores
    h += '<div class="tc2-scores">';
    h += 'Impact: <strong>' + (t.impact !== null ? t.impact : '\u2014') + '</strong>';
    h += ' &times; Discovery: <strong>' + (t.discovery !== null ? t.discovery : '\u2014') + '</strong>';
    h += ' = Priority: <strong style="' + (t.priority >= 20 ? 'color:var(--accent-positive)' : '') + '">' + (t.priority !== null ? t.priority : '\u2014') + '</strong>';
    h += '</div>';
    // Ticker chips
    h += '<div class="ticker-chips">';
    t.tickers.forEach(function(tk) {
      var chipClass = getTickerChipClass(tk, t.name);
      if (D.tickers[tk]) {
        h += '<span class="ticker-chip ' + chipClass + '" onclick="openContextPanel(\'' + tk + '\')" style="cursor:pointer">' + tk + '</span>';
      } else {
        h += '<span class="ticker-chip ticker-chip-other">' + tk + '</span>';
      }
    });
    h += '</div>';
    // Counts
    h += '<div class="tc2-counts">';
    if (t.activeCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--accent-positive)"></span>' + t.activeCount + ' Active</span>';
    if (t.monitoringCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--accent-blue)"></span>' + t.monitoringCount + ' Monitoring</span>';
    if (t.parkedCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--text-secondary)"></span>' + t.parkedCount + ' Parked</span>';
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Dormant themes
  if (dormantThemes.length) {
    h += '<button class="section-toggle" aria-expanded="false" onclick="toggleSection(this)">Dormant Themes (' + dormantThemes.length + ')</button>';
    h += '<div class="section-body" style="max-height:0;overflow:hidden"><div class="theme-grid">';
    dormantThemes.forEach(function(t) {
      h += '<div class="theme-card-v2 theme-card-v2-dormant">';
      h += '<div class="tc2-header"><span class="tc2-name">' + esc(t.name) + '</span><span class="pill pill-grey">DORMANT</span></div>';
      h += '<div class="ticker-chips">';
      t.tickers.forEach(function(tk) {
        h += '<span class="ticker-chip ticker-chip-other">' + tk + '</span>';
      });
      h += '</div></div>';
    });
    h += '</div></div>';
  }

  // Candidates (kept as-is)
  if (D.candidates && D.candidates.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">New Theme Candidates (' + D.candidates.length + ')</button>';
    h += '<div class="section-body">';
    D.candidates.forEach(function(c) {
      var borderStyle = c.escalating ? 'border-color:rgba(255,59,48,.3)' : '';
      h += '<div class="theme-card" style="' + borderStyle + '">';
      h += '<div class="theme-name">' + esc(c.name) + '</div>';
      h += '<div class="theme-meta">Priority ' + c.priority + ' (' + (c.priority >= 10 ? 'HIGH' : 'MOD') + ') \u00B7 ';
      h += (c.persistence > 1 ? 'PERSISTENCE CONFIRMED (' + c.persistence + ' briefings)' : 'First appearance');
      h += ' \u00B7 ' + esc(c.note);
      if (c.escalating) h += ' <strong style="color:var(--accent-red)">ESCALATING</strong>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // Parked (kept as-is)
  if (D.parked && D.parked.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Parked Tickers (' + D.parked.length + ')</button>';
    h += '<div class="section-body">';
    D.parked.forEach(function(p) {
      h += '<div class="theme-card" style="opacity:.6">';
      h += '<div class="theme-name">' + p.ticker + ' <span class="pill pill-grey">PARKED</span></div>';
      h += '<div class="theme-meta">' + p.theme + ' \u00B7 ' + esc(p.reason) + (p.triggerCheck ? ' \u00B7 Check: ' + p.triggerCheck : '') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  el.innerHTML = h;
}

// Phase 3.2.e: Gantt-style horizontal timeline grouped into 30/60/90-day buckets.
// Each row = ticker; each event = colored marker on the day axis.
function renderCatalystGantt(rows) {
  if (!rows || !rows.length) return '';
  // Filter to rows with parsable dates within the next 90 days (also include overdue ≤30d back).
  var today = new Date(); today.setHours(0,0,0,0);
  var WIN_BACK = 30, WIN_FWD = 90;
  var byTicker = {};
  rows.forEach(function(r) {
    if (!r.date) return;
    var d = new Date(r.date); if (isNaN(d.getTime())) return;
    var days = Math.round((d - today) / 86400000);
    if (days < -WIN_BACK || days > WIN_FWD) return;
    if (!byTicker[r.ticker]) byTicker[r.ticker] = [];
    byTicker[r.ticker].push({date: r.date, days: days, label: r.label, type: r.type, overdue: r.overdue, bucket: r.bucket});
  });
  var tickers = Object.keys(byTicker).sort();
  if (!tickers.length) return '';

  // Type → color
  var COLOR = {
    'Hard': '#FF5A5F',
    'Soft': '#4A9EFF',
    'Conditional': '#F5A623',
    'Express': '#C084FC',
    'Intraday': '#74E68A',
    'Overdue': '#FF5A5F'
  };

  var totalSpan = WIN_BACK + WIN_FWD;
  function pct(days) { return ((days + WIN_BACK) / totalSpan) * 100; }

  var h = '<div class="card cal-section" style="margin-bottom:16px">';
  h += '<h3 style="margin-top:0">Timeline (next 90 days)</h3>';
  // Legend
  h += '<div style="display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:var(--text-secondary);flex-wrap:wrap">';
  Object.keys(COLOR).forEach(function(k) {
    h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + COLOR[k] + '"></span>' + k + '</span>';
  });
  h += '</div>';
  // Axis row: day buckets
  h += '<div style="position:relative;margin-left:90px;height:18px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text-secondary)">';
  [-30, 0, 30, 60, 90].forEach(function(d) {
    var leftPct = pct(d);
    var label = d === 0 ? 'today' : (d > 0 ? '+' + d + 'd' : d + 'd');
    h += '<div style="position:absolute;left:' + leftPct + '%;top:0;transform:translateX(-50%);padding:0 2px">' + label + '</div>';
  });
  // Today marker line is drawn per-row below.
  h += '</div>';
  // Per-ticker rows
  tickers.forEach(function(sym) {
    var events = byTicker[sym];
    var t = D.tickers[sym] || {};
    var alloc = t.allocation ? Math.round(t.allocation) + '%' : '';
    h += '<div style="display:flex;align-items:center;height:24px;border-bottom:1px dashed rgba(46,46,58,0.4)">';
    h += '<div style="width:90px;font-size:11px;font-feature-settings:tnum;display:flex;justify-content:space-between;padding-right:8px">';
    h += '<a onclick="openContextPanel(\'' + sym + '\')" style="cursor:pointer;color:var(--text-primary);font-weight:600">' + sym + '</a>';
    h += '<span style="color:var(--text-secondary);font-size:10px">' + alloc + '</span></div>';
    h += '<div style="position:relative;flex:1;height:20px">';
    // Today vertical line
    h += '<div style="position:absolute;left:' + pct(0) + '%;top:0;bottom:0;width:1px;background:rgba(74,158,255,0.4)"></div>';
    events.forEach(function(ev) {
      var color = COLOR[ev.type] || '#8E8E99';
      if (ev.overdue) color = COLOR['Overdue'];
      var leftPct = pct(ev.days);
      var title = sym + ' · ' + ev.date + ' · ' + (ev.type || 'event') + ' · ' + (ev.label || '').slice(0, 80);
      h += '<button type="button" aria-label="' + esc(title) + '" title="' + esc(title) + '" style="position:absolute;left:' + leftPct + '%;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:' + color + ';box-shadow:0 0 0 2px var(--bg-card);cursor:pointer;border:none;padding:0" onclick="openContextPanel(\'' + sym + '\')"></button>';
    });
    h += '</div></div>';
  });
  h += '<div style="margin-top:8px;font-size:10px;color:var(--text-secondary)">' + tickers.length + ' tickers · ' + Object.values(byTicker).reduce(function(a,b){return a+b.length},0) + ' events. Click a marker or ticker symbol to open the context panel.</div>';
  h += '</div>';
  return h;
}

function renderCalendar() {
  var el = document.getElementById('sec-calendar');
  if (!el) return;
  var h = '<h2 class="section-title">Catalyst Calendar' + _freshnessBadge('calendar') + '</h2>';

  // ─── Filter bar (sticky) ───
  h += '<div class="filter-bar cal-filter-bar">';
  h += '<span class="filter-group-label">Type</span>';
  ['Hard','Soft','Conditional','Express','Overdue'].forEach(function(t) {
    var active = _calendarFilters.type.indexOf(t) >= 0 ? ' active' : '';
    h += '<span class="filter-chip' + active + '" onclick="toggleCalendarFilter(\'type\', \'' + t + '\')">' + t + '</span>';
  });
  h += '<span class="filter-group-label" style="margin-left:8px">Position</span>';
  [['Held','Held only'],['INVESTMENT','INV'],['TRADE','TRADE'],['MONITORING','MON']].forEach(function(p) {
    var active = _calendarFilters.position.indexOf(p[0]) >= 0 ? ' active' : '';
    h += '<span class="filter-chip' + active + '" onclick="toggleCalendarFilter(\'position\', \'' + p[0] + '\')">' + p[1] + '</span>';
  });
  h += '<span class="filter-group-label" style="margin-left:8px">Dim</span>';
  ['V1','V2','V3','V4','V5','V6','V7','V8'].forEach(function(d) {
    var active = _calendarFilters.dimension.indexOf(d) >= 0 ? ' active' : '';
    h += '<span class="filter-chip' + active + '" onclick="toggleCalendarFilter(\'dimension\', \'' + d + '\')">' + d + '</span>';
  });
  h += '<span class="filter-group-label" style="margin-left:8px">Wt&ge;</span>';
  [['all','All'],['1','1%'],['5','5%'],['10','10%']].forEach(function(w) {
    var active = _calendarFilters.weight === w[0] ? ' active' : '';
    h += '<span class="filter-chip' + active + '" onclick="toggleCalendarFilter(\'weight\', \'' + w[0] + '\')">' + w[1] + '</span>';
  });
  h += '<span class="filter-chip-clear" onclick="resetCalendarFilters()">Reset</span>';
  h += '</div>';

  // ─── Filtered timeline rows ───
  var allRows = (D.catalystTimeline || []).filter(_calMatchRow);
  var todayCount = (D.catalystTimeline || []).filter(function(r) { return r.bucket === 'today'; }).length;
  var overdueCount = (D.catalystTimeline || []).filter(function(r) { return r.overdue; }).length;
  var triggersArmed = (D.conditionalTriggers || []).filter(function(t) { return t.state === 'armed' || t.state === 'approaching'; }).length;
  var expressPending = (D.expressDeadlines || []).filter(function(d) { return d.status === 'pending' || d.status === 'breached'; }).length;
  var n7 = (D.catalystTimeline || []).filter(function(r) { return r.date && _daysFromToday(r.date) >= 0 && _daysFromToday(r.date) <= 7; }).length;
  var n14 = (D.catalystTimeline || []).filter(function(r) { return r.date && _daysFromToday(r.date) >= 0 && _daysFromToday(r.date) <= 14; }).length;
  var prepGaps = (D.prepBriefGaps || []).length;

  // ─── 1. Action Banner KPI strip ───
  h += '<div class="kpi-strip">';
  h += '<div class="kpi-item"><div class="kpi-label">Overdue</div><div class="kpi-value" style="color:var(--accent-red)">' + overdueCount + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Express pending</div><div class="kpi-value" style="color:' + (expressPending ? 'var(--accent-red)' : 'var(--text-secondary)') + '">' + expressPending + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Triggers armed</div><div class="kpi-value" style="color:var(--accent-amber)">' + triggersArmed + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Next 7d</div><div class="kpi-value">' + n7 + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Next 14d</div><div class="kpi-value">' + n14 + '</div></div>';
  h += '<div class="kpi-item"><div class="kpi-label">Prep gaps</div><div class="kpi-value" style="color:' + (prepGaps ? 'var(--accent-amber)' : 'var(--text-secondary)') + '">' + prepGaps + '</div></div>';
  h += '</div>';

  // ─── 1.5 Gantt-style timeline (Phase 3.2.e) ───
  h += renderCatalystGantt(allRows);

  var sectionsRendered = 0;

  // ─── 2. TODAY ───
  var todayRows = allRows.filter(function(r) { return r.bucket === 'today'; });
  if (todayRows.length) {
    sectionsRendered++;
    h += '<div class="card cal-section" style="border-color:rgba(255,59,48,.3)">';
    h += '<h3 style="color:var(--accent-red)">🚨 TODAY</h3>';
    h += _renderCalRows(todayRows);
    h += '</div>';
  }

  // ─── 3. Overdue ───
  var overdueRows = allRows.filter(function(r) { return r.overdue; });
  if (overdueRows.length) {
    sectionsRendered++;
    h += '<div class="card cal-section" style="border-color:rgba(255,59,48,.2)">';
    h += '<h3 style="color:var(--accent-red)">⚠️ Overdue (' + overdueRows.length + ')</h3>';
    h += _renderOverdueTable(overdueRows);
    h += '</div>';
  }

  // ─── 4. Express-Entry Deadlines (pending/breached only) ───
  var expressRows = (D.expressDeadlines || []).filter(function(d) { return d.status === 'pending' || d.status === 'breached'; });
  if (expressRows.length) {
    sectionsRendered++;
    h += '<div class="card cal-section" style="border-color:rgba(255,59,48,.3)">';
    h += '<h3 style="color:var(--accent-red)">⚡ Express-Entry Deadlines (' + expressRows.length + ')</h3>';
    expressRows.forEach(function(d) {
      var stateLbl = d.status === 'breached' ? 'BREACHED' : (d.hoursRemaining !== null ? d.hoursRemaining + 'h remaining' : 'pending');
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + esc(d.finalizeBy || '') + '</div>';
      h += '<div class="timeline-dot" style="background:var(--accent-red)"></div>';
      h += '<div class="timeline-event"><strong>' + esc(d.ticker) + '</strong> &middot; ' + esc(stateLbl) + ' &middot; <span style="font-size:11px;color:var(--text-secondary)">Run <code>trade-assessment --mode entry --finalize</code></span></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ─── 5. Prep-Brief Gaps ───
  var gaps = D.prepBriefGaps || [];
  if (gaps.length) {
    sectionsRendered++;
    h += '<div class="card cal-section" style="border-color:rgba(245,166,35,.3)">';
    h += '<h3 style="color:var(--accent-amber)">📋 Prep-Brief Gaps (' + gaps.length + ')</h3>';
    h += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">Held positions with catalysts within 30 days, no <code>{Ticker}/Prep/{date}-*.md</code> file.</div>';
    gaps.forEach(function(g) {
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + esc(g.date) + ' (D-' + g.daysAway + ')</div>';
      h += '<div class="timeline-dot" style="background:var(--accent-amber)"></div>';
      h += '<div class="timeline-event"><strong>' + esc(g.ticker) + '</strong> &middot; ' + esc(g.event) + '<br>';
      h += '<span style="font-size:11px;color:var(--text-secondary)">Run <code>event-prep ' + esc(g.ticker) + '</code> &rarr; ' + esc(g.prepDir) + '</span>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // ─── 6. Rule §20 Conditional Triggers ───
  var triggers = D.conditionalTriggers || [];
  if (triggers.length) {
    sectionsRendered++;
    h += '<div class="card cal-section">';
    h += '<h3>🎯 Rule §20 Conditional Triggers (' + triggers.length + ')</h3>';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Type</th><th>Trigger</th><th>Bounds</th><th>Current</th><th>State</th><th>Action on Fire</th></tr></thead>';
    h += '<tbody>';
    triggers.forEach(function(t) {
      var pulseClass = (t.state === 'approaching') ? ' state-approaching' : '';
      h += '<tr class="trigger-row' + pulseClass + '">';
      h += '<td class="mono">' + esc(t.ticker) + '</td>';
      h += '<td><span class="pill pill-purple" style="font-size:10px">' + esc(t.triggerType) + '</span></td>';
      h += '<td style="font-size:12px;max-width:280px">' + esc(t.description) + '</td>';
      var bounds = (t.upperBound !== null && t.lowerBound !== null) ? '$' + t.lowerBound + ' / $' + t.upperBound : '—';
      h += '<td class="mono">' + bounds + '</td>';
      h += '<td class="mono">' + (t.currentPx !== null ? '$' + t.currentPx : '—') + '</td>';
      var stateColor = t.state === 'fired' ? 'var(--accent-red)' : t.state === 'approaching' ? 'var(--accent-amber)' : 'var(--text-secondary)';
      h += '<td><span class="pill" style="background:rgba(0,0,0,0);color:' + stateColor + ';font-size:10px;border:1px solid ' + stateColor + '">' + (t.state || 'armed').toUpperCase() + '</span></td>';
      h += '<td style="font-size:11px;max-width:240px">' + esc(t.actionOnFire || '') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // ─── 7-10. Chronological buckets ───
  var buckets = [
    {kind:'next-2-weeks', title:'📅 Action Zone (Next 2 Weeks)', expanded:true},
    {kind:'weeks-3-4', title:'📅 Weeks 3–4', expanded:false},
    {kind:'month-2-3', title:'📅 Month 2–3', expanded:false},
    {kind:'beyond-3-months', title:'📅 Beyond 3 Months', expanded:false}
  ];
  buckets.forEach(function(b) {
    var rows = allRows.filter(function(r) { return r.bucket === b.kind; });
    if (!rows.length) return;
    sectionsRendered++;
    h += '<button class="section-toggle' + (b.expanded ? '' : ' collapsed') + '" aria-expanded="' + b.expanded + '" onclick="toggleSection(this)">' + b.title + ' (' + rows.length + ')</button>';
    h += '<div class="section-body"' + (b.expanded ? '' : ' style="display:none"') + '><div class="card" style="margin-top:8px">';
    h += _renderCalRows(rows);
    h += '</div></div>';
  });

  // ─── 11. Overhang Resolution Windows ───
  var overhang = D.overhangWindows || [];
  if (overhang.length) {
    sectionsRendered++;
    h += '<div class="card cal-section">';
    h += '<h3>🚪 Overhang Resolution Windows (' + overhang.length + ')</h3>';
    overhang.forEach(function(o) {
      h += '<div class="timeline-item">';
      h += '<div class="timeline-date">' + esc(o.resolveBy || '') + '</div>';
      h += '<div class="timeline-dot" style="background:var(--accent-blue)"></div>';
      h += '<div class="timeline-event"><strong>' + esc(o.ticker) + '</strong> &middot; ' + esc(o.description || '') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ─── 12. TRADE Time-Stops & Mid-Trade Check-ins ───
  var ts = D.tradeTimeStops || [];
  if (ts.length) {
    sectionsRendered++;
    h += '<div class="card cal-section">';
    h += '<h3>🔚 TRADE Time-Stops &amp; Mid-Trade Check-ins (' + ts.length + ')</h3>';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Entry</th><th>Mid-Trade Check (Rule §20)</th><th>Time-Stop (Rule §11)</th><th>Setup Score</th><th>Status</th></tr></thead>';
    h += '<tbody>';
    ts.forEach(function(t) {
      var gateColor = t.setupGatePassing ? 'var(--accent-positive)' : 'var(--accent-red)';
      h += '<tr>';
      h += '<td class="mono">' + esc(t.ticker) + '</td>';
      h += '<td class="mono">' + esc(t.entryDate || '—') + '</td>';
      var mid = (t.midTradeCheck || '—') + (t.daysToMidTradeCheck !== null && t.daysToMidTradeCheck !== undefined ? ' (D-' + t.daysToMidTradeCheck + ')' : '');
      h += '<td class="mono">' + esc(mid) + '</td>';
      var stop = (t.timeStop || '—') + (t.daysToTimeStop !== null && t.daysToTimeStop !== undefined ? ' (D-' + t.daysToTimeStop + ')' : '');
      h += '<td class="mono">' + esc(stop) + '</td>';
      h += '<td class="mono" style="color:' + gateColor + '">' + esc(t.currentSetupScore || '—') + '</td>';
      h += '<td style="font-size:11px;max-width:280px">' + esc(t.statusNote || '') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // ─── 13. Options Expiry ───
  if (D.options && D.options.length) {
    sectionsRendered++;
    h += '<div class="card">';
    h += '<h3>📊 Options Expiry</h3>';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Expiry</th><th>DTE</th><th>30-DTE Mark</th><th>Next Catalyst</th></tr></thead>';
    h += '<tbody>';
    D.options.forEach(function(o) {
      var dc = dteClass(o.dte);
      var nextCat = o.catalystAlignment && o.catalystAlignment.length ? o.catalystAlignment[0] : null;
      h += '<tr>';
      h += '<td class="mono">' + o.ticker + ' ' + o.strike + (o.instrument === 'Call' ? 'C' : 'P') + '</td>';
      h += '<td class="mono">' + o.expiry + '</td>';
      h += '<td><span class="dte-badge ' + dc + '">' + o.dte + '</span></td>';
      h += '<td class="mono">' + o.thirtyDteMark + '</td>';
      h += '<td style="font-size:12px">' + (nextCat ? nextCat.catalyst + ' (' + nextCat.dteAtCatalyst + ' DTE)' : '—') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // ─── 14. Threshold Monitors ───
  if (D.thresholdMonitors && D.thresholdMonitors.length) {
    sectionsRendered++;
    h += '<button class="section-toggle collapsed" aria-expanded="false" onclick="toggleSection(this)">📈 Threshold Monitors (' + D.thresholdMonitors.length + ')</button>';
    h += '<div class="section-body" style="display:none"><div class="card" style="margin-top:8px">';
    h += '<table>';
    h += '<thead><tr><th>Ticker</th><th>Threshold</th><th>Current</th><th>Status</th></tr></thead>';
    h += '<tbody>';
    D.thresholdMonitors.forEach(function(t) {
      var dotClass = t.status === 'ok' ? 'ind-ok' : t.status === 'approaching' ? 'ind-approaching' : 'ind-breach';
      var label = t.status === 'ok' ? 'OK' : t.status === 'approaching' ? 'Approaching' : 'BREACH';
      h += '<tr>';
      h += '<td class="mono">' + t.ticker + '</td>';
      h += '<td>' + esc(t.threshold) + '</td>';
      h += '<td class="mono">' + esc(t.current) + '</td>';
      h += '<td><span class="ind-dot ' + dotClass + '"></span>' + label + '</td>';

var _calendarFilters = (function() {
  try {
    var stored = localStorage.getItem('_calendarFilters');
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return {type:[], position:[], dimension:[], weight:'all'};
})();

function _saveCalFilters() {
  try { localStorage.setItem('_calendarFilters', JSON.stringify(_calendarFilters)); } catch (e) {}
}

function toggleCalendarFilter(group, val) {
  if (group === 'weight') {
    _calendarFilters.weight = (_calendarFilters.weight === val) ? 'all' : val;
  } else {
    var arr = _calendarFilters[group];
    var idx = arr.indexOf(val);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(val);
  }
  _saveCalFilters();
  renderCalendar();
}

function resetCalendarFilters() {
  _calendarFilters = {type:[], position:[], dimension:[], weight:'all'};
  _saveCalFilters();
  renderCalendar();
}

function _calMatchRow(row) {
  var f = _calendarFilters;
  if (f.type && f.type.length) {
    var t = row.type || '';
    var match = (f.type.indexOf(t) >= 0) || (row.overdue && f.type.indexOf('Overdue') >= 0);
    if (!match) return false;
  }
  if (f.position && f.position.length) {
    var pType = (D.tickers && D.tickers[row.ticker]) ? (D.tickers[row.ticker].portfolioType || '') : '';
    var pStatus = (D.tickers && D.tickers[row.ticker]) ? (D.tickers[row.ticker].status || '') : '';
    var ok = false;
    if (f.position.indexOf('Held') >= 0 && row.portfolioWt > 0) ok = true;
    if (f.position.indexOf('INVESTMENT') >= 0 && pType === 'INVESTMENT') ok = true;
    if (f.position.indexOf('TRADE') >= 0 && pType === 'TRADE') ok = true;
    if (f.position.indexOf('MONITORING') >= 0 && pStatus === 'MONITORING') ok = true;
    if (!ok) return false;
  }
  if (f.dimension && f.dimension.length) {
    var hit = false;
    var rowDims = row.dimensions || [];
    f.dimension.forEach(function(d) { if (rowDims.indexOf(d) >= 0) hit = true; });
    if (!hit) return false;
  }
  if (f.weight && f.weight !== 'all') {
    var minW = parseFloat(f.weight);
    if (!isNaN(minW) && (row.portfolioWt || 0) < minW) return false;
  }
  return true;
}
