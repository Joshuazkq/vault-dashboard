function switchSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-item, .bnav-btn').forEach(function(b) {

    b.removeAttribute('aria-current');
  });
  var sb = document.getElementById('sb-' + id);

  if (sb) { sb.classList.add('active'); sb.setAttribute('aria-current', 'page'); }
  if (bn) { bn.classList.add('active'); }
  _currentSection = id;
  localStorage.setItem('activeSection', id);
  window.scrollTo({ top: 0 });
  renderSection(id);
}

function renderSection(id) {
  if (_renderedSections[id]) return;

  q = q.toUpperCase();
  var results = [];
  Object.keys(D.tickers).forEach(function(sym) {
    if (sym.indexOf(q) >= 0 || D.tickers[sym].company.toUpperCase().indexOf(q) >= 0)
      results.push({ sym: sym, co: D.tickers[sym].company });
  });
  if (!results.length) { el.innerHTML = ''; return; }
  el.innerHTML = results.map(function(r) {
    return '<li role="option" class="search-result" tabindex="0" onclick="selectSearchResult(\'' + r.sym + '\')"><span class="sr-ticker">' + r.sym + '</span><span class="sr-company">' + r.co + '</span></li>';
  }).join('');
}

function selectSearchResult(sym) {
  document.getElementById('searchOverlay').classList.remove('active');
  openContextPanel(sym);
}

// ═══════════════════════════════════════════
// CONTEXT PANEL
// ═══════════════════════════════════════════
var _prevFocus = null;
var _ctxSym = null;
var _ctxTab = 'summary';

function openContextPanel(sym) {
  var t = D.tickers[sym];
  if (!t) return;
  _prevFocus = document.activeElement;
  _ctxSym = sym;
  _ctxTab = 'summary';
  var chgC = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
  var chgS = t.change >= 0 ? '+' : '';
  document.getElementById('ctx-title').innerHTML = '<span>' + sym + '</span><span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:6px">' + t.company + '</span><span class="mono" style="font-size:14px;margin-left:auto;margin-right:8px">' + t.price + '</span><span class="mono" style="font-size:12px;color:' + chgC + '">' + chgS + t.change.toFixed(2) + '%</span>';

  var tabs = ['summary'];
  var tabLabels = ['Summary'];
  if (t.pm) { tabs.push('patternmatch'); tabLabels.push('Pattern Match'); }
  tabs.push('valuation', 'catalysts', 'research');
  tabLabels.push('Valuation', 'Catalysts', 'Research');
  if (t.indicators) { tabs.push('indicators'); tabLabels.push('Indicators'); }
  tabs.push('financials'); tabLabels.push('Financials');
  var tabHtml = '';
  tabs.forEach(function(tab, i) {
    tabHtml += '<button class="ctx-tab' + (i === 0 ? ' active' : '') + '" data-ctx-tab="' + tab + '" onclick="switchCtxTab(\'' + tab + '\')">' + tabLabels[i] + '</button>';
  });
  document.getElementById('ctxTabs').innerHTML = tabHtml;

  renderCtxTab('summary');
  document.getElementById('ctx-panel').classList.add('open');
  document.querySelector('.main-content').classList.add('panel-open');
}

function closeContextPanel() {
  document.getElementById('ctx-panel').classList.remove('open');
  document.querySelector('.main-content').classList.remove('panel-open');
  if (_prevFocus) _prevFocus.focus();
  _ctxSym = null;
}

function switchCtxTab(tab) {
  _ctxTab = tab;
  document.querySelectorAll('.ctx-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.ctx-tab[data-ctx-tab="' + tab + '"]').classList.add('active');
  renderCtxTab(tab);
}

function renderCtxTab(tab) {
  var sym = _ctxSym;
  var t = D.tickers[sym];
  if (!t) return;
  var h = '';

  if (tab === 'summary') {
    if (t.businessBackground) {
      h += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">' + t.businessBackground + '</div>';
    }
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
    h += '<span class="pill pill-green">' + t.portfolioType + '</span>';
    h += '<span class="pill ' + (t.instrument.includes('C ') || t.instrument.includes('Call') ? 'pill-orange' : 'pill-blue') + '">' + t.instrument + '</span>';
    h += '<span class="pill pill-grey">' + t.allocation + '% alloc</span>';
    h += '</div>';
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:600">Conviction ' + t.conviction + '/10</span><span style="font-size:12px;color:var(--text-secondary)">RC ' + t.rc + '/5</span></div>';
    h += '<div style="display:flex;gap:16px;margin-bottom:12px">';
    if (t.clusterA) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster A</span><div style="font-size:16px;font-weight:700;color:var(--accent-positive)">' + t.clusterA + '%</div></div>';
    if (t.clusterB) h += '<div><span style="font-size:11px;color:var(--text-secondary)">Cluster B</span><div style="font-size:16px;font-weight:700">' + t.clusterB + '%</div></div>';
    h += '</div>';
    if (t.dimensions) {
      h += '<div class="radar-wrap"><canvas id="ctxRadar" role="img" aria-label="Conviction dimensions radar chart for ' + sym + '"></canvas></div>';
      h += '<div class="dim-grid">';
      DIM_KEYS.forEach(function(d) {
        var dim = t.dimensions[d];
        var v = dimScore(dim);
        var c = v >= 5 ? 'var(--accent-positive)' : v <= 2 ? 'var(--accent-negative)' : v === 3 ? 'var(--accent-amber)' : 'var(--text-primary)';
        var badge = dimBadge(dim) || '<span class="badge-fact" style="opacity:0">_</span>';
        h += '<div class="dim-cell"><div class="dim-badge">' + badge + '</div><div class="dim-label">' + DIM_SHORT[d] + '</div><div class="dim-score" style="color:' + c + '">' + v + '</div></div>';
      });
      h += '</div>';
    } else {
      h += '<div style="text-align:center;padding:16px;color:var(--text-secondary);font-size:12px">No conviction dimensions scored yet</div>';
    }
    h += '</div>';
    if (t.premortem && t.premortem.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--accent-red)">\u26A0 Pre-Mortem</div>';
      t.premortem.forEach(function(p) {
        h += '<div style="font-size:12px;padding:3px 0;color:var(--accent-negative)">\u2022 ' + p + '</div>';
      });
      h += '</div>';
    }
    if (t.entryTiming) {
      var etColor = t.entryTiming.signal === 'GO' ? 'var(--accent-positive)' : t.entryTiming.signal === 'LEAN' ? 'var(--accent-amber)' : 'var(--accent-negative)';
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Entry Timing</div>';
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      h += '<span class="pill" style="font-size:11px;background:' + etColor + ';color:#000;font-weight:700;padding:3px 10px">' + t.entryTiming.signal + '</span>';
      h += '<span style="font-size:12px;color:var(--text-secondary)">Review: ' + t.entryTiming.reviewDate + '</span>';
      h += '</div>';
      h += '<div style="font-size:12px;color:var(--text-secondary);line-height:1.5">' + esc(t.entryTiming.rationale) + '</div>';
      h += '</div>';
    }
    h += '<div style="border-top:1px solid var(--border);padding-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Recent Notes</div>';
    (t.recentNotes || []).forEach(function(n) {
      h += '<div style="font-size:12px;padding:3px 0;color:var(--text-secondary)">\u2022 ' + n + '</div>';
    });
    h += '</div>';

  } else if (tab === 'valuation') {
    // Price + Market Cap header
    var chgColor = t.change >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
    var chgSign = t.change >= 0 ? '+' : '';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
    h += '<div><span class="mono" style="font-size:22px;font-weight:700">' + t.price + '</span>';
    h += '<span style="margin-left:8px;font-size:14px;color:' + chgColor + '">' + chgSign + t.change + '%</span></div>';
    if (t.marketCap) {
      h += '<div style="text-align:right"><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Mkt Cap</div>';
      h += '<span class="mono" style="font-size:14px">' + t.marketCap + '</span></div>';
    }
    h += '</div>';
    // Methodology header
    if (t.valuation) {
      h += '<div style="font-size:12px;color:var(--accent-blue);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px">' + t.valuation.methodology + '</div>';
      if (t.fairValue) {
        h += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">' + t.fairValue.thesisType + ' \u2022 Updated ' + t.valuation.lastUpdated + '</div>';
      }
      // Rationale
      if (t.valuation.rationale) {
        h += '<div style="font-size:12px;line-height:1.5;color:var(--text-secondary);padding:10px 12px;background:rgba(74,158,255,.06);border-left:2px solid var(--accent-blue);border-radius:0 8px 8px 0;margin-bottom:16px">' + t.valuation.rationale + '</div>';
      }
    } else if (t.fairValue) {
      h += '<div style="font-size:12px;color:var(--accent-blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">' + t.fairValue.methodology + '</div>';
      h += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">' + t.fairValue.thesisType + ' \u2022 Updated ' + t.fairValue.lastUpdated + '</div>';
    }
    // Fair Value snapshot
    if (t.fairValue) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Fair Value Snapshot</div>';
      h += '<div class="fv-grid" style="margin-bottom:16px">';
      h += '<div class="fv-item"><div class="fv-label">Bear</div><div class="fv-value" style="color:var(--accent-negative)">' + t.fairValue.bearCaseFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Base</div><div class="fv-value">' + t.fairValue.baseCaseFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Prob-Wtd</div><div class="fv-value" style="color:var(--accent-positive)">' + t.fairValue.probWeightedFV + '</div></div>';
      h += '<div class="fv-item"><div class="fv-label">Bull</div><div class="fv-value" style="color:var(--accent-amber)">' + t.fairValue.bullCaseFV + '</div></div>';
      h += '</div>';
    }
    // Key Assumptions
    if (t.valuation && t.valuation.assumptions && t.valuation.assumptions.length) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Key Assumptions</div>';
      h += '<table style="font-size:12px;margin-bottom:16px">';
      t.valuation.assumptions.forEach(function(a) {
        h += '<tr><td style="color:var(--text-secondary);padding:3px 8px 3px 0;white-space:nowrap">' + a.label + '</td><td style="font-weight:600;padding:3px 0" class="mono">' + a.value + '</td></tr>';
      });
      h += '</table>';
    }
    // Scenario Distribution
    h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Scenarios</div>';
    if (t.scenarios) {
      t.scenarios.forEach(function(s) {
        h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
        h += '<span style="font-size:12px;min-width:80px">' + s.name + '</span>';
        h += '<div class="gauge" style="flex:1"><div class="gauge-fill" style="width:' + (s.prob * 2) + '%;background:var(--accent-blue)"></div></div>';
        h += '<span class="mono" style="font-size:12px;min-width:70px;text-align:right">' + s.price + ' (' + s.prob + '%)</span>';
        h += '</div>';
      });
    }
    // Sensitivity Table
    if (t.valuation && t.valuation.sensitivity) {
      var sens = t.valuation.sensitivity;
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">' + sens.title + '</div>';
      h += '<table style="font-size:11px;width:100%"><thead><tr><th style="text-align:left;padding:4px;font-size:10px"></th>';
      sens.cols.forEach(function(c) { h += '<th style="text-align:center;padding:4px;font-size:10px;color:var(--accent-blue)">' + c + '</th>'; });
      h += '</tr></thead><tbody>';
      sens.rows.forEach(function(r) {
        h += '<tr><td style="padding:4px;font-weight:600;color:var(--text-secondary);white-space:nowrap">' + r.label + '</td>';
        r.vals.forEach(function(v) { h += '<td style="text-align:center;padding:4px" class="mono">' + v + '</td>'; });
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }
    // Peer Comparables
    if (t.valuation && t.valuation.peers && t.valuation.peers.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Peer Comparables</div>';
      h += '<table style="font-size:12px">';
      t.valuation.peers.forEach(function(p) {
        h += '<tr><td style="color:var(--text-secondary);padding:3px 8px 3px 0">' + p.name + '</td><td class="mono" style="font-weight:600;padding:3px 0">' + p.multiple + '</td></tr>';
      });
      h += '</table></div>';
    }
    // Current Price + Upside
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:baseline">';
    h += '<div><div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Current</div><span class="mono" style="font-size:18px;font-weight:700;color:var(--text-primary)">' + t.price + '</span></div>';
    if (t.fairValue) {
      var upside = computeUpside(sym);
      if (upside !== null) {
        h += '<div style="text-align:right"><div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">Upside (Prob-Wtd)</div><span class="mono" style="font-size:18px;font-weight:700;color:' + (upside >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)') + '">' + (upside >= 0 ? '+' : '') + upside + '%</span></div>';
      }
    }
    h += '</div></div>';

  } else if (tab === 'catalysts') {
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Key Catalysts</div>';
    (t.catalysts || []).forEach(function(c) {
      h += '<div class="timeline-item" style="padding:6px 0">';
      h += '<div class="timeline-dot" style="background:var(--accent-blue);margin-top:4px"></div>';
      h += '<div style="font-size:12px">' + c + '</div>';
      h += '</div>';
    });
    var opts = (D.options || []).filter(function(o) { return o.ticker === sym; });
    if (opts.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Options Timeline</div>';
      opts.forEach(function(o) {
        var dc = o.dte >= 45 ? 'dte-green' : o.dte >= 30 ? 'dte-amber' : 'dte-red';
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0">';
        h += '<span class="mono">' + o.strike + ' ' + o.instrument + ' ' + o.expiry + '</span>';
        h += '<span class="dte-badge ' + dc + '">' + o.dte + ' DTE</span>';
        h += '</div>';
        if (o.catalystAlignment) {
          o.catalystAlignment.forEach(function(ca) {
            h += '<div style="font-size:11px;color:var(--text-secondary);padding-left:8px">\u2514 ' + ca.catalyst + ' ' + ca.date + ' (' + ca.dteAtCatalyst + ' DTE) <span style="color:var(--accent-positive)">\u2705</span></div>';
          });
        }
      });
      h += '</div>';
    }

  } else if (tab === 'research') {
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
    h += '<span style="font-size:13px;font-weight:600">RC ' + t.rc + '/5</span>';
    h += '<span style="display:flex;gap:3px" title="' + (t.rcChecklist || []).map(function(g,i){return 'G'+(i+1)+': '+g.gate+(g.met?' \u2713':' \u2717')}).join(', ') + '">';
    (t.rcChecklist || []).forEach(function(g) {
      h += '<span style="width:10px;height:10px;border-radius:50%;display:inline-block;background:' + (g.met ? 'var(--accent-positive)' : 'var(--accent-negative)') + '"></span>';
    });
    h += '</span></div>';
    if (t.variantViews && t.variantViews.length) {
      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
      h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">Variant View</div>';
      t.variantViews.forEach(function(v) { h += '<div class="variant-view">' + v + '</div>'; });
      h += '</div>';
    }
    // Dimensions detail
    h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Conviction Dimensions</div>';
    if (t.dimensions) {
      DIM_KEYS.forEach(function(d) {
        var dim = t.dimensions[d];
        var v = dimScore(dim);
        var c = v >= 5 ? 'var(--accent-positive)' : v <= 3 ? 'var(--accent-amber)' : 'var(--text-primary)';
        h += '<div style="margin-bottom:8px">';
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">';
        h += '<span>' + dimBadge(dim) + d + ' ' + DIM_LABELS[d] + '</span>';
        h += '<span class="mono" style="font-weight:700;color:' + c + '">' + v + '/5</span>';
        h += '</div>';
        if (dim && dim.rationale) {
          h += '<div style="font-size:11px;color:var(--text-secondary);line-height:1.4;padding-left:16px">' + esc(dim.rationale) + '</div>';
        }
        h += '</div>';
      });
    } else {
      h += '<div style="text-align:center;padding:12px;color:var(--text-secondary);font-size:12px">Not yet scored</div>';
    }
    h += '</div>';

  } else if (tab === 'patternmatch') {
    var pm = t.pm;
    // Header: total score, archetype, result
    var pmTotal = pm.total;
    var pmMax = pm.max || 35;
    var pmPct = Math.round(pmTotal / pmMax * 100);
    var pmResultColor = pmTotal >= 28 ? 'var(--accent-positive)' : pmTotal >= 22 ? 'var(--accent-blue)' : 'var(--accent-amber)';
    var pmResult = pmTotal >= 28 ? 'STRONG' : pmTotal >= 25 ? 'INTERESTING-HIGH' : pmTotal >= 22 ? 'INTERESTING-LOW' : 'PASS';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h += '<div><span style="font-size:24px;font-weight:700;color:' + pmResultColor + '">' + pmTotal + '/' + pmMax + '</span>';
    h += ' <span class="pill" style="font-size:10px;background:' + pmResultColor + ';color:#fff">' + pmResult + '</span></div>';
    h += '<div style="text-align:right;font-size:11px;color:var(--text-secondary)">Archetype: <strong style="color:var(--text-primary)">' + esc(pm.archetype || 'N/A') + '</strong></div>';
    h += '</div>';
    // Score bar
    h += '<div style="height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden;margin-bottom:16px">';
    h += '<div style="height:100%;width:' + pmPct + '%;background:' + pmResultColor + ';border-radius:4px"></div></div>';

    // Universal dimensions
    h += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:8px">Universal Dimensions</div>';
    (pm.universal || []).forEach(function(d) {
      var dMax = d.max || 5;
      var dPct = Math.round(d.score / dMax * 100);
      var dColor = dPct >= 80 ? 'var(--accent-positive)' : dPct >= 60 ? 'var(--accent-blue)' : dPct >= 40 ? 'var(--accent-amber)' : 'var(--accent-negative)';
      h += '<div style="margin-bottom:10px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">';
      h += '<span style="font-size:12px;font-weight:600">' + esc(d.id) + ': ' + esc(d.name) + '</span>';
      h += '<span class="mono" style="font-size:13px;font-weight:700;color:' + dColor + '">' + d.score + '/' + dMax + '</span>';
      h += '</div>';
      h += '<div style="height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;margin-bottom:4px">';
      h += '<div style="height:100%;width:' + dPct + '%;background:' + dColor + ';border-radius:2px"></div></div>';
      if (d.rationale) h += '<div style="font-size:11px;color:var(--text-secondary);line-height:1.4">' + esc(d.rationale) + '</div>';
      h += '</div>';
    });

    // Flex dimensions
    if (pm.flex && pm.flex.length) {
      h += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin:12px 0 8px;border-top:1px solid var(--border);padding-top:12px">Flex Dimensions (' + esc(pm.archetype || '') + ')</div>';
      pm.flex.forEach(function(d) {
        var dMax = d.max || 5;
        var dPct = Math.round(d.score / dMax * 100);
        var dColor = dPct >= 80 ? 'var(--accent-positive)' : dPct >= 60 ? 'var(--accent-blue)' : dPct >= 40 ? 'var(--accent-amber)' : 'var(--accent-negative)';
        h += '<div style="margin-bottom:10px">';
        h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">';
        h += '<span style="font-size:12px;font-weight:600">' + esc(d.id) + ': ' + esc(d.name) + '</span>';
        h += '<span class="mono" style="font-size:13px;font-weight:700;color:' + dColor + '">' + d.score + '/' + dMax + '</span>';
        h += '</div>';
        h += '<div style="height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;margin-bottom:4px">';
        h += '<div style="height:100%;width:' + dPct + '%;background:' + dColor + ';border-radius:2px"></div></div>';
        if (d.rationale) h += '<div style="font-size:11px;color:var(--text-secondary);line-height:1.4">' + esc(d.rationale) + '</div>';
        h += '</div>';
      });
    }

    // Failure patterns
    if (pm.failurePatterns && pm.failurePatterns.length) {

        {label:'EBITDA',value:f.ebitda,sub:f.ebitdaMargin},
        {label:'Net Income',value:f.netIncome},
        {label:'EPS',value:f.eps},
        {label:'FCF',value:f.fcf},
        {label:'Leverage',value:f.leverage}

        h += '<div class="mono" style="font-size:14px;font-weight:700">' + m.value + '</div>';

        h += '</div>';

      h += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Capital Structure</div>';

      var levColor = 'var(--text-primary)';
      if (f.leverageNum > 5) levColor = 'var(--accent-red)';

      h += '<div><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase">Total Debt</div><div class="mono" style="font-size:13px;font-weight:600;color:' + (f.totalDebt !== '$0' && f.totalDebt !== '\u20AC0' ? 'var(--accent-negative)' : 'var(--accent-positive)') + '">' + f.totalDebt + '</div></div>';
      h += '<div><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase">Cash</div><div class="mono" style="font-size:13px;font-weight:600;color:var(--accent-positive)">' + f.cash + '</div></div>';
      h += '<div><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase">Net Debt</div><div class="mono" style="font-size:13px;font-weight:600">' + f.netDebt + '</div></div>';
      h += '<div><div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase">Leverage</div><div class="mono" style="font-size:13px;font-weight:600;color:' + levColor + '">' + f.leverage + '</div></div>';
      h += '</div>';
      // Debt details table
      if (f.debtDetails && f.debtDetails.length > 0) {
        h += '<table style="font-size:11px;width:100%">';
        h += '<thead><tr><th style="text-align:left;padding:4px 6px;font-size:10px;color:var(--text-secondary)">Facility</th><th style="text-align:right;padding:4px 6px;font-size:10px;color:var(--text-secondary)">Amount</th><th style="text-align:right;padding:4px 6px;font-size:10px;color:var(--text-secondary)">Rate</th><th style="text-align:right;padding:4px 6px;font-size:10px;color:var(--text-secondary)">Maturity</th></tr></thead>';
        h += '<tbody>';
        f.debtDetails.forEach(function(d) {
          h += '<tr>';
          h += '<td style="padding:3px 6px;color:var(--text-secondary)">' + d.facility + '</td>';
          h += '<td style="padding:3px 6px;text-align:right" class="mono">' + d.amount + '</td>';
          h += '<td style="padding:3px 6px;text-align:right" class="mono">' + d.rate + '</td>';
          h += '<td style="padding:3px 6px;text-align:right" class="mono">' + d.maturity + '</td>';
          h += '</tr>';
        });
        h += '</tbody></table>';
      } else {
        h += '<div style="font-size:12px;color:var(--accent-positive);padding:6px 0">No material financial debt</div>';
      }
      h += '</div>';
    }
    // Price History (kept below financials)
    h += '<div style="border-top:1px solid var(--border);padding-top:12px">';
    h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Price History (7d)</div>';
    h += '<div style="height:120px"><canvas id="ctxSparkline" role="img" aria-label="7-day price chart for ' + sym + '"></canvas></div>';
    h += '</div>';
    // Portfolio metrics
    h += '<div style="margin-top:12px;font-size:12px;color:var(--text-secondary)">';
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Allocation</span><span class="mono">' + t.allocation + '% / ' + t.maxAlloc + '% max</span></div>';
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Band Violation</span><span style="color:' + (t.bandViolation ? 'var(--accent-red)' : 'var(--accent-positive)') + '">' + (t.bandViolation ? 'YES' : 'None') + '</span></div>';
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Currency</span><span class="mono">' + t.currency + '</span></div>';
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Theme</span><span>' + t.theme + '</span></div>';
    h += '</div>';
  }

  document.getElementById('ctxContent').innerHTML = h;

  if (tab === 'summary') {
    setTimeout(function() { renderRadarChart(sym); }, 50);
  }
  if (tab === 'financials') {
    setTimeout(function() { renderCtxSparkline(sym); }, 50);
  }
}

function renderRadarChart(sym) {
  var canvas = document.getElementById('ctxRadar');
  if (!canvas) return;
  var t = D.tickers[sym];
  if (!t || !t.dimensions) return;
  var dims = t.dimensions;
  var data = DIM_KEYS.map(function(d) { return dimScore(dims[d]); });
  new Chart(canvas, {
    type: 'radar',
    data: {
      labels: DIM_KEYS.map(function(d) { return d + ' ' + DIM_SHORT[d]; }),
      datasets: [{
        data: data,
        backgroundColor: 'rgba(74,158,255,0.15)',
        borderColor: 'rgba(74,158,255,0.8)',
        pointBackgroundColor: '#4A9EFF',
        pointRadius: 3, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 6, ticks: { stepSize: 1, display: false },
          grid: { color: 'rgba(46,46,58,0.5)' },
          angleLines: { color: 'rgba(46,46,58,0.5)' },
          pointLabels: { color: '#8E8E99', font: { size: 9 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderCtxSparkline(sym) {
  var canvas = document.getElementById('ctxSparkline');
  if (!canvas || !D.priceHistory[sym]) return;
  var ph = D.priceHistory[sym];
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: ph.map(function(p) { return p.ts.slice(5); }),
      datasets: [{
        data: ph.map(function(p) { return p.price; }),
        borderColor: '#4A9EFF', backgroundColor: 'rgba(74,158,255,0.1)',
        fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', font: { size: 10 } } },
        y: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', font: { size: 10 } } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// SECTION TOGGLE
// ═══════════════════════════════════════════
function toggleSection(btn) {
  btn.classList.toggle('collapsed');
  var expanded = !btn.classList.contains('collapsed');
  btn.setAttribute('aria-expanded', String(expanded));
  var body = btn.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function changeColor(val) {
  return val > 0 ? 'var(--accent-positive)' : val < 0 ? 'var(--accent-negative)' : 'var(--text-secondary)';
}

function changePrefix(val) {
  return val > 0 ? '+' : '';
}

function dteClass(dte) {
  return dte >= 45 ? 'dte-green' : dte >= 30 ? 'dte-amber' : 'dte-red';
}

function computeUpside(sym) {
  var t = D.tickers[sym];
  if (!t || !t.fairValue || !t.fairValue.probWeightedFV || !t.price) return null;
  var fvStr = t.fairValue.probWeightedFV.replace(/[^0-9.\-]/g, '');
  var priceStr = t.price.replace(/[^0-9.\-]/g, '');
  var fv = parseFloat(fvStr), price = parseFloat(priceStr);
  if (isNaN(fv) || isNaN(price) || price === 0) return null;
  return Math.round((fv / price - 1) * 100);
}

function todayStr() { return D.generated || '2026-03-27'; }

function formatDate(ds) {
  if (!ds) return '';
  var d = new Date(ds);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function toggleMoreMenu() {
  var m = document.getElementById('moreMenu');
  m.classList.toggle('open');
  if (m.classList.contains('open') && typeof lucide !== 'undefined') lucide.createIcons();
}

// RENDER: THEMES
// ═══════════════════════════════════════════
function getTickerChipClass(sym, theme) {
  var t = D.tickers[sym];
  if (t && t.status === 'ACTIVE') return 'ticker-chip-active';
  if (t && t.status === 'MONITORING') return 'ticker-chip-monitoring';
  // Check if parked
  if (D.parked) {
    for (var i = 0; i < D.parked.length; i++) {
      if (D.parked[i].ticker === sym) return 'ticker-chip-other';
    }
  }
  return 'ticker-chip-monitoring';
}
function renderThemes() {
  var el = document.getElementById('sec-themes');
  var h = '<h2 class="section-title">Themes</h2>';

  // Active themes as cards
  var activeThemes = D.themes.filter(function(t) { return t.status !== 'DORMANT'; });
  var dormantThemes = D.themes.filter(function(t) { return t.status === 'DORMANT'; });

  h += '<div class="theme-grid">';
  activeThemes.forEach(function(t) {
    var statusPill, cardClass = 'theme-card-v2';
    if (t.status === 'STABLE') statusPill = 'pill-green';
    else if (t.status === 'ESCALATING') { statusPill = 'pill-red'; cardClass += ' theme-card-v2-escalating'; }
    else if (t.status === 'WEAKENING') { statusPill = 'pill-amber'; cardClass += ' theme-card-v2-weakening'; }
    else statusPill = 'pill-grey';

    h += '<div class="' + cardClass + '">';
    // Header: name + status pill
    h += '<div class="tc2-header">';
    h += '<span class="tc2-name">' + esc(t.name) + '</span>';
    h += '<span class="pill ' + statusPill + '">' + t.status + '</span>';
    h += '</div>';
    // Scores
    h += '<div class="tc2-scores">';
    h += 'Impact: <strong>' + (t.impact !== null ? t.impact : '\u2014') + '</strong>';
    h += ' &times; Discovery: <strong>' + (t.discovery !== null ? t.discovery : '\u2014') + '</strong>';
    h += ' = Priority: <strong style="' + (t.priority >= 20 ? 'color:var(--accent-positive)' : '') + '">' + (t.priority !== null ? t.priority : '\u2014') + '</strong>';
    h += '</div>';
    // Ticker chips
    h += '<div class="ticker-chips">';
    t.tickers.forEach(function(tk) {
      var chipClass = getTickerChipClass(tk, t.name);
      if (D.tickers[tk]) {
        h += '<span class="ticker-chip ' + chipClass + '" onclick="openContextPanel(\'' + tk + '\')" style="cursor:pointer">' + tk + '</span>';
      } else {
        h += '<span class="ticker-chip ticker-chip-other">' + tk + '</span>';
      }
    });
    h += '</div>';
    // Counts
    h += '<div class="tc2-counts">';
    if (t.activeCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--accent-positive)"></span>' + t.activeCount + ' Active</span>';
    if (t.monitoringCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--accent-blue)"></span>' + t.monitoringCount + ' Monitoring</span>';
    if (t.parkedCount > 0) h += '<span><span class="tc2-count-dot" style="background:var(--text-secondary)"></span>' + t.parkedCount + ' Parked</span>';
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Dormant themes
  if (dormantThemes.length) {
    h += '<button class="section-toggle" aria-expanded="false" onclick="toggleSection(this)">Dormant Themes (' + dormantThemes.length + ')</button>';
    h += '<div class="section-body" style="max-height:0;overflow:hidden"><div class="theme-grid">';
    dormantThemes.forEach(function(t) {
      h += '<div class="theme-card-v2 theme-card-v2-dormant">';
      h += '<div class="tc2-header"><span class="tc2-name">' + esc(t.name) + '</span><span class="pill pill-grey">DORMANT</span></div>';
      h += '<div class="ticker-chips">';
      t.tickers.forEach(function(tk) {
        h += '<span class="ticker-chip ticker-chip-other">' + tk + '</span>';
      });
      h += '</div></div>';
    });
    h += '</div></div>';
  }

  // Candidates (kept as-is)
  if (D.candidates && D.candidates.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">New Theme Candidates (' + D.candidates.length + ')</button>';
    h += '<div class="section-body">';
    D.candidates.forEach(function(c) {
      var borderStyle = c.escalating ? 'border-color:rgba(255,59,48,.3)' : '';
      h += '<div class="theme-card" style="' + borderStyle + '">';
      h += '<div class="theme-name">' + esc(c.name) + '</div>';
      h += '<div class="theme-meta">Priority ' + c.priority + ' (' + (c.priority >= 10 ? 'HIGH' : 'MOD') + ') \u00B7 ';
      h += (c.persistence > 1 ? 'PERSISTENCE CONFIRMED (' + c.persistence + ' briefings)' : 'First appearance');
      h += ' \u00B7 ' + esc(c.note);
      if (c.escalating) h += ' <strong style="color:var(--accent-red)">ESCALATING</strong>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // Parked (kept as-is)
  if (D.parked && D.parked.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Parked Tickers (' + D.parked.length + ')</button>';
    h += '<div class="section-body">';
    D.parked.forEach(function(p) {
      h += '<div class="theme-card" style="opacity:.6">';
      h += '<div class="theme-name">' + p.ticker + ' <span class="pill pill-grey">PARKED</span></div>';
      h += '<div class="theme-meta">' + p.theme + ' \u00B7 ' + esc(p.reason) + (p.triggerCheck ? ' \u00B7 Check: ' + p.triggerCheck : '') + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  el.innerHTML = h;
}

  });
  h += '</div>';

  if (intel.crossConnections && intel.crossConnections.length) {

var _signalFilters = {impact: [], theme: []};
function toggleSignalFilter(chip) {
  var type = chip.getAttribute('data-filter-type');
  var val = chip.getAttribute('data-filter-val');
  var idx = _signalFilters[type].indexOf(val);
  if (idx >= 0) { _signalFilters[type].splice(idx, 1); chip.classList.remove('active'); }
  else { _signalFilters[type].push(val); chip.classList.add('active'); }
  applySignalFilters();
}
function clearSignalFilters() {
  _signalFilters = {impact: [], theme: []};
  var chips = document.querySelectorAll('#signal-filters .filter-chip');
  chips.forEach(function(c) { c.classList.remove('active'); });
  applySignalFilters();
}
function applySignalFilters() {
  var rows = document.querySelectorAll('#signal-rows-container .signal-row');
  rows.forEach(function(row) {
    var imp = row.getAttribute('data-impact');
    var th = row.getAttribute('data-theme');
    var showImpact = _signalFilters.impact.length === 0 || _signalFilters.impact.indexOf(imp) >= 0;
    var showTheme = _signalFilters.theme.length === 0 || _signalFilters.theme.indexOf(th) >= 0;
    row.style.display = (showImpact && showTheme) ? '' : 'none';
  });
}

function parsePrice(s) {
  if (!s) return NaN;
  return parseFloat(String(s).replace(/[^0-9.\-]/g, ''));
}
function dimColor(score) {
  if (score >= 5) return 'var(--accent-positive)';
  if (score >= 4) return 'var(--accent-blue)';
  if (score >= 3) return 'var(--accent-amber)';
  return 'var(--accent-negative)';
}
function renderRangeBar(t) {
  var bear = parsePrice(t.fairValue.bearCaseFV);
  var bull = parsePrice(t.fairValue.bullCaseFV);
  var pw = parsePrice(t.fairValue.probWeightedFV);
  var cur = parsePrice(t.price);
  if (isNaN(bear) || isNaN(bull) || bear >= bull) return '';
  var range = bull - bear;
  var curPct = Math.max(0, Math.min(100, ((cur - bear) / range) * 100));
  var pwPct = Math.max(0, Math.min(100, ((pw - bear) / range) * 100));
  var downPct = bear > 0 && cur > 0 ? (((cur - bear) / cur) * -100).toFixed(0) : '';
  var upPct = pw > 0 && cur > 0 ? (((pw - cur) / cur) * 100).toFixed(0) : '';
  var h = '<div class="range-bar-wrap">';
  h += '<div class="range-labels"><span>' + esc(t.fairValue.bearCaseFV) + '</span><span>' + esc(t.fairValue.bullCaseFV) + '</span></div>';
  h += '<div class="range-bar">';
  h += '<div class="range-marker range-marker-price" style="left:' + curPct + '%" title="Current: ' + esc(t.price) + '"></div>';
  h += '<div class="range-marker range-marker-pw" style="left:' + pwPct + '%" title="PW FV: ' + esc(t.fairValue.probWeightedFV) + '"></div>';
  h += '</div>';
  h += '<div class="range-pct"><span class="range-pct-down">' + downPct + '% to bear</span><span class="range-pct-up">+' + upPct + '% to PW FV</span></div>';
  h += '</div>';
  return h;
}

var _pfCharts = {};
function renderPortfolio() {
  var el = document.getElementById('sec-portfolio');
  var h = '<h2 class="section-title">Portfolio</h2>';

  // ── Gather positions ──
  var positions = [];
  Object.keys(D.tickers).forEach(function(sym) {
    var t = D.tickers[sym];
    if (t.portfolioType) positions.push({sym:sym, t:t});
  });
  positions.sort(function(a,b) { return (b.t.allocation||0) - (a.t.allocation||0); });

  // ── Helper: parse price string to number ──
  function pn(s) { if (typeof s === 'number') return s; if (!s) return 0; return parseFloat(String(s).replace(/[^0-9.\-]/g,'')); }
  function fmtPct(v) { return v >= 0 ? '+' + v.toFixed(1) + '%' : v.toFixed(1) + '%'; }
  function pctCls(v) { return v > 0 ? 'pf-pos' : v < 0 ? 'pf-neg' : 'pf-neut'; }

  // ── Compute portfolio-level metrics ──
  var totalDeployed = D.portfolio.deployedPct;
  var totalCash = D.portfolio.cashPct;
  var wtdConv = D.portfolio.wtdConviction;
  var wtdUpside = 0, wtdBearDown = 0, allocSum = 0;
  var nearestDte = Infinity;
  positions.forEach(function(p) {
    var t = p.t, alloc = t.allocation || 0;
    var cur = pn(t.price), pw = t.fairValue ? pn(t.fairValue.probWeightedFV) : cur;
    var bear = t.fairValue ? pn(t.fairValue.bearCaseFV) : cur;
    if (cur > 0 && pw > 0) wtdUpside += alloc * ((pw - cur) / cur);
    if (cur > 0 && bear > 0) wtdBearDown += alloc * ((bear - cur) / cur);
    allocSum += alloc;
  });
  if (allocSum > 0) { wtdUpside /= allocSum; wtdBearDown /= allocSum; }
  (D.options||[]).forEach(function(o) { if (o.dte && o.dte < nearestDte) nearestDte = o.dte; });

  // ── Summary Metrics Row ──
  h += '<div class="pf-metrics">';
  h += '<div class="pf-metric-card"><div class="pf-mv">' + totalDeployed.toFixed(1) + '%</div><div class="pf-ml">Deployed</div></div>';
  h += '<div class="pf-metric-card"><div class="pf-mv">' + totalCash.toFixed(1) + '%</div><div class="pf-ml">Cash</div></div>';
  h += '<div class="pf-metric-card"><div class="pf-mv">' + wtdConv.toFixed(1) + '</div><div class="pf-ml">Wtd Conviction</div></div>';
  h += '<div class="pf-metric-card"><div class="pf-mv" style="color:var(--accent-green)">' + fmtPct(wtdUpside * 100) + '</div><div class="pf-ml">PW Upside (Wtd)</div></div>';
  h += '<div class="pf-metric-card"><div class="pf-mv" style="color:var(--accent-red)">' + fmtPct(wtdBearDown * 100) + '</div><div class="pf-ml">Bear Drawdown (Wtd)</div></div>';
  h += '<div class="pf-metric-card"><div class="pf-mv">' + (nearestDte === Infinity ? '\u2014' : nearestDte + 'd') + '</div><div class="pf-ml">Nearest DTE</div></div>';
  h += '</div>';

  // ── Position Summary Table ──
  h += '<div class="card pf-table-wrap"><table class="pf-table">';
  h += '<thead><tr><th aria-sort="none">Ticker</th><th>Instrument</th><th>Theme</th><th>Alloc %</th><th>Conv.</th><th>Cluster A/B</th><th>RC</th><th>Price</th><th>PW FV</th><th>Upside</th><th>Flags</th></tr></thead><tbody>';
  positions.forEach(function(p) {
    var t = p.t, sym = p.sym;
    var cur = pn(t.price), pw = t.fairValue ? pn(t.fairValue.probWeightedFV) : 0;
    var upside = cur > 0 && pw > 0 ? ((pw - cur) / cur) * 100 : 0;
    var opts = (D.options||[]).filter(function(o) { return o.ticker === sym; });
    var instruments = [];
    opts.forEach(function(o) {
      if (o.instrument === 'Shares') instruments.push('Shares');
      else instruments.push(o.instrument + ' ' + o.strike + (o.dte != null ? ' <span class="pf-badge pf-badge-dte">' + o.dte + 'D</span>' : ''));
    });
    var instStr = instruments.length ? instruments.join(' + ') : (t.instrument || '\u2014');
    var flags = '';
    if (t.provisional) flags += '<span class="pf-badge pf-badge-prov">PROVISIONAL</span>';
    if (t.bandViolation) flags += '<span class="pf-badge pf-badge-band">BAND</span>';
    h += '<tr>';
    h += '<td class="mono">' + sym + '</td>';
    h += '<td>' + instStr + '</td>';
    h += '<td style="font-size:12px">' + esc(t.theme||'') + '</td>';
    h += '<td class="mono">' + (t.allocation||0) + '%</td>';
    h += '<td class="mono">' + (t.conviction||'\u2014') + '</td>';
    h += '<td class="mono" style="font-size:12px">' + (t.clusterA ? t.clusterA + '/' + t.clusterB : '\u2014') + '</td>';
    h += '<td class="mono">' + (t.rc != null ? t.rc + '/5' : '\u2014') + '</td>';
    h += '<td class="mono">' + esc(t.price||'') + '</td>';
    h += '<td class="mono">' + (pw ? t.fairValue.probWeightedFV : '\u2014') + '</td>';
    h += '<td class="mono ' + pctCls(upside) + '">' + fmtPct(upside) + '</td>';
    h += '<td>' + (flags || '\u2014') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';

  // ── Asymmetry Table ──
  h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Asymmetry Analysis (' + positions.length + ')</button>';
  h += '<div class="section-body"><div class="card pf-table-wrap"><table class="pf-table">';
  h += '<thead><tr><th aria-sort="none">Ticker</th><th>Bear FV</th><th>Current</th><th>PW FV</th><th>Bull FV</th><th>Downside</th><th>Upside</th><th>Asym. Ratio</th><th>Margin of Safety</th></tr></thead><tbody>';
  positions.forEach(function(p) {
    var t = p.t, fv = t.fairValue;
    if (!fv) return;
    var cur = pn(t.price), bear = pn(fv.bearCaseFV), pw = pn(fv.probWeightedFV), bull = pn(fv.bullCaseFV);
    var downside = cur > 0 ? ((bear - cur) / cur) * 100 : 0;
    var upside = cur > 0 ? ((pw - cur) / cur) * 100 : 0;
    var asym = Math.abs(downside) > 0 ? Math.abs(upside) / Math.abs(downside) : 99;
    var mos = pw > 0 ? ((pw - cur) / pw) * 100 : 0;
    var asymCls = asym >= 2 ? 'pf-pos' : asym >= 1 ? 'pf-neut' : 'pf-neg';
    h += '<tr>';
    h += '<td class="mono">' + p.sym + '</td>';
    h += '<td class="mono">' + (fv.bearCaseFV || '\u2014') + '</td>';
    h += '<td class="mono">' + esc(t.price||'') + '</td>';
    h += '<td class="mono">' + (fv.probWeightedFV || '\u2014') + '</td>';
    h += '<td class="mono">' + (fv.bullCaseFV || '\u2014') + '</td>';
    h += '<td class="mono pf-neg">' + fmtPct(downside) + '</td>';
    h += '<td class="mono pf-pos">' + fmtPct(upside) + '</td>';
    h += '<td class="mono ' + asymCls + '">' + asym.toFixed(1) + 'x</td>';
    h += '<td class="mono ' + pctCls(mos) + '">' + fmtPct(mos) + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';

  // ── Options Monitor ──
  var optLegs = (D.options||[]).filter(function(o) { return o.instrument !== 'Shares'; });
  if (optLegs.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Options Monitor (' + optLegs.length + ')</button>';
    h += '<div class="section-body"><div class="card pf-table-wrap"><table class="pf-table">';
    h += '<thead><tr><th aria-sort="none">Ticker</th><th>Strike</th><th>Expiry</th><th>DTE</th><th>Alloc %</th><th>Moneyness</th><th>Theta Zone</th><th>30D Mark</th><th>Next Catalyst</th></tr></thead><tbody>';
    optLegs.forEach(function(o) {
      var zone = o.dte > 60 ? 'pf-pos' : o.dte > 30 ? 'pf-neut' : 'pf-neg';
      var zoneLabel = o.dte > 60 ? 'GREEN' : o.dte > 30 ? 'AMBER' : 'RED';
      var nextCat = (o.catalystAlignment && o.catalystAlignment.length) ? o.catalystAlignment[0].catalyst + ' (' + o.catalystAlignment[0].date + ')' : '\u2014';
      h += '<tr>';
      h += '<td class="mono">' + o.ticker + '</td>';
      h += '<td class="mono">' + o.strike + '</td>';
      h += '<td>' + o.expiry + '</td>';
      h += '<td class="mono ' + zone + '">' + (o.dte || '\u2014') + '</td>';
      h += '<td class="mono">' + o.alloc + '%</td>';
      h += '<td style="font-size:12px">' + esc(o.moneyness) + '</td>';
      h += '<td class="' + zone + '" style="font-weight:600">' + zoneLabel + '</td>';
      h += '<td>' + o.thirtyDteMark + '</td>';
      h += '<td style="font-size:12px">' + esc(nextCat) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // ── Chart containers ──
  h += '<div class="pf-charts-row">';
  h += '<div class="pf-chart-card"><h4>Allocation by Position</h4><canvas id="pfChartPos"></canvas></div>';
  h += '<div class="pf-chart-card"><h4>Allocation by Theme</h4><canvas id="pfChartTheme"></canvas></div>';
  h += '<div class="pf-chart-card"><h4>Allocation by Instrument</h4><canvas id="pfChartInstr"></canvas></div>';
  h += '</div>';
  h += '<div class="pf-charts-row">';
  h += '<div class="pf-chart-card"><h4>Conviction vs Allocation</h4><canvas id="pfChartBubble"></canvas></div>';
  h += '<div class="pf-chart-card"><h4>Upside / Downside Asymmetry</h4><canvas id="pfChartAsym"></canvas></div>';
  h += '</div>';

  el.innerHTML = h;

  // ── Render charts after DOM is populated ──
  setTimeout(function() { renderPfCharts(positions); }, 50);
}

function renderPfCharts(positions) {
  // Destroy old charts
  Object.keys(_pfCharts).forEach(function(k) { if (_pfCharts[k]) _pfCharts[k].destroy(); });
  _pfCharts = {};

  var pfColors = ['#4A9EFF','#FF6B6B','#4ECDC4','#FFD93D','#C084FC','#FF8A65','#81C784','#90CAF9'];
  function pn(s) { if (typeof s === 'number') return s; if (!s) return 0; return parseFloat(String(s).replace(/[^0-9.\-]/g,'')); }

  // ── 1. Allocation by Position (doughnut) ──
  var posLabels = positions.map(function(p) { return p.sym; });
  posLabels.push('Cash');
  var posData = positions.map(function(p) { return p.t.allocation || 0; });
  posData.push(D.portfolio.cashPct);
  var posColors = pfColors.slice(0, positions.length);
  posColors.push('rgba(142,142,153,0.4)');

  var ctx1 = document.getElementById('pfChartPos');
  if (ctx1) {
    _pfCharts.pos = new Chart(ctx1, {
      type: 'doughnut',
      data: { labels: posLabels, datasets: [{ data: posData, backgroundColor: posColors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '55%',
        plugins: {
          legend: { position: 'right', labels: { color: '#8E8E99', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: { callbacks: { label: function(c) { return c.label + ': ' + c.parsed.toFixed(1) + '%'; } } }
        }
      }
    });
  }

  // ── 2. Allocation by Theme (doughnut) ──
  var themeMap = {};
  positions.forEach(function(p) {
    var th = p.t.theme || 'Other';
    // Shorten theme names
    if (th.indexOf('Sentiments') > -1 || th.indexOf('Mismatch') > -1) th = 'Sentiment Mismatch';
    else if (th.indexOf('Hormuz') > -1) th = 'Hormuz';
    else if (th.indexOf('AI') > -1) th = 'AI Disruption';
    else if (th.indexOf('Derived') > -1) th = 'Derived-Demand';
    themeMap[th] = (themeMap[th] || 0) + (p.t.allocation || 0);
  });
  var themeLabels = Object.keys(themeMap);
  themeLabels.push('Cash');
  var themeData = themeLabels.map(function(l) { return l === 'Cash' ? D.portfolio.cashPct : themeMap[l]; });
  var themeColors = pfColors.slice(0, themeLabels.length - 1);
  themeColors.push('rgba(142,142,153,0.4)');

  var ctx2 = document.getElementById('pfChartTheme');
  if (ctx2) {
    _pfCharts.theme = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels: themeLabels, datasets: [{ data: themeData, backgroundColor: themeColors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '55%',
        plugins: {
          legend: { position: 'right', labels: { color: '#8E8E99', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: { callbacks: { label: function(c) { return c.label + ': ' + c.parsed.toFixed(1) + '%'; } } }
        }
      }
    });
  }

  // ── 3. Allocation by Instrument (doughnut) ──
  var instrMap = { Shares: 0, Options: 0 };
  (D.options||[]).forEach(function(o) {
    if (o.instrument === 'Shares') instrMap.Shares += (o.alloc || 0);
    else instrMap.Options += (o.alloc || 0);
  });
  var instrLabels = ['Shares', 'Options', 'Cash'];
  var instrData = [instrMap.Shares, instrMap.Options, D.portfolio.cashPct];
  var instrColors = ['#4A9EFF', '#C084FC', 'rgba(142,142,153,0.4)'];

  var ctx3 = document.getElementById('pfChartInstr');
  if (ctx3) {
    _pfCharts.instr = new Chart(ctx3, {
      type: 'doughnut',
      data: { labels: instrLabels, datasets: [{ data: instrData, backgroundColor: instrColors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '55%',
        plugins: {
          legend: { position: 'right', labels: { color: '#8E8E99', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: { callbacks: { label: function(c) { return c.label + ': ' + c.parsed.toFixed(1) + '%'; } } }
        }
      }
    });
  }

  // ── 4. Conviction vs Allocation bubble ──
  var bubbleData = positions.map(function(p, i) {
    var t = p.t, cur = pn(t.price), pw = t.fairValue ? pn(t.fairValue.probWeightedFV) : cur;
    var upside = cur > 0 && pw > 0 ? ((pw - cur) / cur) * 100 : 0;
    return { x: t.conviction || 0, y: t.allocation || 0, r: Math.max(6, Math.min(30, Math.abs(upside) / 3)), label: p.sym, upside: upside };
  });

  var ctx4 = document.getElementById('pfChartBubble');
  if (ctx4) {
    _pfCharts.bubble = new Chart(ctx4, {
      type: 'bubble',
      data: {
        datasets: bubbleData.map(function(d, i) {
          return { label: d.label, data: [{ x: d.x, y: d.y, r: d.r }], backgroundColor: pfColors[i % pfColors.length] + '99', borderColor: pfColors[i % pfColors.length], borderWidth: 2 };
        })
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        scales: {
          x: { title: { display: true, text: 'Conviction', color: '#8E8E99' }, min: 0, max: 11, grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99' } },
          y: { title: { display: true, text: 'Allocation %', color: '#8E8E99' }, min: 0, grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99' } }
        },
        plugins: {
          legend: { position: 'bottom', labels: { color: '#8E8E99', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: { callbacks: { label: function(c) { var d = bubbleData[c.datasetIndex]; return d.label + ': Conv ' + d.x + ', Alloc ' + d.y + '%, Upside ' + d.upside.toFixed(1) + '%'; } } }
        }
      }
    });
  }

  // ── 5. Upside/Downside asymmetry bar ──
  var asymLabels = [], asymBear = [], asymPW = [], asymBull = [];
  positions.forEach(function(p) {
    var t = p.t, fv = t.fairValue;
    if (!fv) return;
    var cur = pn(t.price), bear = pn(fv.bearCaseFV), pw = pn(fv.probWeightedFV), bull = pn(fv.bullCaseFV);
    asymLabels.push(p.sym);
    asymBear.push(cur > 0 ? ((bear - cur) / cur) * 100 : 0);
    asymPW.push(cur > 0 ? ((pw - cur) / cur) * 100 : 0);
    asymBull.push(cur > 0 ? ((bull - cur) / cur) * 100 : 0);
  });

  var ctx5 = document.getElementById('pfChartAsym');
  if (ctx5) {
    _pfCharts.asym = new Chart(ctx5, {
      type: 'bar',
      data: {
        labels: asymLabels,
        datasets: [
          { label: 'Bear Downside', data: asymBear, backgroundColor: 'rgba(239,83,80,0.7)', borderRadius: 4 },
          { label: 'PW Upside', data: asymPW, backgroundColor: 'rgba(76,175,80,0.7)', borderRadius: 4 },
          { label: 'Bull Upside', data: asymBull, backgroundColor: 'rgba(76,175,80,0.3)', borderRadius: 4 }
        ]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: true,
        scales: {
          x: { grid: { color: 'rgba(46,46,58,0.3)' }, ticks: { color: '#8E8E99', callback: function(v) { return v + '%'; } } },
          y: { grid: { display: false }, ticks: { color: '#8E8E99', font: { weight: '600' } } }
        },
        plugins: {
          legend: { position: 'bottom', labels: { color: '#8E8E99', font: { size: 11 }, usePointStyle: true, pointStyle: 'rect' } },
          tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': ' + c.parsed.x.toFixed(1) + '%'; } } }
        }
      }
    });
  }
}

function renderResearch() {
  var el = document.getElementById('sec-research');
  var h = '<h2 class="section-title">Research Pipeline</h2>';

  // Build complete watchlist from D.tickers + D.themes
  var active = [], monitoring = [], parkedList = [], passedList = [];
  var seen = {};

  // First: tickers with full data
  Object.keys(D.tickers).forEach(function(sym) {
    seen[sym] = true;
    var t = D.tickers[sym];
    if (t.status === 'ACTIVE') active.push({sym:sym, t:t, hasData:true});
    else if (t.status === 'MONITORING') monitoring.push({sym:sym, t:t, hasData:true});
    else passedList.push({sym:sym, t:t, hasData:true});
  });

  // Second: tickers only in themes (no full data in D.tickers)
  var parkedMap = {};
  (D.parked || []).forEach(function(p) { parkedMap[p.ticker] = p; });
  D.themes.forEach(function(theme) {
    theme.tickers.forEach(function(tk) {
      if (seen[tk]) return;
      seen[tk] = true;
      if (parkedMap[tk]) {
        parkedList.push({sym:tk, theme:theme.name, reason:parkedMap[tk].reason, triggerCheck:parkedMap[tk].triggerCheck, hasData:false});
      } else if (theme.status === 'DORMANT') {
        passedList.push({sym:tk, theme:theme.name, hasData:false});
      } else {
        monitoring.push({sym:tk, theme:theme.name, hasData:false});
      }
    });
  });

  active.sort(function(a, b) { return ((b.t||{}).conviction || 0) - ((a.t||{}).conviction || 0); });
  monitoring.sort(function(a, b) {
    var ca = (a.t||{}).conviction || 0, cb = (b.t||{}).conviction || 0;
    return cb - ca;
  });

  // Active positions — full cards
  if (active.length) {
    h += '<h3 style="font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Active Positions (' + active.length + ')</h3>';
    h += '<div class="pipeline-grid">';
    active.forEach(function(item) { h += renderTickerCard(item.sym, item.t); });
    h += '</div>';
  }

  // Monitoring — full cards (same as active)
  if (monitoring.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Monitoring (' + monitoring.length + ')</button>';
    h += '<div class="section-body">';
    h += '<div class="pipeline-grid">';
    monitoring.forEach(function(item) {
      if (item.hasData) {
        h += renderTickerCard(item.sym, item.t);
      } else {
        // Minimal card for tickers only in themes
        h += '<div class="ticker-card" style="opacity:.6">';
        h += '<div class="tc-header"><span class="tc-sym">' + item.sym + '</span></div>';
        h += '<div class="tc-meta"><span>' + esc(item.theme) + '</span></div>';
        h += '</div>';
      }
    });
    h += '</div></div>';
  }

  // Parked tickers
  if (parkedList.length) {
    h += '<button class="section-toggle" aria-expanded="false" onclick="toggleSection(this)">Parked (' + parkedList.length + ')</button>';
    h += '<div class="section-body" style="max-height:0;overflow:hidden">';
    h += '<div class="card"><table class="monitoring-table">';
    h += '<thead><tr><th aria-sort="none">Ticker</th><th>Theme</th><th>Reason</th><th>Trigger Check</th></tr></thead>';
    h += '<tbody>';
    parkedList.forEach(function(item) {
      h += '<tr style="opacity:.6">';
      h += '<td class="mono">' + item.sym + '</td>';
      h += '<td style="font-size:12px">' + esc(item.theme || (item.t ? item.t.theme : '')) + '</td>';
      h += '<td style="font-size:12px">' + esc(item.reason || '') + '</td>';
      h += '<td style="font-size:12px">' + esc(item.triggerCheck || '\u2014') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // Priority queue (kept, but moved below pipeline)
  if (D.priorityQueue && D.priorityQueue.length) {
    h += '<button class="section-toggle" aria-expanded="true" onclick="toggleSection(this)">Priority Queue (' + D.priorityQueue.length + ')</button>';
    h += '<div class="section-body">';
    h += '<div class="card">';
    D.priorityQueue.forEach(function(p) {
      h += '<div class="priority-item">';
      h += '<div class="priority-score">' + p.score.toFixed(1) + '</div>';
      h += '<div class="priority-body"><div class="p-title">' + (p.score >= 20 ? '\uD83D\uDEA8 ' : '') + esc(p.title) + '</div><div class="p-action">' + esc(p.action) + '</div></div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  el.innerHTML = h;
}

});

// ═══════════════════════════════════════════
// PWA: Service Worker
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) { reg.update(); })
    .catch(function(err) { console.log('SW registration failed:', err); });
  navigator.serviceWorker.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'UPDATE_AVAILABLE') showUpdateBanner();
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  var b = document.createElement('div');
  b.id = 'updateBanner';
  b.className = 'update-banner';
  b.innerHTML = 'New data available <button onclick="location.reload()">Refresh</button>';
  document.body.appendChild(b);
  setTimeout(function() { b.style.transition = 'opacity 0.3s'; b.style.opacity = '0'; setTimeout(function() { b.remove(); }, 400); }, 4000);
}

// ── Theme toggle ──
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('vault-theme', next);
  updateThemeIcon(next);
  // Update meta theme-color
  var meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', next === 'light' ? '#F5F5F7' : '#0D0D0F');
}

function updateThemeIcon(theme) {
  var btn = document.querySelector('.theme-btn');
  if (!btn) return;
  if (theme === 'light') {
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  } else {
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  }
}

// Apply saved theme on load
(function() {
  var saved = localStorage.getItem('vault-theme') || 'dark';
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', '#F5F5F7');
  }
  updateThemeIcon(saved);
})();
</script>
</body>
</html>
